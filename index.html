<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDIX STUDIO</title>
    <!-- 引入與 1.html 相同之 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        /* 防止切換語言或主題時版面抖動，強制保留右側滾動條空間 */
        html {
            overflow-y: scroll;
        }
        /* 極佳的平滑轉變動畫，但避免引發位置抖動的 transform 過渡 */
        .theme-transition {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
    </style>
        <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="theme-transition" rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen p-4 md:p-8 text-slate-800 dark:text-slate-200 font-sans theme-transition">
    <!-- 主卡片容器 (承襲 1.html 的外觀與風格) -->
    <div class="max-w-7xl mx-auto bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 theme-transition">
        
        <!-- Header: 黑色主題色 -->
        <div class="bg-gradient-to-r from-black via-zinc-900 to-neutral-950 p-6 text-white flex justify-between items-center border-b border-zinc-800">
            <div>
                <!-- GORDIX Logo，GORDIX 為白色，STUDIO 為亮橘色 -->
                <h1 class="text-2xl md:text-3xl font-black tracking-widest select-none">
                    GORDIX <span class="text-orange-500 text-xs md:text-sm tracking-widest ml-1 font-bold">STUDIO</span>
                </h1>
            </div>
            
            <!-- 右側控制區 (主題切換與語言切換) -->
            <div class="flex gap-3 items-center">
                <!-- 明暗主題切換按鈕 -->
                <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-lg bg-white/5 hover:bg-white/10 text-white border border-white/10 transition-all flex items-center justify-center" aria-label="Toggle Theme">
                    <svg id="theme-icon" class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <!-- 圖示由 JS 動態注入 -->
                    </svg>
                </button>
                <!-- 語系切換 -->
                <button onclick="toggleLanguage()" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-white/5 hover:bg-white/10 text-white border border-white/10 transition-all flex items-center gap-2">
                    <span id="lang-text">中文 / EN</span>
                </button>
            </div>
        </div>

        <!-- 主內容區域: 6 個功能卡片佈局 -->
        <main class="p-6 md:p-12">
            <!-- 採用 flex-wrap 在寬螢幕下自動排成完美對稱的 3x2 格局 -->
            <div class="flex flex-wrap justify-center gap-6 w-full">
                
                <!-- Tool 1: 桌長配置 (灰色) -->
                <a href="table_conf.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-slate-400 dark:hover:border-slate-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-slate-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(148,163,184,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
                        </svg>
                    </div>
                    <h3 data-zh="桌長參數配置產生器" data-en="Table Configurator" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">桌長配置產生器</h3>
                    <p data-zh="系統配置參數快速生成" data-en="Generate system config parameters" class="text-sm text-slate-500 dark:text-slate-400">系統配置參數快速生成</p>
                </a>

                <!-- Tool 2: 轉檔工具(切割) (橘色) -->
                <a href="CNC.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-orange-500 dark:hover:border-orange-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-orange-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(249,115,22,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M11 2h2v3h-2zm-2 4h6v1.5H9zm0 3.5l6-1.5v1.5l-6 1.5zm0 3.5l6-1.5v1.5l-6 1.5zm1 3l2 3 2-3z"/>
                        </svg>
                    </div>
                    <h3 data-zh="轉檔工具 (切割)" data-en="Cut Converter" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">轉檔工具 (切割)</h3>
                    <p data-zh="CNC與雷射切割專用" data-en="Optimized for CNC and laser cutting" class="text-sm text-slate-500 dark:text-slate-400">CNC與雷射切割專用</p>
                </a>

                <!-- Tool 3: 轉檔工具(繪圖) (藍色) -->
                <a href="draw.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-blue-500 dark:hover:border-blue-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-blue-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM11 2v4h2V2h-2zm0 16v4h2v-4h-2zm11-7h-4v2h4v-2zM6 11H2v2h4v-2z"/>
                        </svg>
                    </div>
                    <h3 data-zh="轉檔工具 (繪圖)" data-en="Draw Converter" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">轉檔工具 (繪圖)</h3>
                    <p data-zh="雷射雕刻與繪圖專用" data-en="Optimized for plotter and laser engraving" class="text-sm text-slate-500 dark:text-slate-400">雷射雕刻與繪圖專用</p>
                </a>

                <!-- Tool 4: V雕刻 (紅色) -->
                <a href="vc.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-red-500 dark:hover:border-red-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-red-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 5h4l5 10 5-10h4L12 19z"/>
                        </svg>
                    </div>
                    <h3 data-zh="V 雕刻" data-en="V-Carving" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">V 雕刻</h3>
                    <p data-zh="提供圖片或向量轉V-carving用gcode" data-en="Convert images or vectors to V-carving G-code" class="text-sm text-slate-500 dark:text-slate-400">提供圖片或向量轉V-carving用gcode</p>
                </a>

                <!-- Tool 5: Gcode (綠色) -->
                <a href="Gcodetrans.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-green-500 dark:hover:border-green-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-green-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(34,197,94,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                        </svg>
                    </div>
                    <h3 data-zh="Gcode 即時調整" data-en="Gcode Real-time Adjuster" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">Gcode 即時調整</h3>
                    <p data-zh="即時編輯與校正 Gcode 內容" data-en="Live Gcode editing and correction" class="text-sm text-slate-500 dark:text-slate-400">即時編輯與校正 Gcode 內容</p>
                </a>

                <!-- Tool 6: 參數指南 (紫色) -->
                <a href="params.html" class="group w-full sm:w-[calc(50%-12px)] lg:w-[calc(33.333%-16px)] max-w-sm bg-slate-50 dark:bg-slate-800/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800/80 flex flex-col items-center justify-center text-center transition-all duration-200 hover:-translate-y-1 hover:border-purple-500 dark:hover:border-purple-500 hover:shadow-lg">
                    <div class="w-14 h-14 bg-slate-200 dark:bg-slate-800 rounded-xl mb-5 flex items-center justify-center text-slate-500 dark:text-slate-400 group-hover:bg-purple-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all duration-200">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <!-- 工藝開書 (Open Book) 向量圖標 -->
                            <path d="M12 4.5C10.55 3.42 8.35 3 6 3c-2.2 0-4.3.42-6 1.5v15c1.7-1.08 3.8-1.5 6-1.5 2.35 0 4.55.42 6 1.5 1.45-1.08 3.65-1.5 6-1.5 2.2 0 4.3.42 6 1.5v-15c-1.7-1.08-3.8-1.5-6-1.5-2.35 0-4.55.42-6 1.5zM11 17.5c-1.45-1.08-3.65-1.5-6-1.5-1.5 0-2.85.2-4 .5V6c1.15-.3 2.5-.5 4-.5 2.2 0 4.3.42 6 1.5v10.5zm12-11.5v10.5c-1.15-.3-2.5-.5-4-.5-2.35 0-4.55.42-6 1.5V7.5c1.45-1.08 3.65-1.5 6-1.5 1.5 0 2.85.2 4 .5z"/>
                        </svg>
                    </div>
                    <h3 data-zh="參數指南" data-en="Parameter Guide" class="text-lg font-bold text-slate-900 dark:text-white mb-2 transition-colors">參數指南</h3>
                    <p data-zh="各類材料加工參數建議與快速查詢" data-en="Processing parameters & reference guide for materials" class="text-sm text-slate-500 dark:text-slate-400">各類材料加工參數建議與快速查詢</p>
                </a>

            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-slate-50 dark:bg-slate-900/50 p-6 text-center text-xs text-slate-500 dark:text-slate-500 border-t border-slate-100 dark:border-slate-800/60 theme-transition">
            <p>&copy; 2026 GORDIX STUDIO || cubiio. All tools run locally in browser.</p>
        </footer>
    </div>

    <script>
        // 設定全域變數，並以您指定的規格做為預設值
        let currentLang = 'zh';
        let currentTheme = 'dark';

        // 語系載入、儲存與套用
        function initLanguage() {
            const savedLang = localStorage.getItem('gordix-lang');
            if (savedLang) {
                currentLang = savedLang;
            } else {
                currentLang = 'zh'; // 預設繁中
                localStorage.setItem('gordix-lang', currentLang);
            }
            applyLanguage();
        }

        function applyLanguage() {
            const elements = document.querySelectorAll('[data-zh]');
            elements.forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });

            const btn = document.getElementById('lang-text');
            if (btn) {
                btn.textContent = currentLang === 'zh' ? '中文 / EN' : 'EN / 中文';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
            localStorage.setItem('gordix-lang', currentLang);
        }

        // 主題載入、儲存與套用
        function initTheme() {
            const savedTheme = localStorage.getItem('gordix-theme');
            if (savedTheme) {
                currentTheme = savedTheme;
            } else {
                currentTheme = 'dark'; // 預設深色模式
                localStorage.setItem('gordix-theme', currentTheme);
            }
            applyTheme();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme();
            localStorage.setItem('gordix-theme', currentTheme);
        }

        function applyTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (currentTheme === 'light') {
                html.classList.remove('dark'); // 淺色模式：移除 dark class
                if (themeIcon) {
                    // 顯示月亮圖示
                    themeIcon.innerHTML = `
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                    `;
                }
            } else {
                html.classList.add('dark'); // 深色模式：加上 dark class
                if (themeIcon) {
                    // 顯示太陽圖示
                    themeIcon.innerHTML = `
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
                    `;
                }
            }
        }

        // 初始化載入偏好設定
        window.onload = () => {
            initLanguage();
            initTheme();
        };

        // 跨分頁與跨視窗事件監聽 (當 A 網頁更新設定後，B 網頁會自動、即時同步更新)
        window.addEventListener('storage', (e) => {
            if (e.key === 'gordix-theme') {
                if (e.newValue) {
                    currentTheme = e.newValue;
                    applyTheme();
                }
            }
            if (e.key === 'gordix-lang') {
                if (e.newValue) {
                    currentLang = e.newValue;
                    applyLanguage();
                }
            }
        });
    </script>
            <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker registered successfully with scope: ', reg.scope))
                    .catch((err) => console.error('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
