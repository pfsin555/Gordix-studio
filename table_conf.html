<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* 深色主題變數 */
            --bg-body: #0f172a;
            --text-body: #f1f5f9;
            --text-primary: #ffffff;
            --bg-panel: #1e293b;
            --border-panel: #334155;
            --bg-input: #0f172a;
            --text-input: #f8fafc;
            --border-input: #475569;
            --bg-active-row: #334155;
            --border-active-row: #f8fafc;
            --bg-row: rgba(15, 23, 42, 0.4);
            --bg-row-hover: rgba(51, 65, 85, 0.5);
            --text-row-active: #ffffff;
            --text-row-inactive: #94a3b8;
            --text-muted: #94a3b8;
            --bg-secondary-btn: #1e293b;
            --border-secondary-btn: #334155;
            --text-secondary-btn: #cbd5e1;
            --bg-primary-btn: #f1f5f9;
            --text-primary-btn: #0f172a;
            --bg-primary-btn-hover: #ffffff;
            --bg-range-box: rgba(30, 41, 59, 0.5);
            --border-range-box: rgba(148, 163, 184, 0.3);
            
            --tag-bg: #94a3b8;
            --tag-text: #0f172a;
            --tag-bg-d: #64748b;
            --tag-text-d: #ffffff;

            /* 畫布專用變數 */
            --canvas-bg: #1e293b;
            --canvas-stroke: #334155;
            --canvas-wa-fill: rgba(255, 255, 255, 0.05);
            --canvas-wa-stroke: rgba(255, 255, 255, 0.4);
            --canvas-dash-stroke: rgba(255, 255, 255, 0.5);
            --canvas-d-dash-stroke: rgba(148, 163, 184, 0.5);
            --canvas-corner-fill: #475569;
            --canvas-dot-fill: #f8fafc;
            --canvas-text-fill: #ffffff;
            --canvas-machine-highlight: #ea580c;
        }

        body.theme-light {
            /* 明亮主題變數 */
            --bg-body: #f8fafc;
            --text-body: #0f172a;
            --text-primary: #0f172a;
            --bg-panel: #ffffff;
            --border-panel: #cbd5e1;
            --bg-input: #f1f5f9;
            --text-input: #0f172a;
            --border-input: #94a3b8;
            --bg-active-row: #e2e8f0;
            --border-active-row: #0f172a;
            --bg-row: rgba(241, 245, 249, 0.8);
            --bg-row-hover: #cbd5e1;
            --text-row-active: #0f172a;
            --text-row-inactive: #475569;
            --text-muted: #475569;
            --bg-secondary-btn: #f1f5f9;
            --border-secondary-btn: #cbd5e1;
            --text-secondary-btn: #334155;
            --bg-primary-btn: #0f172a;
            --text-primary-btn: #ffffff;
            --bg-primary-btn-hover: #1e293b;
            --bg-range-box: #f1f5f9;
            --border-range-box: rgba(15, 23, 42, 0.1);
            
            --tag-bg: #cbd5e1;
            --tag-text: #0f172a;
            --tag-bg-d: #475569;
            --tag-text-d: #ffffff;

            /* 明亮畫布變數 */
            --canvas-bg: #f8fafc;
            --canvas-stroke: #cbd5e1;
            --canvas-wa-fill: rgba(15, 23, 42, 0.03);
            --canvas-wa-stroke: rgba(15, 23, 42, 0.3);
            --canvas-dash-stroke: rgba(15, 23, 42, 0.4);
            --canvas-d-dash-stroke: rgba(100, 116, 139, 0.3);
            --canvas-corner-fill: #94a3b8;
            --canvas-dot-fill: #0f172a;
            --canvas-text-fill: #0f172a;
            --canvas-machine-highlight: #ea580c;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-body);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        canvas {
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5);
            background-color: var(--canvas-bg);
            border: 1px solid var(--canvas-stroke);
            max-width: 100%;
            height: auto;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .panel-bg {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-panel);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .text-title {
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .uniform-input {
            width: 100%;
            height: 32px;
            outline: none;
            text-align: center;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 700;
            background: var(--bg-input);
            color: var(--text-input);
            font-size: 13px;
            border: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .table-item {
            border: 1px solid var(--border-panel);
            background-color: var(--bg-row);
            transition: all 0.2s ease;
        }

        .table-item:hover {
            background-color: var(--bg-row-hover);
        }

        .table-item.active-row {
            background-color: var(--bg-active-row);
            border-left: 4px solid var(--border-active-row);
        }

        .item-text {
            color: var(--text-row-inactive);
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .table-item.active-row .item-text {
            color: var(--text-row-active);
        }

        .tag-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            font-size: 11px;
            font-weight: 900;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .tag-label-d {
            background-color: var(--tag-bg-d);
            color: var(--tag-text-d);
        }

        .input-card {
            border: 1px solid var(--border-input);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            background: var(--bg-panel);
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .custom-border {
            border: 2px solid var(--border-input);
            transition: border-color 0.3s ease;
        }

        .btn-custom-secondary {
            background-color: var(--bg-secondary-btn);
            border-color: var(--border-secondary-btn);
            color: var(--text-secondary-btn);
            transition: all 0.2s ease;
        }

        .btn-custom-secondary:hover {
            background-color: var(--bg-row-hover);
        }

        .btn-custom-primary {
            background-color: var(--bg-primary-btn);
            color: var(--text-primary-btn);
            transition: all 0.2s ease;
        }

        .btn-custom-primary:hover {
            background-color: var(--bg-primary-btn-hover);
            opacity: 0.9;
        }

        .range-box {
            background-color: var(--bg-range-box);
            border-color: var(--border-range-box);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .text-muted-custom {
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bg-input-custom {
            background-color: var(--bg-input);
            transition: background-color 0.3s ease;
        }

        .border-input-custom {
            border-color: var(--border-input);
            transition: border-color 0.3s ease;
        }

        .text-custom {
            color: var(--text-input);
            transition: color 0.3s ease;
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-panel);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>

    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

</head>
<body class="p-2 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-4 md:mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 id="ui-title" class="text-2xl md:text-3xl font-bold text-title tracking-tight">桌長配置產生器</h1>
            </div>
            <div class="flex flex-row gap-2 w-full md:w-auto justify-end">
                <!-- 主題切換按鈕（僅保留圖示） -->
                <button id="theme-toggle-btn" onclick="toggleTheme()" class="btn-custom-secondary p-2.5 rounded-lg shadow font-bold transition-colors flex items-center justify-center" title="切換主題 / Toggle Theme">
                    <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                </button>
                <!-- 語言切換按鈕 -->
                <button onclick="toggleLang()" class="btn-custom-secondary px-6 py-2 rounded-lg shadow font-bold transition-colors">
                    中文 / EN
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
            <!-- 左側繪圖與數值輸入區 -->
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div id="canvas-container" class="relative panel-bg p-3 md:p-4 rounded-xl shadow-xl flex flex-col items-center justify-center overflow-hidden min-h-[300px]">
                    <canvas id="tableCanvas"></canvas>
                </div>
                
                <!-- 固定位置的輸入面板 -->
                <div class="panel-bg p-4 rounded-xl shadow-lg">
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                        <div class="flex flex-col gap-1">
                            <span id="label-n" class="text-[10px] text-muted-custom font-bold ml-1 uppercase">側邊N</span>
                            <div class="input-card">
                                <span class="tag-label">N</span>
                                <input type="number" id="valN" min="600" max="2600" class="uniform-input" oninput="updateCurrentTableData(false)" onblur="updateCurrentTableData(true)">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span id="label-s" class="text-[10px] text-muted-custom font-bold ml-1 uppercase">側邊S</span>
                            <div class="input-card">
                                <span class="tag-label">S</span>
                                <input type="number" id="valS" min="600" max="2600" class="uniform-input" oninput="updateCurrentTableData(false)" onblur="updateCurrentTableData(true)">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span id="label-w" class="text-[10px] text-muted-custom font-bold ml-1 uppercase">側邊W</span>
                            <div class="input-card">
                                <span class="tag-label">W</span>
                                <input type="number" id="valW" min="600" max="2600" class="uniform-input" oninput="updateCurrentTableData(false)" onblur="updateCurrentTableData(true)">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span id="label-e" class="text-[10px] text-muted-custom font-bold ml-1 uppercase">側邊E</span>
                            <div class="input-card">
                                <span class="tag-label">E</span>
                                <input type="number" id="valE" min="600" max="2600" class="uniform-input" oninput="updateCurrentTableData(false)" onblur="updateCurrentTableData(true)">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span id="label-d" class="text-[10px] text-muted-custom font-bold ml-1 uppercase">對角D</span>
                            <div class="input-card">
                                <span class="tag-label tag-label-d">D</span>
                                <input type="number" id="valD" max="2990" class="uniform-input" oninput="updateCurrentTableData(false)" onblur="updateCurrentTableData(true)">
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-700/50">
                        <div>
                            <label id="ui-scaleX" class="block text-[10px] md:text-xs font-bold text-muted-custom uppercase mb-1">Scale X</label>
                            <input type="number" id="valX" step="0.0001" class="w-full bg-input-custom border border-input-custom p-2 rounded font-mono text-custom outline-none focus:ring-2 focus:ring-slate-500" oninput="updateCurrentTableData(false)">
                        </div>
                        <div>
                            <label id="ui-scaleY" class="block text-[10px] md:text-xs font-bold text-muted-custom uppercase mb-1">Scale Y</label>
                            <input type="number" id="valY" step="0.0001" class="w-full bg-input-custom border border-input-custom p-2 rounded font-mono text-custom outline-none focus:ring-2 focus:ring-slate-500" oninput="updateCurrentTableData(false)">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側控制 -->
            <div class="panel-bg p-4 md:p-6 rounded-xl shadow-xl flex flex-col">
                <h3 id="ui-list-title" class="text-lg font-bold mb-4 text-title flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
                    TABLE 數據列表
                </h3>
                
                <div class="flex-1 overflow-y-auto space-y-2 mb-6 max-h-[300px] lg:max-h-none" id="tableList"></div>

                <div class="space-y-4">
                    <div class="p-3 md:p-4 range-box rounded-lg border">
                        <p id="ui-range-label" class="font-bold text-xs text-muted-custom mb-2">加工範圍 (±X, ±Y) mm：</p>
                        <div id="wa-info" class="text-center font-bold text-lg md:text-xl text-custom bg-input-custom p-3 rounded-lg shadow-inner border border-input-custom"></div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-2">
                        <button onclick="document.getElementById('fileInput').click()" class="w-full btn-custom-secondary font-bold py-3 px-4 rounded-xl border shadow-md flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                            <span id="ui-upload-btn">上傳 table.cfg</span>
                        </button>
                        <input type="file" id="fileInput" class="hidden" accept=".cfg" onchange="handleFileUpload(event)">
                        
                        <button onclick="downloadAll()" class="w-full btn-custom-primary font-bold py-3 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            <span id="ui-download-btn">下載 table.cfg</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tableCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        let currentLang = 'zh';
        let currentTheme = 'dark'; // 預設深色模式

        const i18n = {
            zh: {
                title: "桌長配置產生器",
                scaleX: "比例 X",
                scaleY: "比例 Y",
                listTitle: "TABLE 數據列表",
                rangeLabel: "加工範圍 (±X, ±Y) mm：",
                download: "下載 table.cfg",
                upload: "上傳 table.cfg",
                table: "表格",
                sideN: "側邊N",
                sideS: "側邊S",
                sideW: "側邊W",
                sideE: "側邊E",
                sideD: "對角D",
                tooltipToLight: "切換至明亮模式",
                tooltipToDark: "切換至深色模式"
            },
            en: {
                title: "Table Configurator",
                scaleX: "Scale X",
                scaleY: "Scale Y",
                listTitle: "TABLE Data List",
                rangeLabel: "Working range (±X, ±Y) mm:",
                download: "Download table.cfg",
                upload: "Upload table.cfg",
                table: "Table",
                sideN: "Side N",
                sideS: "Side S",
                sideW: "Side W",
                sideE: "Side E",
                sideD: "Diagonal D",
                tooltipToLight: "Switch to Light Mode",
                tooltipToDark: "Switch to Dark Mode"
            }
        };

        // 預設配置符合 600 ~ 2600 限制
        let allTables = {
            1: { E: 1460, S: 2560, W: 1460, N: 2560, D: 2947, X: 1.000, Y: 1.000 },
            2: { E: 1460, S: 1340, W: 1460, N: 1340, D: 1982, X: 1.000, Y: 1.000 },
            3: { E: 1440, S: 1320, W: 1440, N: 1320, D: 1953, X: 1.000, Y: 1.000 },
            4: { E: 840, S: 1320, W: 840, N: 1320, D: 1565, X: 1.000, Y: 1.000 },
            5: { E: 840, S: 720, W: 840, N: 720, D: 1106, X: 1.000, Y: 1.000 }
        };

        let currentTableId = 1;

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            if (currentTheme === 'light') {
                document.body.classList.add('theme-light');
            } else {
                document.body.classList.remove('theme-light');
            }
            updateUI();
            draw();
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-scaleX').innerText = t.scaleX;
            document.getElementById('ui-scaleY').innerText = t.scaleY;
            document.getElementById('ui-range-label').innerText = t.rangeLabel;
            document.getElementById('ui-list-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg> ${t.listTitle}`;
            document.getElementById('ui-download-btn').innerText = t.download;
            document.getElementById('ui-upload-btn').innerText = t.upload;
            
            // 更新輸入面板標籤
            document.getElementById('label-n').innerText = t.sideN;
            document.getElementById('label-s').innerText = t.sideS;
            document.getElementById('label-w').innerText = t.sideW;
            document.getElementById('label-e').innerText = t.sideE;
            document.getElementById('label-d').innerText = t.sideD;

            // 更新按鈕提示文字 (Tooltip)
            const themeBtn = document.getElementById('theme-toggle-btn');
            if (themeBtn) {
                themeBtn.title = currentTheme === 'dark' ? t.tooltipToLight : t.tooltipToDark;
            }

            // 更新主題按鈕 SVG 圖示
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                if (currentTheme === 'dark') {
                    // Sun 圖示 (點擊變亮)
                    themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />`;
                } else {
                    // Moon 圖示 (點擊變暗)
                    themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
                }
            }

            renderTableList();
        }

        function renderTableList() {
            const list = document.getElementById('tableList');
            const t = i18n[currentLang];
            list.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const item = document.createElement('div');
                item.className = `p-3 rounded-lg cursor-pointer transition-all table-item ${currentTableId == i ? 'active-row shadow-lg' : ''}`;
                item.onclick = () => switchTable(i);
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="item-text">${t.table} ${i}</span>
                        <div class="text-right">
                             <div class="text-[10px] font-mono text-muted-custom">S: ${allTables[i].S} W: ${allTables[i].W}</div>
                             <div class="text-[10px] font-mono text-muted-custom">D: ${allTables[i].D}</div>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            }
        }

        function switchTable(id) {
            currentTableId = id;
            const data = allTables[id];
            document.getElementById('valN').value = data.N;
            document.getElementById('valS').value = data.S;
            document.getElementById('valW').value = data.W;
            document.getElementById('valE').value = data.E;
            document.getElementById('valD').value = data.D;
            document.getElementById('valX').value = data.X;
            document.getElementById('valY').value = data.Y;
            renderTableList();
            draw();
        }

        function updateCurrentTableData(forceMin = false) {
            const nInput = document.getElementById('valN');
            const sInput = document.getElementById('valS');
            const wInput = document.getElementById('valW');
            const eInput = document.getElementById('valE');
            const dInput = document.getElementById('valD');

            let nVal = parseFloat(nInput.value) || 0;
            let sVal = parseFloat(sInput.value) || 0;
            let wVal = parseFloat(wInput.value) || 0;
            let eVal = parseFloat(eInput.value) || 0;
            let dVal = parseFloat(dInput.value) || 0;

            // 即時上限值檢查
            if (nVal > 2600) { nVal = 2600; nInput.value = 2600; }
            if (sVal > 2600) { sVal = 2600; sInput.value = 2600; }
            if (wVal > 2600) { wVal = 2600; wInput.value = 2600; }
            if (eVal > 2600) { eVal = 2600; eInput.value = 2600; }
            if (dVal > 2990) { dVal = 2990; dInput.value = 2990; }

            // 失焦或強制補正下限值 (最小 600)
            if (forceMin) {
                if (nVal < 600 && nInput.value !== "") { nVal = 600; nInput.value = 600; }
                if (sVal < 600 && sInput.value !== "") { sVal = 600; sInput.value = 600; }
                if (wVal < 600 && wInput.value !== "") { wVal = 600; wInput.value = 600; }
                if (eVal < 600 && eInput.value !== "") { eVal = 600; eInput.value = 600; }
            }

            allTables[currentTableId] = {
                N: nVal,
                S: sVal,
                W: wVal,
                E: eVal,
                D: dVal,
                X: parseFloat(document.getElementById('valX').value) || 0,
                Y: parseFloat(document.getElementById('valY').value) || 0
            };
            renderTableList();
            draw();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/);
                const regex = /TABLE(\d+)([ESWNDXY])\s+([\d.]+)/i;
                lines.forEach(line => {
                    const match = line.trim().match(regex);
                    if (match) {
                        const id = parseInt(match[1]);
                        const key = match[2].toUpperCase();
                        let val = parseFloat(match[3]);

                        // 確保匯入的數據也符合限制
                        if (['E', 'S', 'W', 'N'].includes(key)) {
                            if (val < 600) val = 600;
                            if (val > 2600) val = 2600;
                        } else if (key === 'D') {
                            if (val > 2990) val = 2990;
                        }

                        if (allTables[id]) allTables[id][key] = val;
                    }
                });
                switchTable(currentTableId);
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function draw() {
            const containerWidth = container.clientWidth;
            const baseWidth = 750;
            const baseHeight = 500;
            const ratio = baseHeight / baseWidth;
            
            canvas.width = containerWidth;
            canvas.height = containerWidth * ratio;

            const w = canvas.width;
            const h = canvas.height;
            const d = allTables[currentTableId];

            // 動態讀取當前主題的 CSS 變數做為繪圖顏色
            const style = getComputedStyle(document.body);
            const canvasBg = style.getPropertyValue('--canvas-bg').trim();
            const canvasStroke = style.getPropertyValue('--canvas-stroke').trim();
            const canvasWaFill = style.getPropertyValue('--canvas-wa-fill').trim();
            const canvasWaStroke = style.getPropertyValue('--canvas-wa-stroke').trim();
            const canvasDashStroke = style.getPropertyValue('--canvas-dash-stroke').trim();
            const canvasDDashStroke = style.getPropertyValue('--canvas-d-dash-stroke').trim();
            const canvasCornerFill = style.getPropertyValue('--canvas-corner-fill').trim();
            const canvasDotFill = style.getPropertyValue('--canvas-dot-fill').trim();
            const canvasTextFill = style.getPropertyValue('--canvas-text-fill').trim();
            const canvasMachineHighlight = style.getPropertyValue('--canvas-machine-highlight').trim();

            const maxVal = Math.max(d.S, d.N, d.W, d.E, d.D);
            const scale = (w * 0.8) / (maxVal || 1); 

            let cosTheta = (Math.pow(d.W, 2) + Math.pow(d.S, 2) - Math.pow(d.D, 2)) / (2 * d.W * d.S || 1);
            cosTheta = Math.max(-1, Math.min(1, cosTheta)); 
            const theta = Math.acos(cosTheta);

            const pBL = { x: 0, y: 0 };
            const pBR = { x: d.S * scale, y: 0 };
            const pTL = { 
                x: d.W * scale * Math.cos(theta), 
                y: -d.W * scale * Math.sin(theta) 
            };

            const dx = pBR.x - pTL.x;
            const dy = pBR.y - pTL.y;
            const angleD = Math.atan2(dy, dx);

            let cosPhi = (Math.pow(d.N, 2) + Math.pow(d.D, 2) - Math.pow(d.E, 2)) / (2 * d.N * d.D || 1);
            cosPhi = Math.max(-1, Math.min(1, cosPhi));
            const phi = Math.acos(cosPhi);

            const pTR = {
                x: pTL.x + d.N * scale * Math.cos(angleD - phi),
                y: pTL.y + d.N * scale * Math.sin(angleD - phi)
            };

            const minX = Math.min(pBL.x, pBR.x, pTL.x, pTR.x);
            const maxX = Math.max(pBL.x, pBR.x, pTL.x, pTR.x);
            const minY = Math.min(pBL.y, pBR.y, pTL.y, pTR.y);
            const maxY = Math.max(pBL.y, pBR.y, pTL.y, pTR.y);

            const offsetX = (w - (maxX - minX)) / 2 - minX;
            const offsetY = (h - (maxY - minY)) / 2 - minY;

            const pts = {
                BL: { x: pBL.x + offsetX, y: pBL.y + offsetY },
                BR: { x: pBR.x + offsetX, y: pBR.y + offsetY },
                TL: { x: pTL.x + offsetX, y: pTL.y + offsetY },
                TR: { x: pTR.x + offsetX, y: pTR.y + offsetY }
            };

            const centerX = (pts.TL.x + pts.BR.x) / 2;
            const centerY = (pts.TL.y + pts.BR.y) / 2;

            ctx.clearRect(0, 0, w, h);

            // 繪製桌面背景
            ctx.fillStyle = canvasBg;
            ctx.beginPath();
            ctx.moveTo(pts.TL.x, pts.TL.y); 
            ctx.lineTo(pts.TR.x, pts.TR.y);
            ctx.lineTo(pts.BR.x, pts.BR.y); 
            ctx.lineTo(pts.BL.x, pts.BL.y);
            ctx.closePath(); 
            ctx.fill();
            ctx.strokeStyle = canvasStroke; ctx.lineWidth = 2; ctx.stroke();

            // 加工範圍計算
            const tan15 = Math.tan(15 * Math.PI / 180);
            let xVal = 100 + (d.S / 2) - ((d.W - 240) / 2 * tan15);
            let yVal = 100 + (d.W / 2) - ((d.S - 240) / 2 * tan15);
            const xMax = d.S / 2 - 200;
            const yMax = d.W / 2 - 200;
            const xDisp = Math.round(xVal > xMax ? xMax : xVal);
            const yDisp = Math.round(yVal > yMax ? yMax : yVal);

            const pxLeft  = -xDisp * scale;
            const pxRight = xDisp * scale;
            const pxUp    = yDisp * scale;
            const pxDown  = -yDisp * scale;

            ctx.save();
            ctx.fillStyle = canvasWaFill;
            ctx.strokeStyle = canvasWaStroke;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.rect(centerX + pxLeft, centerY - pxUp, pxRight - pxLeft, pxUp - pxDown);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            document.getElementById('wa-info').innerText = `(±${xDisp}, ±${yDisp})`;

            // 繪製線條
            ctx.save();
            ctx.setLineDash([8, 6]);
            ctx.strokeStyle = canvasDashStroke;
            ctx.lineWidth = Math.max(1.5, 2 * (w / baseWidth));
            line(pts.TL.x, pts.TL.y, pts.TR.x, pts.TR.y); // N
            line(pts.BL.x, pts.BL.y, pts.BR.x, pts.BR.y); // S
            line(pts.TL.x, pts.TL.y, pts.BL.x, pts.BL.y); // W
            line(pts.TR.x, pts.TR.y, pts.BR.x, pts.BR.y); // E
            ctx.strokeStyle = canvasDDashStroke;
            line(pts.TL.x, pts.TL.y, pts.BR.x, pts.BR.y); // D
            ctx.restore();

            // 繪製標註文字 (標示 N/S/W/E/D)
            ctx.fillStyle = canvasTextFill;
            ctx.font = "bold 12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("N", (pts.TL.x + pts.TR.x) / 2, (pts.TL.y + pts.TR.y) / 2 - 10);
            ctx.fillText("S", (pts.BL.x + pts.BR.x) / 2, (pts.BL.y + pts.BR.y) / 2 + 20);
            ctx.fillText("W", (pts.TL.x + pts.BL.x) / 2 - 15, (pts.TL.y + pts.BL.y) / 2);
            ctx.fillText("E", (pts.TR.x + pts.BR.x) / 2 + 15, (pts.TR.y + pts.BR.y) / 2);
            
            // 對角線 D 的標籤
            ctx.save();
            ctx.fillStyle = canvasTextFill; 
            ctx.fillText("D", (pts.TL.x + pts.BR.x) / 2 - 30, (pts.TL.y + pts.BR.y) / 2 - 30);
            ctx.restore();

            drawCorner(pts.TL.x, pts.TL.y, 0, w/baseWidth, canvasCornerFill);
            drawCorner(pts.TR.x, pts.TR.y, Math.PI / 2, w/baseWidth, canvasCornerFill);
            drawCorner(pts.BR.x, pts.BR.y, Math.PI, w/baseWidth, canvasCornerFill);
            drawCorner(pts.BL.x, pts.BL.y, -Math.PI / 2, w/baseWidth, canvasCornerFill);

            ctx.fillStyle = canvasDotFill;
            Object.values(pts).forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 4 * (w/baseWidth), 0, Math.PI * 2); ctx.fill();
            });

            drawMachine(centerX, centerY, w/baseWidth, canvasMachineHighlight);
        }

        function drawMachine(cx, cy, s, highlightColor) {
            ctx.save();
            ctx.translate(cx, cy); ctx.scale(s, s);
            ctx.fillStyle = '#000000';
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-33, -10, 66, 20); ctx.fillRect(-10, -33, 20, 66);
            ctx.rotate(-Math.PI / 4);
            ctx.fillRect(-7,-10,14,-15);
            ctx.strokeStyle = highlightColor; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath(); ctx.arc(0, 15, 5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function line(x1, y1, x2, y2) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        function drawCorner(x, y, rot, s, cornerColor) {
            ctx.save();
            ctx.translate(x, y); ctx.rotate(rot); ctx.scale(s, s);
            ctx.fillStyle = cornerColor || '#475569';
            ctx.beginPath(); 
            ctx.moveTo(0,0); ctx.lineTo(15,0); ctx.lineTo(15,5); ctx.lineTo(5,15); ctx.lineTo(0,15); 
            ctx.closePath(); ctx.fill(); 
            ctx.restore();
        }

        function downloadAll() {
            // 下載前進行最後的限制掃描與修正，確保輸出文件合規
            for (let i = 1; i <= 5; i++) {
                const d = allTables[i];
                if (d.E < 600) d.E = 600; if (d.E > 2600) d.E = 2600;
                if (d.S < 600) d.S = 600; if (d.S > 2600) d.S = 2600;
                if (d.W < 600) d.W = 600; if (d.W > 2600) d.W = 2600;
                if (d.N < 600) d.N = 600; if (d.N > 2600) d.N = 2600;
                if (d.D > 2990) d.D = 2990;
            }
            
            let out = "";
            for (let i = 1; i <= 5; i++) {
                const d = allTables[i];
                out += `TABLE${i}E ${d.E}\nTABLE${i}S ${d.S}\nTABLE${i}W ${d.W}\nTABLE${i}N ${d.N}\nTABLE${i}D ${d.D}\nTABLE${i}X ${d.X.toFixed(4)}\nTABLE${i}Y ${d.Y.toFixed(4)}\n\n`;
            }
            const blob = new Blob([out], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'table.cfg'; a.click();
            URL.revokeObjectURL(url);
        }

        window.addEventListener('resize', draw);
        window.onload = () => { updateUI(); switchTable(1); };
    </script>

                    .catch((err) => console.error('Service Worker registration failed: ', err));
