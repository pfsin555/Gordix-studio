<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-code Editor & Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-green: #10b981;
            --accent-green: #059669;
            
            /* 暗色主題 (預設) */
            --bg-color: #111827; 
            --panel-dark: #1f2937;
            --preview-bg: #000000;
            --input-bg: #374151;
            --input-text: #ffffff;
            --input-border: #4b5563;
            --label-color: #d1d5db;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --panel-border: #374151;
            --body-text: #f3f4f6;
            --btn-secondary-bg: #374151;
            --btn-secondary-text: #e5e7eb;
            --btn-secondary-hover: #4b5563;
            --btn-secondary-border: #4b5563;
            
            --alert-bg: rgba(16, 185, 129, 0.15);
            --alert-border: rgba(16, 185, 129, 0.3);
            --alert-text: #34d399;
        }

        body.light-theme {
            /* 亮色主題 */
            --bg-color: #f3f4f6; 
            --panel-dark: #ffffff;
            --preview-bg: #f9fafb;
            --input-bg: #ffffff;
            --input-text: #111827;
            --input-border: #cbd5e1;
            --label-color: #374151;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --panel-border: #e2e8f0;
            --body-text: #1e293b;
            --btn-secondary-bg: #f1f5f9;
            --btn-secondary-text: #334155;
            --btn-secondary-hover: #e2e8f0;
            --btn-secondary-border: #cbd5e1;
            
            --alert-bg: #ecfdf5;
            --alert-border: #a7f3d0;
            --alert-text: #047857;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--body-text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        #preview-container { 
            width: 100%; 
            height: 450px; 
            background-color: var(--preview-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid var(--panel-border); 
            transition: background-color 0.3s, border-color 0.3s;
        }
        @media (min-width: 1024px) {
            #preview-container { height: calc(100vh - 120px); min-height: 500px; }
        }

        /* 雙主題控制面板卡片 */
        .controls-card { 
            background: var(--panel-dark); 
            padding: 1rem; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px -1px var(--card-shadow); 
            border-top: 3px solid var(--primary-green); 
            border-left: 1px solid var(--panel-border);
            border-right: 1px solid var(--panel-border);
            border-bottom: 1px solid var(--panel-border);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* 統一的主題化次級按鈕 */
        .btn-secondary {
            background-color: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            border: 1px solid var(--btn-secondary-border);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: var(--btn-secondary-hover);
        }

        /* 主題化資訊整合卡片 */
        .info-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--panel-border);
            color: var(--body-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        /* 主題化警告提示框 */
        .alert-success {
            background-color: var(--alert-bg);
            border: 1px solid var(--alert-border);
            color: var(--alert-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .btn-green { background-color: var(--primary-green); color: #064e3b; transition: all 0.2s; }
        .btn-green:hover { background-color: var(--accent-green); transform: translateY(-1px); }
        .btn-green:disabled { background-color: #4b5563; color: #9ca3af; cursor: not-allowed; transform: none; }
        
        .label-text { color: var(--label-color); font-weight: 600; font-size: 0.8rem; transition: color 0.3s; }
        canvas { display: block; }
        
        /* 雙主題輸入框 */
        input[type="number"], input[type="range"] {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--input-text);
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
            border-radius: 0.375rem;
            transition: all 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-green);
            ring: 1px solid var(--primary-green);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="pb-4">

<!-- 頂部導航：導入 1.html 精緻綠色漸層風格 -->
<div class="bg-gradient-to-r from-emerald-600 to-teal-950 p-5 text-white flex justify-between items-center border-b border-emerald-500/30 shadow-lg mb-4">
    <div>
        <h1 id="txt-header-title" class="text-2xl font-black tracking-tight">
            Gcode 即時調整
        </h1>
    </div>
    <div class="flex gap-3 items-center">
        <!-- 明暗主題切換 -->
        <button onclick="toggleTheme()" class="p-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center justify-center" aria-label="Toggle Theme">
            <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- 圖示由 JS 動態注入 -->
            </svg>
        </button>
        <!-- 語系切換 -->
        <button id="langBtn" onclick="toggleLanguage()" class="px-3 py-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center gap-2">
            EN
        </button>
        <span class="text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/20 font-mono">V0.8</span>
    </div>
</div>

<div class="container mx-auto px-4 max-w-7xl">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- 左側控制面板 -->
        <div class="lg:col-span-3 space-y-4 order-2 lg:order-1">
            
            <!-- 1. 檔案上傳 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-upload">1. 檔案上傳</span>
                </h2>
                <div class="flex flex-col gap-2">
                    <button onclick="document.getElementById('fileInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-sm flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span id="txt-btn-upload">選擇 G-code 檔案</span>
                    </button>
                    <input type="file" id="fileInput" accept=".gcode,.nc,.txt" class="hidden" />
                    <div id="fileInfo" class="p-2 alert-success rounded text-[10px] font-bold hidden truncate">
                        <span id="txt-file-name">檔名</span>: <span id="fileNameDisplay" class="opacity-90">-</span>
                    </div>
                </div>
            </div>

            <!-- 2. 參數調整 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3 flex items-center">
                    <span id="txt-sec-params">2. 參數調整 (不影響 Z/F)</span>
                </h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <label class="label-text block mb-1" id="txt-label-scale">縮放比例 (僅限 XY)</label>
                            <input type="number" id="scaleInput" value="1" step="0.1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-ox">X 偏移</label>
                            <input type="number" id="offsetX" value="0" step="1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-oy">Y 偏移</label>
                            <input type="number" id="offsetY" value="0" step="1" class="w-full">
                        </div>
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-rot">旋轉角度 (Z軸中心)</label>
                        <input type="number" id="rotationInput" value="0" step="1" class="w-full">
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-res">解析度 (最小 XY 位移 mm)</label>
                        <input type="number" id="resInput" value="0.1" min="0.1" step="0.1" class="w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1">
                        <button id="centerBtn" class="btn-secondary font-bold py-2 rounded transition text-xs">自動置中</button>
                        <button id="applyBtn" class="btn-green font-bold py-2 rounded shadow-sm text-xs">更新預覽</button>
                    </div>
                </div>
            </div>

            <!-- 3. 參考底圖 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-refimg">3. 參考底圖 (選填)</span>
                </h2>
                <div class="space-y-3">
                    <button onclick="document.getElementById('imageInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-xs flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span id="txt-btn-upload-img">選擇參考圖片</span>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" />
                    
                    <div id="imgControls" class="space-y-2 hidden">
                        <div>
                            <label class="label-text block mb-1" id="txt-label-imgwidth">圖片實際寬度 (mm)</label>
                            <input type="number" id="imgWidthInput" value="100" min="1" step="10" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="label-text" id="txt-label-imgopacity">不透明度</label>
                                <span id="opacityVal" class="text-xs text-emerald-400 font-mono">0.5</span>
                            </div>
                            <input type="range" id="imgOpacityInput" min="0.1" max="1.0" step="0.05" value="0.5" class="w-full accent-emerald-500">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. 加工預估 & 下載 -->
            <div class="info-card rounded-lg p-4 shadow-xl space-y-3 border-t-4 border-emerald-500">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider" id="txt-info-time">預估時間</p>
                        <p class="text-sm font-mono font-bold text-emerald-400" id="timeEst">0 min 0 sec</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider" id="txt-info-dist">路徑長度</p>
                        <p class="text-sm font-mono font-bold" id="distContainer"><span id="distEst">0</span> <span class="text-[10px] text-gray-500">mm</span></p>
                    </div>
                </div>
                <button id="downloadBtn" class="w-full bg-emerald-500 text-gray-900 py-3 rounded-lg font-black text-xs uppercase hover:bg-emerald-400 transition shadow-lg disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed" disabled>
                    下載修改後的 G-code
                </button>
            </div>
        </div>

        <!-- 3D 預覽區域 -->
        <div class="lg:col-span-9 order-1 lg:order-2">
            <div id="preview-container" class="shadow-2xl ring-1 ring-gray-700">
                <div class="absolute top-3 right-3 z-10">
                    <div class="bg-black/80 backdrop-blur-md text-emerald-400 px-3 py-1 rounded-full text-[9px] font-black border border-emerald-500/30" id="txt-preview-hint">
                        3D REALTIME VIEW
                    </div>
                </div>
                <div class="absolute bottom-3 left-3 z-10 text-gray-400 text-[9px] space-y-0.5 bg-black/60 p-2 rounded-lg backdrop-blur-sm border border-white/5">
                    <p id="txt-mouse-l" class="flex items-center"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>左鍵: 旋轉</p>
                    <p id="txt-mouse-r" class="flex items-center"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>右鍵: 平移</p>
                    <p id="txt-mouse-w" class="flex items-center"><span class="w-1.5 h-1.5 bg-white rounded-full mr-1.5"></span>滾輪: 縮放</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 語言配置 ---
    const i18n = {
        zh: {
            headerTitle: "Gcode 即時調整",
            langBtn: "EN",
            secUpload: "1. 檔案上傳",
            btnUpload: "選擇 G-code 檔案",
            fileName: "檔名",
            secParams: "2. 參數調整 (不影響 Z/F)",
            labelScale: "縮放比例 (僅 XY)",
            labelOX: "X 偏移 (mm)",
            labelOY: "Y 偏移 (mm)",
            labelRot: "旋轉角度 (Z軸中心)",
            labelRes: "解析度 (最小 XY 位移 mm)",
            secRefImg: "3. 參考底圖 (選填)",
            btnUploadImg: "選擇參考圖片",
            labelImgWidth: "圖片實際寬度 (mm)",
            labelImgOpacity: "不透明度",
            btnCenter: "自動置中",
            btnUpdate: "更新預覽",
            infoTime: "預估時間",
            infoDist: "路徑長度",
            btnDownload: "下載修改後的 G-code",
            mouseL: "左鍵: 旋轉",
            mouseR: "右鍵: 平移",
            mouseW: "滾輪: 縮放",
            unitMin: "分",
            unitSec: "秒"
        },
        en: {
            headerTitle: "Gcode Adjuster",
            langBtn: "中文",
            secUpload: "1. File Upload",
            btnUpload: "Choose G-code File",
            fileName: "File",
            secParams: "2. Parameters (Fixed Z/F)",
            labelScale: "Scale (XY Only)",
            labelOX: "X Offset",
            labelOY: "Y Offset",
            labelRot: "Rotation (Z-Axis)",
            labelRes: "Resolution (Min XY mm)",
            secRefImg: "3. Reference Image (Optional)",
            btnUploadImg: "Choose Reference Image",
            labelImgWidth: "Image Width (mm)",
            labelImgOpacity: "Opacity",
            btnCenter: "Auto Center",
            btnUpdate: "Update",
            infoTime: "Est. Time",
            infoDist: "Total Path",
            btnDownload: "Download Processed G-code",
            mouseL: "L-Click: Rotate",
            mouseR: "R-Click: Pan",
            mouseW: "Wheel: Zoom",
            unitMin: "min",
            unitSec: "sec"
        }
    };

    let currentLang = 'zh';
    let lastTimeSec = 0, lastDistance = 0;
    let scene, camera, renderer, gcodeGroup, grid;
    let originalGcode = "";
    let originalFileName = "output";

    // 參考圖片 Three.js 物件
    let refMesh = null;
    let refAspect = 1.0;

    // --- 語言切換核心 ---
    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        updateLanguage();
    }

    function updateLanguage() {
        const lang = i18n[currentLang];
        document.getElementById('txt-header-title').innerText = lang.headerTitle;
        document.getElementById('langBtn').innerText = lang.langBtn;
        document.getElementById('txt-sec-upload').innerText = lang.secUpload;
        document.getElementById('txt-btn-upload').innerText = lang.btnUpload;
        document.getElementById('txt-file-name').innerText = lang.fileName;
        document.getElementById('txt-sec-params').innerText = lang.secParams;
        document.getElementById('txt-label-scale').innerText = lang.labelScale;
        document.getElementById('txt-label-ox').innerText = lang.labelOX;
        document.getElementById('txt-label-oy').innerText = lang.labelOY;
        document.getElementById('txt-label-rot').innerText = lang.labelRot;
        document.getElementById('txt-label-res').innerText = lang.labelRes;
        document.getElementById('txt-sec-refimg').innerText = lang.secRefImg;
        document.getElementById('txt-btn-upload-img').innerText = lang.btnUploadImg;
        document.getElementById('txt-label-imgwidth').innerText = lang.labelImgWidth;
        document.getElementById('txt-label-imgopacity').innerText = lang.labelImgOpacity;
        document.getElementById('centerBtn').innerText = lang.btnCenter;
        document.getElementById('applyBtn').innerText = lang.btnUpdate;
        document.getElementById('txt-info-time').innerText = lang.infoTime;
        document.getElementById('txt-info-dist').innerText = lang.infoDist;
        document.getElementById('downloadBtn').innerText = lang.btnDownload;
        document.getElementById('txt-mouse-l').innerHTML = `<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>${lang.mouseL}`;
        document.getElementById('txt-mouse-r').innerHTML = `<span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>${lang.mouseR}`;
        document.getElementById('txt-mouse-w').innerHTML = `<span class="w-1.5 h-1.5 bg-white rounded-full mr-1.5"></span>${lang.mouseW}`;
        
        displayStats(lastTimeSec, lastDistance);
    }

    function displayStats(timeSec, dist) {
        lastTimeSec = timeSec; lastDistance = dist;
        const lang = i18n[currentLang];
        const mins = Math.floor(timeSec / 60);
        const secs = Math.round(timeSec % 60);
        document.getElementById('timeEst').innerText = `${mins} ${lang.unitMin} ${secs} ${lang.unitSec}`;
        document.getElementById('distEst').innerText = dist.toFixed(2);
    }

    // --- 主題切換邏輯 ---
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        const currentTheme = isLight ? 'light' : 'dark';
        localStorage.setItem('gcode-editor-theme', currentTheme);
        updateThemeIcon(currentTheme);
        updateThreeGrid();
    }

    function updateThemeIcon(currentTheme) {
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) {
            if (currentTheme === 'dark') {
                // Sun 圖示 (點擊變亮)
                themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />`;
            } else {
                // Moon 圖示 (點擊變暗)
                themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
            }
        }
    }

    function updateThreeGrid() {
        if (!scene || !grid) return;
        scene.remove(grid);
        const isLight = document.body.classList.contains('light-theme');
        
        const gridColor = isLight ? 0xcccccc : 0x222222;
        const centerColor = isLight ? 0x059669 : 0x10b981;
        
        grid = new THREE.GridHelper(2000, 40, centerColor, gridColor);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);
    }

    function initThree() {
        const container = document.getElementById('preview-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(200, 500, 300);
        scene.add(light);

        grid = new THREE.GridHelper(2000, 40, 0x10b981, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        camera.position.set(200, -200, 200);
        camera.up.set(0, 0, 1);
        camera.lookAt(0, 0, 0);

        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };

        const handleMove = (x, y, buttons) => {
            if (!isDragging) return;
            const deltaX = x - previousMouse.x;
            const deltaY = y - previousMouse.y;
            if (buttons === 1) {
                const offset = new THREE.Vector3().subVectors(camera.position, new THREE.Vector3(0,0,0));
                const radius = offset.length();
                let phi = Math.atan2(offset.y, offset.x) - deltaX * 0.005;
                let theta = Math.acos(offset.z / radius) - deltaY * 0.005;
                theta = Math.max(0.01, Math.min(Math.PI - 0.01, theta));
                camera.position.x = radius * Math.sin(theta) * Math.cos(phi);
                camera.position.y = radius * Math.sin(theta) * Math.sin(phi);
                camera.position.z = radius * Math.cos(theta);
            } else if (buttons === 2) {
                camera.position.x -= deltaX * 0.1;
                camera.position.y += deltaY * 0.1;
            }
            camera.lookAt(0,0,0);
            previousMouse = { x, y };
        };

        container.addEventListener('mousedown', e => { isDragging = true; previousMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY, e.buttons));
        container.addEventListener('wheel', e => {
            if (e.deltaY > 0) camera.position.multiplyScalar(1.1);
            else camera.position.divideScalar(1.1);
            camera.lookAt(0,0,0);
        });
        container.oncontextmenu = e => e.preventDefault();

        animate();
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

    function parseGcode(text) {
        const lines = text.split('\n');
        let currentPos = { x: 0, y: 0, z: 0, f: 1000 };
        const pathData = [];
        lines.forEach((line, index) => {
            const cmd = line.trim().toUpperCase();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) return;
            if (cmd.startsWith('G0') || cmd.startsWith('G1')) {
                let nX = currentPos.x, nY = currentPos.y, nZ = currentPos.z, hM = false;
                const parts = cmd.split(/[\s;]/);
                parts.forEach(p => {
                    if (p.startsWith('X')) { nX = parseFloat(p.substring(1)); hM = true; }
                    if (p.startsWith('Y')) { nY = parseFloat(p.substring(1)); hM = true; }
                    if (p.startsWith('Z')) { nZ = parseFloat(p.substring(1)); hM = true; }
                    if (p.startsWith('F')) { currentPos.f = parseFloat(p.substring(1)); }
                });
                if (hM) {
                    pathData.push({ from: {...currentPos}, to: {x: nX, y: nY, z: nZ}, f: currentPos.f, type: cmd.substring(0, 2), lineIdx: index });
                    currentPos.x = nX; currentPos.y = nY; currentPos.z = nZ;
                }
            }
        });
        return pathData;
    }

    function processAndPreview() {
        if (!originalGcode) return;
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        const pathData = parseGcode(originalGcode);
        if (gcodeGroup) scene.remove(gcodeGroup);
        gcodeGroup = new THREE.Group();
        const mat = new THREE.LineBasicMaterial({ color: 0x10b981 });

        let totalDist = 0, totalTime = 0, lastP = { x: 0, y: 0, z: 0 }, isF = true;

        pathData.forEach((seg, idx) => {
            const trans = (p) => ({
                x: (p.x * Math.cos(rotRad) - p.y * Math.sin(rotRad)) * scale + offX,
                y: (p.x * Math.sin(rotRad) + p.y * Math.cos(rotRad)) * scale + offY,
                z: p.z
            });

            const p2 = trans(seg.to);
            const dXY = Math.sqrt((p2.x - lastP.x)**2 + (p2.y - lastP.y)**2);
            const zM = Math.abs(seg.to.z - lastP.z) > 0.0001;
            const isLast = (idx === pathData.length - 1);

            if (!isF && seg.type === 'G1' && dXY < res && !zM && !isLast) return;

            const p1 = isF ? trans(seg.from) : { ...lastP };
            const segD = Math.sqrt((p2.x - p1.x)**2 + (p2.y - p1.y)**2 + (p2.z - p1.z)**2);
            totalDist += segD;
            if (seg.f > 0) totalTime += segD / (seg.f / 60);

            const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)]);
            gcodeGroup.add(new THREE.Line(geo, mat));
            lastP = { ...p2 }; isF = false;
        });

        displayStats(totalTime, totalDist);
        scene.add(gcodeGroup);
        document.getElementById('downloadBtn').disabled = false;
    }

    function generateGcode() {
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        let lastX = 0, lastY = 0, lastZ = 0, isF = true;
        const lines = originalGcode.split('\n');
        
        let lastMoveIdx = -1;
        lines.forEach((l, i) => {
            const up = l.trim().toUpperCase();
            if (up.startsWith('G0') || up.startsWith('G1')) {
                const xM = l.match(/X/i), yM = l.match(/Y/i), zM = l.match(/Z/i);
                if (xM || yM || zM) lastMoveIdx = i;
            }
        });

        const output = [];
        lines.forEach((line, i) => {
            let cmd = line.trim();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) { output.push(line); return; }

            const up = cmd.toUpperCase();
            if (up.startsWith('G0') || up.startsWith('G1')) {
                const isG1 = up.startsWith('G1');
                const xM = cmd.match(/X([-+]?[0-9]*\.?[0-9]+)/i);
                const yM = cmd.match(/Y([-+]?[0-9]*\.?[0-9]+)/i);
                const zM = cmd.match(/Z([-+]?[0-9]*\.?[0-9]+)/i);
                const fM = cmd.match(/F([-+]?[0-9]*\.?[0-9]+)/i);

                if (!xM && !yM && !zM && !fM) { output.push(line); return; }

                let rX = xM ? parseFloat(xM[1]) : lastX;
                let rY = yM ? parseFloat(yM[1]) : lastY;
                let rZ = zM ? parseFloat(zM[1]) : lastZ;

                let fX = (rX * Math.cos(rotRad) - rY * Math.sin(rotRad)) * scale + offX;
                let fY = (rX * Math.sin(rotRad) + rY * Math.cos(rotRad)) * scale + offY;
                let fZ = rZ;

                const dXY = Math.sqrt((fX - lastX)**2 + (fY - lastY)**2);
                const zChanged = zM !== null && Math.abs(rZ - lastZ) > 0.0001;
                const fChanged = fM !== null;
                const isLastMove = (i === lastMoveIdx);

                if (!isF && isG1 && dXY < res && !zChanged && !fChanged && !isLastMove) return;

                let nL = cmd;
                if (xM) nL = nL.replace(/X([-+]?[0-9]*\.?[0-9]+)/i, `X${fX.toFixed(4)}`);
                if (yM) nL = nL.replace(/Y([-+]?[0-9]*\.?[0-9]+)/i, `Y${fY.toFixed(4)}`);
                if (zM) nL = nL.replace(/Z([-+]?[0-9]*\.?[0-9]+)/i, `Z${fZ.toFixed(4)}`);
                if (fM) nL = nL.replace(/F([-+]?[0-9]*\.?[0-9]+)/i, `F${fM[1]}`);
                
                lastX = fX; lastY = fY; lastZ = fZ; isF = false;
                output.push(nL);
            } else {
                output.push(line);
            }
        });
        return output.join('\n');
    }

    // --- 參考背景圖加載與處理 ---
    function handleImageLoad(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                refAspect = img.height / img.width;
                
                const loader = new THREE.TextureLoader();
                loader.load(e.target.result, function(texture) {
                    if (refMesh) scene.remove(refMesh);

                    const geo = new THREE.PlaneGeometry(1, 1);
                    const mat = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        opacity: parseFloat(document.getElementById('imgOpacityInput').value),
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    refMesh = new THREE.Mesh(geo, mat);
                    refMesh.position.set(0, 0, -0.2);

                    updateImageDimensions();
                    scene.add(refMesh);

                    document.getElementById('imgControls').classList.remove('hidden');
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateImageDimensions() {
        if (!refMesh) return;
        const width = parseFloat(document.getElementById('imgWidthInput').value) || 100;
        refMesh.scale.set(width, width * refAspect, 1);
    }

    // --- 初始化綁定與系統偏好載入 ---
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        originalFileName = file.name.split('.').slice(0, -1).join('.');
        document.getElementById('fileNameDisplay').innerText = file.name;
        document.getElementById('fileInfo').classList.remove('hidden');
        const r = new FileReader(); r.onload = ev => { originalGcode = ev.target.result; processAndPreview(); }; r.readAsText(file);
    });

    document.getElementById('imageInput').addEventListener('change', handleImageLoad);
    document.getElementById('imgWidthInput').addEventListener('input', updateImageDimensions);
    
    document.getElementById('imgOpacityInput').addEventListener('input', e => {
        const val = parseFloat(e.target.value);
        document.getElementById('opacityVal').innerText = val.toFixed(2);
        if (refMesh) {
            refMesh.material.opacity = val;
        }
    });

    document.getElementById('applyBtn').addEventListener('click', processAndPreview);
    document.getElementById('centerBtn').addEventListener('click', () => {
        if (!originalGcode) return;
        const p = parseGcode(originalGcode), s = parseFloat(document.getElementById('scaleInput').value) || 1;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        p.forEach(seg => {
            minX = Math.min(minX, seg.to.x, seg.from.x); maxX = Math.max(maxX, seg.to.x, seg.from.x);
            minY = Math.min(minY, seg.to.y, seg.from.y); maxY = Math.max(maxY, seg.to.y, seg.from.y);
        });
        document.getElementById('offsetX').value = (-( (minX+maxX)/2 * s)).toFixed(2);
        document.getElementById('offsetY').value = (-( (minY+maxY)/2 * s)).toFixed(2);
        processAndPreview();
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const b = new Blob([generateGcode()], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `${originalFileName}_re.gcode`; a.click();
    });

    window.addEventListener('resize', () => {
        const c = document.getElementById('preview-container');
        camera.aspect = c.clientWidth / c.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(c.clientWidth, c.clientHeight);
    });

    window.onload = () => {
        initThree();
        
        // 載入主題偏好
        const savedTheme = localStorage.getItem('gcode-editor-theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        
        updateThemeIcon(savedTheme);
        updateThreeGrid();
        updateLanguage(); // 根據 currentLang ('zh') 進行初始文字渲染
    };
</script>
