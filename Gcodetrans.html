    // --- 尋找標準幾何圓弧圓心 ---
    function findArcCenter(p1, p2, I, J, R, isCW) {
        if (I !== null && J !== null) {
            return { x: p1.x + I, y: p1.y + J };
        }
        if (R !== null) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d === 0) return { x: p1.x, y: p1.y };
            
            let r = Math.abs(R);
            if (r < d / 2) {
                r = d / 2 + 0.0001;
            }
            const h = Math.sqrt(r * r - (d / 2) * (d / 2));
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nx = -dy / d;
            const ny = dx / d;

            let factor = (isCW ? 1 : -1) * (R < 0 ? -1 : 1);
            return {
                x: mx + factor * h * nx,
                y: my + factor * h * ny
            };
        }
        return null;
    }

    function initThree() {
        const container = document.getElementById('preview-container');
        scene = new THREE.Scene();
        cameraTarget = new THREE.Vector3(0, 0, 0); // 初始化相機焦點
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(200, 500, 300);
        scene.add(light);

        grid = new THREE.GridHelper(2000, 40, 0x10b981, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        camera.position.set(200, -200, 200);
        camera.up.set(0, 0, 1);
        camera.lookAt(cameraTarget);

        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };

        // 核心交互平移旋轉邏輯
        const handleMove = (x, y, buttons) => {
            if (!isDragging) return;
            const deltaX = x - previousMouse.x;
            const deltaY = y - previousMouse.y;
            
            if (buttons === 1) { // 1. 旋轉 (繞著 cameraTarget)
                const offset = new THREE.Vector3().subVectors(camera.position, cameraTarget);
                const radius = offset.length();
                let phi = Math.atan2(offset.y, offset.x) - deltaX * 0.005;
                let theta = Math.acos(offset.z / radius) - deltaY * 0.005;
                theta = Math.max(0.01, Math.min(Math.PI - 0.01, theta));
                
                camera.position.x = cameraTarget.x + radius * Math.sin(theta) * Math.cos(phi);
                camera.position.y = cameraTarget.y + radius * Math.sin(theta) * Math.sin(phi);
                camera.position.z = cameraTarget.z + radius * Math.cos(theta);
            } else if (buttons === 2) { // 2. 右鍵平移 (基於當前相機姿態)
                const factor = 0.0015 * camera.position.distanceTo(cameraTarget);
                const localRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
                
                const panOffset = new THREE.Vector3()
                    .addScaledVector(localRight, -deltaX * factor)
                    .addScaledVector(localUp, deltaY * factor);
                
                camera.position.add(panOffset);
                cameraTarget.add(panOffset);
            }
            camera.lookAt(cameraTarget);
            previousMouse = { x, y };
        };

        // --- 電腦滑鼠監聽 ---
        container.addEventListener('mousedown', e => { 
            isDragging = true; 
            previousMouse = { x: e.clientX, y: e.clientY }; 
        });
        window.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mousemove', e => {
            handleMove(e.clientX, e.clientY, e.buttons);
        });
        container.addEventListener('wheel', e => {
            const dir = new THREE.Vector3().subVectors(camera.position, cameraTarget).normalize();
            const dist = camera.position.distanceTo(cameraTarget);
            const newDist = e.deltaY > 0 ? dist * 1.1 : dist / 1.1;
            camera.position.copy(cameraTarget).addScaledVector(dir, newDist);
            camera.lookAt(cameraTarget);
        });
        container.oncontextmenu = e => { e.preventDefault(); };

        // --- 手機/行動觸控端監聽 ---
        let initialPinchDist = 0;
        let initialCamRadius = 0;

        container.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDist = Math.sqrt(dx * dx + dy * dy);
                
                const offset = new THREE.Vector3().subVectors(camera.position, cameraTarget);
                initialCamRadius = offset.length();

                previousMouse = {
                    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                };
            }
        }, { passive: true });

        container.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && isDragging) {
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                handleMove(x, y, 1);
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (initialPinchDist > 0 && dist > 10) {
                    const factor = initialPinchDist / dist;
                    const newRadius = Math.max(10, Math.min(1500, initialCamRadius * factor));
                    const dir = new THREE.Vector3().subVectors(camera.position, cameraTarget).normalize();
                    camera.position.copy(cameraTarget).addScaledVector(dir, newRadius);
                }

                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const deltaX = midX - previousMouse.x;
                const deltaY = midY - previousMouse.y;
                
                const factor = 0.0015 * camera.position.distanceTo(cameraTarget);
                const localRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
                
                const panOffset = new THREE.Vector3()
                    .addScaledVector(localRight, -deltaX * factor)
                    .addScaledVector(localUp, deltaY * factor);
                
                camera.position.add(panOffset);
                cameraTarget.add(panOffset);
                
                camera.lookAt(cameraTarget);
                previousMouse = { x: midX, y: midY };
            }
        }, { passive: true });

        container.addEventListener('touchend', e => {
            isDragging = false;
            initialPinchDist = 0;
        });

        animate();
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

    // --- 英制(G20) 轉換為 公制(G21) 處理函數 ---
    function convertInchToMetric(text) {
        const lines = text.split('\n');
        let isInchMode = false;
        
        const converted = lines.map(line => {
            let cmd = line.trim();
            if (!cmd) return line;

            let cleanCmd = cmd;
            let comment = "";
            const semiIdx = cmd.indexOf(';');
            if (semiIdx !== -1) {
                cleanCmd = cmd.substring(0, semiIdx).trim();
                comment = cmd.substring(semiIdx);
            }

            let parenComments = [];
            cleanCmd = cleanCmd.replace(/\([^)]*\)/g, (match) => {
                parenComments.push(match);
                return `__COMMENT_PLACEHOLDER_${parenComments.length - 1}__`;
            });

            if (/\bG0*20\b/i.test(cleanCmd)) {
                isInchMode = true;
                cleanCmd = cleanCmd.replace(/\bG0*20\b/gi, 'G21');
            } else if (/\bG0*21\b/i.test(cleanCmd)) {
                isInchMode = false;
            }

            if (isInchMode) {
                cleanCmd = cleanCmd.replace(/([XYZIJKRF])\s*([-+]?[0-9]*\.?[0-9]+)/gi, (match, letter, valStr) => {
                    const val = parseFloat(valStr);
                    const convertedVal = val * 25.4;
                    return letter.toUpperCase() + convertedVal.toFixed(4);
                });
            }

            parenComments.forEach((pc, idx) => {
                cleanCmd = cleanCmd.replace(`__COMMENT_PLACEHOLDER_${idx}__`, pc);
            });

            return cleanCmd + comment;
        });

        return converted.join('\n');
    }

    function hasG20Active(text) {
        const lines = text.split('\n');
        for (let line of lines) {
            let clean = line.split(';')[0].replace(/\([^)]*\)/g, '').trim();
            if (/\bG0*20\b/i.test(clean)) {
                return true;
            }
        }
        return false;
    }

    function findMachiningBounds(text) {
        const lines = text.split('\n');
        let firstMachiningIdx = -1;
        let lastMachiningIdx = -1;
        let currentMotionMode = null;
        
        lines.forEach((line, i) => {
            const cmd = line.trim().toUpperCase();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) return;
            
            let cleanCmd = cmd.split(';')[0].trim();
            
            const words = {};
            const matches = cleanCmd.matchAll(/([A-Z])\s*([-+]?[0-9]*\.?[0-9]+)/gi);
            for (const match of matches) {
                words[match[1]] = parseFloat(match[2]);
            }
            
            if (words['G'] !== undefined) {
                const gVal = Math.round(words['G']);
                if (gVal === 0) currentMotionMode = 'G0';
                else if (gVal === 1) currentMotionMode = 'G1';
                else if (gVal === 2) currentMotionMode = 'G2';
                else if (gVal === 3) currentMotionMode = 'G3';
            }
            
            const hasX = words['X'] !== undefined;
            const hasY = words['Y'] !== undefined;
            
            if ((hasX || hasY) && currentMotionMode && currentMotionMode !== 'G0') {
                if (firstMachiningIdx === -1) firstMachiningIdx = i;
                lastMachiningIdx = i;
            }
        });
        
        return { firstMachiningIdx, lastMachiningIdx };
    }

    // 三維圓弧分割生成點
    function generateArcPoints(p1, p2, I, J, R, isCW) {
        const points = [];
        let cx, cy, r;

        if (R !== null) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d === 0 || Math.abs(R) < d / 2) {
                return [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
            }
            r = Math.abs(R);
            const h = Math.sqrt(r * r - (d / 2) * (d / 2));
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nx = -dy / d;
            const ny = dx / d;

            let factor = (isCW ? 1 : -1) * (R < 0 ? -1 : 1);
            cx = mx + factor * h * nx;
            cy = my + factor * h * ny;
        } else {
            cx = p1.x + (I || 0);
            cy = p1.y + (J || 0);
            r = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2);
        }

        let startAngle = Math.atan2(p1.y - cy, p1.x - cx);
        let endAngle = Math.atan2(p2.y - cy, p2.x - cx);

        let diff = endAngle - startAngle;
        if (isCW) {
            if (diff >= 0) diff -= 2 * Math.PI;
        } else {
            if (diff <= 0) diff += 2 * Math.PI;
        }

        const numSegments = Math.max(8, Math.min(64, Math.ceil(Math.abs(diff) / (Math.PI / 16))));
        for (let s = 0; s <= numSegments; s++) {
            const t = s / numSegments;
            const angle = startAngle + diff * t;
            const z = p1.z + (p2.z - p1.z) * t; 
            points.push(new THREE.Vector3(cx + r * Math.cos(angle), cy + r * Math.sin(angle), z));
        }

        return points;
    }

    // --- 取得當前設定的安全抬刀高度 ---
    function getRetractHeight() {
        const retractEnable = document.getElementById('retractEnable') && document.getElementById('retractEnable').checked;
        if (retractEnable) {
            let val = parseFloat(document.getElementById('retractHeightInput').value);
            if (isNaN(val)) return 3.0;
            return Math.max(0.1, Math.min(5.0, val));
        }
        return 3.0;
    }

    // 模態記憶與起終點保護 Gcode 解析器
    function parseGcode(text) {
        const bounds = findMachiningBounds(text);
        const firstMachiningIdx = bounds.firstMachiningIdx;
        const lastMachiningIdx = bounds.lastMachiningIdx;

        const lines = text.split('\n');
        let currentPos = { x: 0, y: 0, z: 0, f: 1000 };
        let activeMotion = null; 
        const pathData = [];

        lines.forEach((line, index) => {
            const cmd = line.trim().toUpperCase();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) return;

            let cleanCmd = cmd;
            const semiIdx = cmd.indexOf(';');
            if (semiIdx !== -1) {
                cleanCmd = cmd.substring(0, semiIdx).trim();
            }

            const words = {};
            const matches = cleanCmd.matchAll(/([A-Z])\s*([-+]?[0-9]*\.?[0-9]+)/gi);
            for (const match of matches) {
                words[match[1]] = parseFloat(match[2]);
            }

            if (words['G'] !== undefined) {
                const gVal = Math.round(words['G']);
                if (gVal === 0) activeMotion = 'G0';
                else if (gVal === 1) activeMotion = 'G1';
                else if (gVal === 2) activeMotion = 'G2';
                else if (gVal === 3) activeMotion = 'G3';
            }

            const hasCoords = (words['X'] !== undefined || words['Y'] !== undefined || words['Z'] !== undefined || words['I'] !== undefined || words['J'] !== undefined || words['R'] !== undefined);

            if (hasCoords && activeMotion) {
                let newX = words['X'] !== undefined ? words['X'] : currentPos.x;
                let newY = words['Y'] !== undefined ? words['Y'] : currentPos.y;
                let newZ = words['Z'] !== undefined ? words['Z'] : currentPos.z;
                
                const rHeight = getRetractHeight();
                if (newZ > 0.0001) {
                    newZ = rHeight;
                }

                if (words['F'] !== undefined) currentPos.f = words['F'];

                const isStartOrEndHome = (firstMachiningIdx !== -1 && (index < firstMachiningIdx || index > lastMachiningIdx)) && 
                                         (Math.abs(newX) < 1e-4 && Math.abs(newY) < 1e-4);

                pathData.push({
                    from: { ...currentPos },
                    to: { x: newX, y: newY, z: newZ },
                    f: currentPos.f,
                    type: activeMotion,
                    I: words['I'] !== undefined ? words['I'] : null,
                    J: words['J'] !== undefined ? words['J'] : null,
                    R: words['R'] !== undefined ? words['R'] : null,
                    isStartOrEndHome: isStartOrEndHome,
                    lineIdx: index
                });

                currentPos.x = newX;
                currentPos.y = newY;
                currentPos.z = newZ;
            } else if (words['F'] !== undefined) {
                currentPos.f = words['F'];
            }
        });
        return pathData;
    }

    // --- 偵測原始加工最大深度 (Z軸最小值絕對值) ---
    function detectOriginalDepth(path) {
        let minZ = 0;
        path.forEach(seg => {
            if (seg.type !== 'G0' && !seg.isStartOrEndHome) {
                if (seg.to.z < minZ) minZ = seg.to.z;
                if (seg.from.z < minZ) minZ = seg.from.z;
            }
        });
        return Math.abs(minZ);
    }

    // --- 偵測第一個切削動作的走速 F ---
    function detectFirstFeedrate(path) {
        for (let seg of path) {
            if (seg.type !== 'G0' && !seg.isStartOrEndHome) {
                const dx = seg.to.x - seg.from.x;
                const dy = seg.to.y - seg.from.y;
                const dXY = Math.sqrt(dx * dx + dy * dy);
                if (dXY > 1e-4 && seg.f > 0) {
                    return seg.f;
                }
            }
        }
        return 1200;
    }

    // --- 偵測第一個垂直下刀切削動作的走速 F (Z 軸獨立走速) ---
    function detectFirstZFeedrate(path) {
        for (let seg of path) {
            if (seg.type === 'G1' && !seg.isStartOrEndHome) {
                const dx = seg.to.x - seg.from.x;
                const dy = seg.to.y - seg.from.y;
                const dXY = Math.sqrt(dx * dx + dy * dy);
                const dZ = Math.abs(seg.to.z - seg.from.z);
                if (dXY < 1e-4 && dZ > 1e-4 && seg.f > 0) {
                    return seg.f;
                }
            }
        }
        return 400;
    }

    // --- 自動偵測原始 G-code 的單次下刀 Stepdown 深度 ---
    function detectOriginalStepdown(path) {
        const zs = [];
        path.forEach(seg => {
            if (seg.to.z < -0.001) {
                zs.push(parseFloat(seg.to.z.toFixed(4)));
            }
        });
        const uniqueZs = [...new Set(zs)].sort((a, b) => b - a);
        if (uniqueZs.length >= 2) {
            return Math.abs(uniqueZs[1] - uniqueZs[0]);
        } else if (uniqueZs.length === 1) {
            return Math.abs(uniqueZs[0]);
        }
        return 1.5;
    }

    // --- 幾何多邊形面積與嵌套判定 ---
    function getPolygonSignedArea(poly) {
        let area = 0;
        const n = poly.length;
        for (let i = 0; i < n; i++) {
            const j = (i + 1) % n;
            area += poly[i].x * poly[j].y - poly[j].x * poly[i].y;
        }
        return area / 2;
    }

    function isPointInPolygon(pt, poly) {
        let inside = false;
        const n = poly.length;
        for (let i = 0, j = n - 1; i < n; j = i++) {
            const xi = poly[i].x, yi = poly[i].y;
            const xj = poly[j].x, yj = poly[j].y;
            const intersect = ((yi > pt.y) !== (yj > pt.y))
                && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    // --- 核心幾何運算：點對直線投影器 (Point-to-Line Projection) ---
    function getPointLineProjection(pt, p1, p2) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const lenSq = dx * dx + dy * dy;
        if (lenSq < 1e-8) return { x: p1.x, y: p1.y };
        const t = ((pt.x - p1.x) * dx + (pt.y - p1.y) * dy) / lenSq;
        return {
            x: p1.x + t * dx,
            y: p1.y + t * dy
        };
    }

    // --- 核心：高精度二維幾何求交點 (Analytical Edge-Intersection Solver) ---
    function getLineLineIntersection(L1_p1, L1_p2, L2_p1, L2_p2, P) {
        const A1 = L1_p2.y - L1_p1.y;
        const B1 = L1_p1.x - L1_p2.x;
        const C1 = A1 * L1_p1.x + B1 * L1_p1.y;
        
        const A2 = L2_p2.y - L2_p1.y;
        const B2 = L2_p1.x - L2_p2.x;
        const C2 = A2 * L2_p1.x + B2 * L2_p1.y; 
        
        const det = A1 * B2 - A2 * B1;
        if (Math.abs(det) > 1e-5) {
            return {
                x: (B2 * C1 - B1 * C2) / det,
                y: (A1 * C2 - A2 * C1) / det
            };
        }
        return { x: (L1_p2.x + L2_p1.x) / 2, y: (L1_p2.y + L2_p1.y) / 2 };
    }

    function getLineCircleIntersection(K1, K2, O, R, P) {
        const x1 = K1.x - O.x;
        const y1 = K1.y - O.y;
        const x2 = K2.x - O.x;
        const y2 = K2.y - O.y;
        
        const dx = x2 - x1;
        const dy = y2 - y1;
        const drSq = dx * dx + dy * dy;
        const dr = Math.sqrt(drSq);
        
        if (dr < 1e-6) {
            return { x: K1.x, y: K1.y };
        }
        
        const D = x1 * y2 - x2 * y1;
        const delta = R * R * drSq - D * D;
        
        if (delta < 0) {
            const t = ((O.x - K1.x) * dx + (O.y - K1.y) * dy) / drSq;
            const projX = K1.x + t * dx;
            const projY = K1.y + t * dy;
            
            const vx = projX - O.x;
            const vy = projY - O.y;
            const len = Math.sqrt(vx * vx + vy * vy);
            if (len > 1e-5) {
                return { x: O.x + (vx / len) * R, y: O.y + (vy / len) * R };
            }
            return { x: projX, y: projY };
        }
        
        const dy_sgn = dy < 0 ? -1 : 1;
        const sqrtDelta = Math.sqrt(delta);
        
        const p1 = {
            x: (D * dy + dy_sgn * dx * sqrtDelta) / drSq + O.x,
            y: (-D * dx + Math.abs(dy) * sqrtDelta) / drSq + O.y
        };
        const p2 = {
            x: (D * dy - dy_sgn * dx * sqrtDelta) / drSq + O.x,
            y: (-D * dx - Math.abs(dy) * sqrtDelta) / drSq + O.y
        };
        
        const d1 = (p1.x - P.x)**2 + (p1.y - P.y)**2;
        const d2 = (p2.x - P.x)**2 + (p2.y - P.y)**2;
        return d1 < d2 ? p1 : p2;
    }

    function getCircleCircleIntersection(O1, R1, O2, R2, P) {
        const dx = O2.x - O1.x;
        const dy = O2.y - O1.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        
        if (d < 1e-5) {
            const ux = P.x - O1.x;
            const uy = P.y - O1.y;
            const len = Math.sqrt(ux*ux + uy*uy);
            if (len > 1e-5) {
                return { x: O1.x + (ux / len) * R1, y: O1.y + (ux / len) * R1 };
            }
            return { x: O1.x + R1, y: O1.y };
        }
        
        if (d > R1 + R2 || d < Math.abs(R1 - R2)) {
            const ux = P.x - O1.x;
            const uy = P.y - O1.y;
            const len1 = Math.sqrt(ux*ux + uy*uy);
            const p1 = len1 > 1e-5 ? { x: O1.x + (ux / len1) * R1, y: O1.y + (ux / len1) * R1 } : { x: O1.x + R1, y: O1.y };
            
            const vx = P.x - O2.x;
            const vy = P.y - O2.y;
            const len2 = Math.sqrt(vx*vx + vy*vy);
            const p2 = len2 > 1e-5 ? { x: O2.x + (vx / len2) * R2, y: O2.x + (vx / len2) * R2 } : { x: O2.x + R2, y: O2.y };
            
            return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        }
        
        const a = (R1 * R1 - R2 * R2 + d * d) / (2 * d);
        const h = Math.sqrt(Math.max(0, R1 * R1 - a * a));
        
        const p0x = O1.x + (a * dx) / d;
        const p0y = O1.y + (a * dy) / d;
        
        const rx = -dy / d;
        const ry = dx / d;
        
        const p1 = { x: p0x + h * rx, y: p0y + h * ry };
        const p2 = { x: p0x - h * rx, y: p0y - h * ry };
        
        const d1 = (p1.x - P.x)**2 + (p1.y - P.y)**2;
        const d2 = (p2.x - P.x)**2 + (p2.y - P.y)**2;
        return d1 < d2 ? p1 : p2;
    }

    function getIntersection(geo1, geo2, P) {
        if (geo1.type === "LINE" && geo2.type === "LINE") {
            const isPoint1 = Math.sqrt((geo1.p2.x - geo1.p1.x)**2 + (geo1.p2.y - geo1.p1.y)**2) < 1e-4;
            const isPoint2 = Math.sqrt((geo2.p2.x - geo2.p1.x)**2 + (geo2.p2.y - geo2.p1.y)**2) < 1e-4;
            
            if (isPoint1 && isPoint2) {
                return { x: geo1.p1.x, y: geo1.p1.y };
            }
            if (isPoint1) {
                return getPointLineProjection(geo1.p1, geo2.p1, geo2.p2);
            }
            if (isPoint2) {
                return getPointLineProjection(geo2.p1, geo1.p1, geo1.p2);
            }
            return getLineLineIntersection(geo1.p1, geo1.p2, geo2.p1, geo2.p2, P);
        }
        if (geo1.type === "LINE" && geo2.type === "ARC") {
            return getLineCircleIntersection(geo1.p1, geo1.p2, geo2.center, geo2.radius, P);
        }
        if (geo1.type === "ARC" && geo2.type === "LINE") {
            return getLineCircleIntersection(geo2.p1, geo2.p2, geo1.center, geo1.radius, P);
        }
        if (geo1.type === "ARC" && geo2.type === "ARC") {
            return getCircleCircleIntersection(geo1.center, geo1.radius, geo2.center, geo2.radius, P);
        }
        return { x: P.x, y: P.y };
    }

    // --- 核心：單一鏈單次等距偏置函數 ---
    function applySingleOffsetChain(chain, loop, dist) {
        const n = chain.length;
        if (n === 0) return;

        const offset_geometries = [];
        for (let i = 0; i < n; i++) {
            const seg = chain[i];
            if (seg.type === 'G1' || seg.type === 'G0') {
                const dx = seg.to.x - seg.from.x;
                const dy = seg.to.y - seg.from.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len > 1e-6) {
                    const ux = dx / len;
                    const uy = dy / len;
                    const nx = loop.isCCW ? uy : -uy;
                    const ny = loop.isCCW ? -ux : ux;
                    
                    offset_geometries.push({
                        type: "LINE",
                        p1: { x: seg.from.x + nx * dist, y: seg.from.y + ny * dist },
                        p2: { x: seg.to.x + nx * dist, y: seg.to.y + ny * dist }
                    });
                } else {
                    offset_geometries.push({
                        type: "LINE",
                        p1: { ...seg.from },
                        p2: { ...seg.to }
                    });
                }
            } else if (seg.type === 'G2' || seg.type === 'G3') {
                const center = findArcCenter(seg.from, seg.to, seg.I, seg.J, seg.R, seg.type === 'G2');
                if (center) {
                    const R_orig = Math.sqrt((seg.from.x - center.x)**2 + (seg.from.y - center.y)**2);
                    const rSign = (loop.isCCW === (seg.type === 'G3')) ? 1 : -1;
                    const R_new = R_orig + rSign * dist;
                    
                    if (R_new <= 0.1) {
                        offset_geometries.push({
                            type: "LINE",
                            p1: { x: center.x, y: center.y },
                            p2: { x: center.x, y: center.y }
                        });
                        seg.type = 'G1';
                        seg.I = null;
                        seg.J = null;
                        seg.R = null;
                    } else {
                        offset_geometries.push({
                            type: "ARC",
                            center: center,
                            radius: R_new,
                            orig_R: R_orig,
                            orig_I: seg.I,
                            orig_J: seg.J,
                            orig_R_val: seg.R,
                            typeG: seg.type
                        });
                    }
                } else {
                    offset_geometries.push({
                        type: "LINE",
                        p1: { ...seg.from },
                        p2: { ...seg.to }
                    });
                    seg.type = 'G1';
                    seg.I = null;
                    seg.J = null;
                    seg.R = null;
                }
            }
        }

        const new_vertices = [];
        if (loop.isClosed) {
            for (let i = 0; i < n; i++) {
                const prev_idx = (i - 1 + n) % n;
                const curr_idx = i;
                const orig_pt = chain[curr_idx].from;

                const P_int = getIntersection(offset_geometries[prev_idx], offset_geometries[curr_idx], orig_pt);
                new_vertices.push(P_int);
            }

            for (let i = 0; i < n; i++) {
                const prev_idx = (i - 1 + n) % n;
                const curr_idx = i;
                const joint = new_vertices[curr_idx];

                chain[prev_idx].to.x = joint.x;
                chain[prev_idx].to.y = joint.y;
                chain[curr_idx].from.x = joint.x;
                chain[curr_idx].from.y = joint.y;
            }
        } else {
            for (let i = 1; i < n; i++) {
                const orig_pt = chain[i].from;
                const P_int = getIntersection(offset_geometries[i-1], offset_geometries[i], orig_pt);
                
                chain[i-1].to.x = P_int.x;
                chain[i-1].to.y = P_int.y;
                chain[i].from.x = P_int.x;
                chain[i].from.y = P_int.y;
            }
            if (offset_geometries[0].type === "LINE") {
                chain[0].from.x = offset_geometries[0].p1.x;
                chain[0].from.y = offset_geometries[0].p1.y;
            }
            if (offset_geometries[n-1].type === "LINE") {
                chain[n-1].to.x = offset_geometries[n-1].p2.x;
                chain[n-1].to.y = offset_geometries[n-1].p2.y;
            }
        }

        for (let i = 0; i < n; i++) {
            const seg = chain[i];
            const geom = offset_geometries[i];
            if (seg.type === 'G2' || seg.type === 'G3') {
                if (geom && geom.type === 'ARC') {
                    const center = geom.center;
                    const R_new = geom.radius;

                    let newI = center.x - seg.from.x;
                    let newJ = center.y - seg.from.y;

                    const origI = geom.orig_I !== null ? geom.orig_I : 0;
                    const origJ = geom.orig_J !== null ? geom.orig_J : 0;

                    if (Math.abs(origI) < 1e-4) newI = 0;
                    if (Math.abs(origJ) < 1e-4) newJ = 0;

                    if (R_new <= 0.1) {
                        seg.type = 'G1';
                        seg.I = null;
                        seg.J = null;
                        seg.R = null;
                    } else {
                        seg.I = newI;
                        seg.J = newJ;
                        if (geom.orig_R_val !== null) {
                            seg.R = Math.sign(geom.orig_R_val) * R_new;
                        }

                        const new_center = { x: seg.from.x + newI, y: seg.from.y + newJ };
                        const R_actual = Math.sqrt(newI * newI + newJ * newJ);
                        const end_vector = { x: seg.to.x - new_center.x, y: seg.to.y - new_center.y };
                        const end_dist = Math.sqrt(end_vector.x**2 + end_vector.y**2);
                        if (end_dist > 1e-5) {
                            seg.to.x = new_center.x + (end_vector.x / end_dist) * R_actual;
                            seg.to.y = new_center.y + (end_vector.y / end_dist) * R_actual;

                            const next_idx = i + 1;
                            if (loop.isClosed) {
                                const cyclic_next = next_idx % n;
                                chain[cyclic_next].from.x = seg.to.x;
                                chain[cyclic_next].from.y = seg.to.y;
                            } else {
                                if (next_idx < n) {
                                    chain[next_idx].from.x = seg.to.x;
                                    chain[next_idx].from.y = seg.to.y;
                                }
                            }
                        }
                    }
                }
            }
        }
    }

    // --- 核心：Z 軸斜下刀傳播修正 ---
    function propagateOffsets(origPath, modifiedPath) {
        for (let i = 0; i < modifiedPath.length; i++) {
            const hasFromOffset = Math.abs(modifiedPath[i].from.x - origPath[i].from.x) > 1e-6 || 
                                  Math.abs(modifiedPath[i].from.y - origPath[i].from.y) > 1e-6;
            if (hasFromOffset) {
                const offX = modifiedPath[i].from.x - origPath[i].from.x;
                const offY = modifiedPath[i].from.y - origPath[i].from.y;
                let prevIdx = i - 1;
                let currentTargetXY = { ...origPath[i].from };
                
                while (prevIdx >= 0) {
                    const distTo = Math.sqrt(
                        (origPath[prevIdx].to.x - currentTargetXY.x)**2 + 
                        (origPath[prevIdx].to.y - currentTargetXY.y)**2
                    );
                    if (distTo < 1e-4) {
                        modifiedPath[prevIdx].to.x = origPath[prevIdx].to.x + offX;
                        modifiedPath[prevIdx].to.y = origPath[prevIdx].to.y + offY;
                        
                        const distFrom = Math.sqrt(
                            (origPath[prevIdx].from.x - currentTargetXY.x)**2 + 
                            (origPath[prevIdx].from.y - currentTargetXY.y)**2
                        );
                        if (distFrom < 1e-4) {
                            modifiedPath[prevIdx].from.x = origPath[prevIdx].from.x + offX;
                            modifiedPath[prevIdx].from.y = origPath[prevIdx].from.y + offY;
                            prevIdx--;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
            }
        }

        for (let i = modifiedPath.length - 1; i >= 0; i--) {
            const hasToOffset = Math.abs(modifiedPath[i].to.x - origPath[i].to.x) > 1e-6 || 
                                Math.abs(modifiedPath[i].to.y - origPath[i].to.y) > 1e-6;
            if (hasToOffset) {
                const offX = modifiedPath[i].to.x - origPath[i].to.x;
                const offY = modifiedPath[i].to.y - origPath[i].to.y;
                let nextIdx = i + 1;
                let currentTargetXY = { ...origPath[i].to };
                
                while (nextIdx < modifiedPath.length) {
                    const distFrom = Math.sqrt(
                        (origPath[nextIdx].from.x - currentTargetXY.x)**2 + 
                        (origPath[nextIdx].from.y - currentTargetXY.y)**2
                    );
                    if (distFrom < 1e-4) {
                        modifiedPath[nextIdx].from.x = origPath[nextIdx].from.x + offX;
                        modifiedPath[nextIdx].from.y = origPath[nextIdx].from.y + offY;
                        
                        const distTo = Math.sqrt(
                            (origPath[nextIdx].to.x - currentTargetXY.x)**2 + 
                            (origPath[nextIdx].to.y - currentTargetXY.y)**2
                        );
                        if (distTo < 1e-4) {
                            modifiedPath[nextIdx].to.x = origPath[nextIdx].to.x + offX;
                            modifiedPath[nextIdx].to.y = origPath[nextIdx].to.y + offY;
                            nextIdx++;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
            }
        }
    }

    // --- 核心：升級雙步驟刀徑偏置補償演算法 ---
    function applyTwoStepCutterCompensation(pathData) {
        const toolChangeEnable = document.getElementById('toolChangeEnable') && document.getElementById('toolChangeEnable').checked;
        
        const cloneSegments = (segs) => segs.map(s => ({
            from: { ...s.from },
            to: { ...s.to },
            f: s.f,
            type: s.type,
            I: s.I,
            J: s.J,
            R: s.R,
            isStartOrEndHome: s.isStartOrEndHome,
            lineIdx: s.lineIdx
        }));

        if (!toolChangeEnable) {
            return { workpiecePath: cloneSegments(pathData), newToolPath: pathData };
        }

        const origToolDia = parseFloat(document.getElementById('origToolDiaInput').value) || 6.35;
        let newToolDia = parseFloat(document.getElementById('newToolDiaInput').value) || 3.175;
        newToolDia = Math.max(0.1, newToolDia);

        const R_orig = origToolDia / 2;
        const R_new = newToolDia / 2;

        const chains = [];
        let currentChain = null;

        pathData.forEach((seg, idx) => {
            const dx = seg.to.x - seg.from.x;
            const dy = seg.to.y - seg.from.y;
            const dXY = Math.sqrt(dx * dx + dy * dy);
            const isXYMove = dXY > 1e-4;

            const isCut = (seg.from.z < -0.001 || seg.to.z < -0.001) && seg.type !== 'G0' && !seg.isStartOrEndHome && isXYMove;
            if (isCut) {
                if (!currentChain) {
                    currentChain = [];
                    chains.push(currentChain);
                }
                currentChain.push(seg);
            } else {
                currentChain = null;
            }
        });

        const closedLoops = [];
        chains.forEach(chain => {
            if (chain.length < 3) return;
            const first = chain[0].from;
            const last = chain[chain.length - 1].to;
            const dist = Math.sqrt((first.x - last.x)**2 + (first.y - last.y)**2);
            const isClosed = dist < 0.5;

            const poly = chain.map(seg => ({ x: seg.from.x, y: seg.from.y }));
            const cleanPoly = [];
            poly.forEach(pt => {
                if (cleanPoly.length === 0 || Math.sqrt((pt.x - cleanPoly[cleanPoly.length-1].x)**2 + (pt.y - cleanPoly[cleanPoly.length-1].y)**2) > 1e-4) {
                    cleanPoly.push(pt);
                }
            });

            if (cleanPoly.length >= 3) {
                const area = getPolygonSignedArea(cleanPoly);
                if (Math.abs(area) > 1e-4) {
                    closedLoops.push({
                        chain: chain,
                        poly: cleanPoly,
                        area: area,
                        isCCW: area > 0,
                        isInner: false,
                        isClosed: isClosed
                    });
                }
            }
        });

        closedLoops.forEach((loop, idx) => {
            if (!loop.isClosed) return;
            const poly = loop.poly;
            const V0 = poly[0];
            const V1 = poly[1];
            let dx = V1.x - V0.x;
            let dy = V1.y - V0.y;
            let len = Math.sqrt(dx*dx + dy*dy);
            let nx = 0, ny = 0;
            if (len > 1e-6) {
                if (loop.isCCW) {
                    nx = dy / len; ny = -dx / len;
                } else {
                    nx = -dy / len; ny = dx / len;
                }
            }
            const testPt = { x: V0.x - nx * 0.1, y: V0.y - ny * 0.1 };

            let containmentCount = 0;
            closedLoops.forEach((otherLoop, otherIdx) => {
                if (!otherLoop.isClosed || idx === otherIdx) return;
                if (isPointInPolygon(testPt, otherLoop.poly)) {
                    containmentCount++;
                }
            });

            loop.isInner = (containmentCount % 2 === 1);
        });

        const workpiecePath = cloneSegments(pathData);
        const newToolPath = cloneSegments(pathData);

        const mapChainToClone = (origChain, cloneList) => {
            return origChain.map(origSeg => {
                const origIdx = pathData.indexOf(origSeg);
                return cloneList[origIdx];
            });
        };

        closedLoops.forEach(loop => {
            const workpieceChain = mapChainToClone(loop.chain, workpiecePath);
            const toolChain = mapChainToClone(loop.chain, newToolPath);

            const d1 = loop.isInner ? R_orig : -R_orig;
            const d2 = loop.isInner ? -R_new : R_new;

            applySingleOffsetChain(workpieceChain, loop, d1);

            workpieceChain.forEach((wpSeg, sIdx) => {
                toolChain[sIdx].from = { ...wpSeg.from };
                toolChain[sIdx].to = { ...wpSeg.to };
                toolChain[sIdx].I = wpSeg.I;
                toolChain[sIdx].J = wpSeg.J;
                toolChain[sIdx].R = wpSeg.R;
                toolChain[sIdx].type = wpSeg.type;
            });

            applySingleOffsetChain(toolChain, loop, d2);
        });

        propagateOffsets(pathData, workpiecePath);
        propagateOffsets(pathData, newToolPath);

        return { workpiecePath, newToolPath };
    }

    // --- 實作自訂層數與總厚度調整 ---
    function applyThicknessAdjustment(pathData) {
        const thickEnable = document.getElementById('thickEnable') && document.getElementById('thickEnable').checked;
        if (!thickEnable) return pathData;

        const detectedDepth = parseFloat(document.getElementById('origThickInput').value) || 0;
        const targetDepth = parseFloat(document.getElementById('targetThickInput').value) || 0;
        const layers = parseInt(document.getElementById('targetLayersInput').value) || 12;

        if (detectedDepth <= 0.0001 || targetDepth <= 0.0001 || layers < 1) return pathData;

        const stepdown = targetDepth / layers;

        const blocks = [];
        let currentBlock = { type: 'rapid', segments: [] };
        blocks.push(currentBlock);

        pathData.forEach(seg => {
            const isCut = (seg.from.z < -0.001 || seg.to.z < -0.001) && seg.type !== 'G0';
            if (isCut) {
                if (currentBlock.type === 'rapid') {
                    currentBlock = { type: 'contour', segments: [] };
                    blocks.push(currentBlock);
                }
                currentBlock.segments.push(seg);
            } else {
                if (currentBlock.type === 'contour') {
                    currentBlock = { type: 'rapid', segments: [] };
                    blocks.push(currentBlock);
                }
                currentBlock.segments.push(seg);
            }
        });

        const rebuiltSegments = [];

        blocks.forEach(block => {
            if (block.type === 'contour' && block.segments.length > 0) {
                const zs = [];
                block.segments.forEach(seg => {
                    if (seg.to.z < -0.001) {
                        zs.push(parseFloat(seg.to.z.toFixed(4)));
                    }
                });
                const uniqueZs = [...new Set(zs)].sort((a, b) => b - a);

                if (uniqueZs.length > 0) {
                    const firstZ = uniqueZs[0];

                    const profile = [];
                    for (let seg of block.segments) {
                        if (seg.to.z < firstZ - 0.01 || seg.to.z > -0.001) {
                            break;
                        }
                        profile.push(seg);
                    }

                    if (profile.length > 0) {
                        const newZs = [];
                        let current = stepdown;
                        while (current < targetDepth - 1e-4) {
                            newZs.push(-current);
                            current += stepdown;
                        }
                        newZs.push(-targetDepth);

                        const contourRebuilt = [];
                        let prevZ = block.segments[0].from.z;

                        newZs.forEach((targetZ) => {
                            profile.forEach((origSeg, segIdx) => {
                                const newSeg = { ...origSeg };
                                if (segIdx === 0) {
                                    newSeg.from = { ...origSeg.from, z: prevZ };
                                    newSeg.to = { ...origSeg.to, z: targetZ };
                                } else {
                                    newSeg.from = { ...origSeg.from, z: targetZ };
                                    newSeg.to = { ...origSeg.to, z: targetZ };
                                }
                                contourRebuilt.push(newSeg);
                            });
                            prevZ = targetZ;
                        });

                        const lastOrigSeg = block.segments[block.segments.length - 1];
                        if (lastOrigSeg && lastOrigSeg.to.z > -0.001) {
                            const finalLift = { ...lastOrigSeg };
                            finalLift.from = { ...lastOrigSeg.from, z: prevZ };
                            finalLift.to = { ...lastOrigSeg.to };
                            contourRebuilt.push(finalLift);
                        }

                        rebuiltSegments.push(...contourRebuilt);
                        return;
                    }
                }
            }
            rebuiltSegments.push(...block.segments);
        });

        return rebuiltSegments;
    }

    // --- 實作切削走速 F 調整 ---
    function applyFeedrateAdjustment(path) {
        const feedrateEnable = document.getElementById('feedrateEnable') && document.getElementById('feedrateEnable').checked;
        if (!feedrateEnable) return path;

        const targetFeedrate = parseFloat(document.getElementById('targetFeedrateInput').value) || 1200;
        const targetZFeedrate = parseFloat(document.getElementById('targetZFeedrateInput').value) || 400;

        path.forEach(seg => {
            if (seg.isStartOrEndHome || seg.type === 'G0') {
                return;
            }
            const dx = seg.to.x - seg.from.x;
            const dy = seg.to.y - seg.from.y;
            const dXY = Math.sqrt(dx * dx + dy * dy);
            const dZ = Math.abs(seg.to.z - seg.from.z);

            const isXYMove = dXY > 1e-4 && (seg.type === 'G1' || seg.type === 'G2' || seg.type === 'G3');
            const isPureZMove = dXY < 1e-4 && dZ > 1e-4 && seg.type === 'G1';

            if (isXYMove) {
                seg.f = targetFeedrate;
            } else if (isPureZMove) {
                seg.f = targetZFeedrate;
            }
        });

        return path;
    }

    // --- 計算任意 2D 點到圓弧段的最短歐幾里得距離 ---
    function getDistanceToArc(pt, arcSeg) {
        const p1 = arcSeg.from;
        const p2 = arcSeg.to;
        
        const distSq = (ax, ay, bx, by) => (ax - bx)**2 + (ay - by)**2;
        const distP1 = Math.sqrt(distSq(pt.x, pt.y, p1.x, p1.y));
        const distP2 = Math.sqrt(distSq(pt.x, pt.y, p2.x, p2.y));
        const d_endpoints = Math.min(distP1, distP2);
        
        let cx, cy, r;
        const isCW = arcSeg.type === 'G2';
        
        if (arcSeg.R !== null && arcSeg.R !== undefined) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d === 0) return d_endpoints;
            r = Math.abs(arcSeg.R);
            if (r < d / 2) return d_endpoints; 
            const h = Math.sqrt(r * r - (d / 2) * (d / 2));
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nx = -dy / d;
            const ny = dx / d;

            let factor = (isCW ? 1 : -1) * (arcSeg.R < 0 ? -1 : 1);
            cx = mx + factor * h * nx;
            cy = my + factor * h * ny;
        } else {
            cx = p1.x + (arcSeg.I || 0);
            cy = p1.y + (arcSeg.J || 0);
            r = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2);
        }
        
        if (r === 0) return d_endpoints;
        
        const pAngle = Math.atan2(pt.y - cy, pt.x - cx);
        const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
        const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
        
        const TWO_PI = 2 * Math.PI;
        const norm = (a) => ((a % TWO_PI) + TWO_PI) % TWO_PI;
        
        let s = norm(startAngle);
        let e = norm(endAngle);
        let t = norm(pAngle);
        
        let inside = false;
        if (Math.sqrt(distSq(p1.x, p1.y, p2.x, p2.y)) < 1e-4) {
            inside = true;
        } else if (!isCW) { 
            if (s <= e) inside = (t >= s && t <= e);
            else inside = (t >= s || t <= e);
        } else { 
            if (e <= s) inside = (t >= e && t <= s);
            else inside = (t >= e || t <= s);
        }
        
        if (inside) {
            const distToCenter = Math.sqrt(distSq(pt.x, pt.y, cx, cy));
            const d_arc = Math.abs(distToCenter - r);
            return Math.min(d_endpoints, d_arc);
        }
        
        return d_endpoints;
    }

    // --- 橋位 (TAB) 計算核心分割算法 ---
    function splitSegmentWithTabs(seg, tabs, tabHeight, R, arcSegs) {
        const tValues = [0, 1];
        const p1 = seg.from;
        const p2 = seg.to;
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const lenSq = dx * dx + dy * dy;
        const R_sq = R * R;
        const activeTabIntervals = [];

        if (lenSq > 1e-6) {
            tabs.forEach(tab => {
                const fx = p1.x - tab.x;
                const fy = p1.y - tab.y;

                const a = lenSq;
                const b = 2 * (fx * dx + fy * dy);
                const c = (fx * fx + fy * fy) - R_sq;

                const disc = b * b - 4 * a * c;
                if (disc > 0) {
                    const sqrtDisc = Math.sqrt(disc);
                    const t1 = (-b - sqrtDisc) / (2 * a);
                    const t2 = (-b + sqrtDisc) / (2 * a);

                    if (t1 > 0 && t1 < 1 && t2 > 0 && t2 < 1) {
                        tValues.push(t1);
                        tValues.push(t2);
                        activeTabIntervals.push({ start: t1, end: t2 });
                    }
                }
            });
        }

        tValues.sort((a, b) => a - b);
        const filteredT = [];
        tValues.forEach(t => {
            if (filteredT.length === 0 || t - filteredT[filteredT.length - 1] > 1e-4) {
                filteredT.push(t);
            }
        });

        const subSegs = [];
        for (let i = 0; i < filteredT.length - 1; i++) {
            const tStart = filteredT[i];
            const tEnd = filteredT[i + 1];
            const tMid = (tStart + tEnd) / 2;

            const fromPt = {
                x: p1.x + tStart * dx,
                y: p1.y + tStart * dy,
                z: p1.z + tStart * (p2.z - p1.z)
            };
            const toPt = {
                x: p1.x + tEnd * dx,
                y: p1.y + tEnd * dy,
                z: p1.z + tEnd * (p2.z - p1.z)
            };

            let inTab = false;
            for (const interval of activeTabIntervals) {
                if (tMid >= interval.start - 1e-4 && tMid <= interval.end + 1e-4) {
                    inTab = true;
                    break;
                }
            }

            if (inTab) {
                subSegs.push({
                    from: { x: fromPt.x, y: fromPt.y, z: fromPt.z },
                    to: { x: fromPt.x, y: fromPt.y, z: fromPt.z + tabHeight },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });

                subSegs.push({
                    from: { x: fromPt.x, y: fromPt.y, z: fromPt.z + tabHeight },
                    to: { x: toPt.x, y: toPt.y, z: toPt.z + tabHeight },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });

                subSegs.push({
                    from: { x: toPt.x, y: toPt.y, z: toPt.z + tabHeight },
                    to: { x: toPt.x, y: toPt.y, z: toPt.z },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });
            } else {
                subSegs.push({
                    from: fromPt,
                    to: toPt,
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: false,
                    lineIdx: seg.lineIdx
                });
            }
        }

        return subSegs;
    }

    function applyTabsToPaths(pathData) {
        const tabEnable = document.getElementById('tabEnable') && document.getElementById('tabEnable').checked;
        if (!tabEnable) return pathData;

        const arcSegs = pathData.filter(seg => seg.type === 'G2' || seg.type === 'G3');
        const toolDia = parseFloat(document.getElementById('toolDiaInput')?.value) || 3.175;
        const tabWidth = toolDia + 6;
        const R = tabWidth / 2;

        const result = [];
        let currentRun = [];

        const flushRun = () => {
            if (currentRun.length === 0) return;

            const uniqueZ = [...new Set(currentRun.map(s => parseFloat(s.to.z.toFixed(4))))].sort((a, b) => b - a);
            const Z_deepest = uniqueZ[uniqueZ.length - 1];

            let stepdown = 1.5; 
            if (uniqueZ.length >= 2) {
                stepdown = Math.abs(uniqueZ[uniqueZ.length - 1] - uniqueZ[uniqueZ.length - 2]);
            } else if (uniqueZ.length === 1) {
                stepdown = Math.max(1.0, Math.min(3.0, Math.abs(Z_deepest) * 0.5)); 
            }
            stepdown = Math.max(1.0, Math.min(3.0, stepdown)); 

            const finalPassSegs = currentRun.filter(s => Math.abs(s.to.z - Z_deepest) < 0.01);

            if (finalPassSegs.length > 0) {
                const candidateSegs = [];
                finalPassSegs.forEach(seg => {
                    if (seg.type === 'G1') {
                        const dx = seg.to.x - seg.from.x;
                        const dy = seg.to.y - seg.from.y;
                        const len = Math.sqrt(dx * dx + dy * dy);
                        if (len > tabWidth + 1.0) {
                            candidateSegs.push({
                                seg: seg,
                                len: len,
                                midpoint: {
                                    x: (seg.from.x + seg.to.x) / 2,
                                    y: (seg.from.y + seg.to.y) / 2,
                                    z: (seg.from.z + seg.to.z) / 2
                                }
                            });
                        }
                    }
                });

                candidateSegs.sort((a, b) => b.len - a.len);

                const tabs = [];
                const minDistanceBetweenTabs = 20.0;

                for (const cand of candidateSegs) {
                    const ptMid = { ...cand.midpoint };
                    const L = cand.len;
                    const u1 = 0.5 - R / L;
                    const u2 = 0.5 + R / L;

                    const pt1 = {
                        x: cand.seg.from.x + u1 * (cand.seg.to.x - cand.seg.from.x),
                        y: cand.seg.from.y + u1 * (cand.seg.to.y - cand.seg.from.y)
                    };
                    const pt2 = {
                        x: cand.seg.from.x + u2 * (cand.seg.to.x - cand.seg.from.x),
                        y: cand.seg.from.y + u2 * (cand.seg.to.y - cand.seg.from.y)
                    };

                    let nearArc = false;
                    if (arcSegs && arcSegs.length > 0) {
                        for (const arc of arcSegs) {
                            if (getDistanceToArc(pt1, arc) < 0.5 || getDistanceToArc(pt2, arc) < 0.5) {
                                nearArc = true;
                                break;
                            }
                        }
                    }

                    let foundSafeOffset = !nearArc;
                    if (!foundSafeOffset) {
                        const minT = R / L;
                        const maxT = 1 - R / L;
                        const span = maxT - minT;
                        
                        for (let step = 0; step <= 15; step++) {
                            const tCenter = minT + (step / 15) * span;
                            const testU1 = tCenter - R / L;
                            const testU2 = tCenter + R / L;

                            const testPt1 = {
                                x: cand.seg.from.x + testU1 * (cand.seg.to.x - cand.seg.from.x),
                                y: cand.seg.from.y + testU1 * (cand.seg.to.y - cand.seg.from.y)
                            };
                            const testPt2 = {
                                x: cand.seg.from.x + testU2 * (cand.seg.to.x - cand.seg.from.x),
                                y: cand.seg.from.y + testU2 * (cand.seg.to.y - cand.seg.from.y)
                            };

                            let testNearArc = false;
                            if (arcSegs && arcSegs.length > 0) {
                                for (const arc of arcSegs) {
                                    if (getDistanceToArc(testPt1, arc) < 0.5 || getDistanceToArc(testPt2, arc) < 0.5) {
                                        testNearArc = true;
                                        break;
                                    }
                                }
                            }

                            if (!testNearArc) {
                                ptMid.x = cand.seg.from.x + tCenter * (cand.seg.to.x - cand.seg.from.x);
                                ptMid.y = cand.seg.from.y + tCenter * (cand.seg.to.y - cand.seg.from.y);
                                foundSafeOffset = true;
                                break;
                            }
                        }
                    }

                    if (!foundSafeOffset) continue;

                    let tooClose = false;
                    for (const existing of tabs) {
                        const dist = Math.sqrt((ptMid.x - existing.x)**2 + (ptMid.y - existing.y)**2);
                        if (dist < minDistanceBetweenTabs) {
                            tooClose = true;
                            break;
                        }
                    }

                    if (!tooClose) {
                        tabs.push(ptMid);
                    }

                    if (tabs.length >= 4) break;
                }

                currentRun.forEach(seg => {
                    const isFinalPass = Math.abs(seg.to.z - Z_deepest) < 0.01;
                    if (isFinalPass && tabs.length > 0 && seg.type !== 'G2' && seg.type !== 'G3') {
                        const splitParts = splitSegmentWithTabs(seg, tabs, stepdown, R, arcSegs);
                        result.push(...splitParts);
                    } else {
                        result.push(seg);
                    }
                });
            } else {
                result.push(...currentRun);
            }

            currentRun = [];
        };

        pathData.forEach(seg => {
            if (seg.isStartOrEndHome || seg.type === 'G0') {
                flushRun();
                result.push(seg);
            } else {
                currentRun.push(seg);
            }
        });
        flushRun();

        const cleanResult = [];
        for (let i = 0; i < result.length; i++) {
            const cur = result[i];
            if (cur.isTab && Math.abs(cur.from.x - cur.to.x) < 1e-4 && Math.abs(cur.from.y - cur.to.y) < 1e-4 && cur.from.z > cur.to.z) {
                if (i + 1 < result.length) {
                    const next = result[i + 1];
                    if (next.isTab && Math.abs(next.from.x - next.to.x) < 1e-4 && Math.abs(next.from.y - next.to.y) < 1e-4 && next.to.z > next.from.z) {
                        if (Math.abs(cur.to.x - next.from.x) < 1e-4 && Math.abs(cur.to.y - next.from.y) < 1e-4) {
                            i++; 
                            continue; 
                        }
                    }
                }
            }
            cleanResult.push(cur);
        }

        return cleanResult;
    }

    // --- 將處理後的 3D 線段編譯成 G-code 指令字串 ---
    function compileSegmentsToGcode(segments) {
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        const feedrateEnable = document.getElementById('feedrateEnable') && document.getElementById('feedrateEnable').checked;
        const targetFeedrate = parseFloat(document.getElementById('targetFeedrateInput').value) || 1200;
        const targetZFeedrate = parseFloat(document.getElementById('targetZFeedrateInput').value) || 400;

        const gcodeLines = [];
        let lastX = 0, lastY = 0, lastZ = null; 
        let isFirstMove = true;
        let activeFeedrate = null; 
        let hasOutputXYFInCurrentCut = false; 

        segments.forEach((seg, idx) => {
            let fZ = seg.to.z;
            const rHeight = getRetractHeight();
            
            if (fZ > 0.0001) {
                fZ = rHeight;
            }

            let fX = 0, fY = 0;
            if (seg.isStartOrEndHome) {
                fX = 0; fY = 0;
            } else {
                fX = (seg.to.x * Math.cos(rotRad) - seg.to.y * Math.sin(rotRad)) * scale + offX;
                fY = (seg.to.x * Math.sin(rotRad) + seg.to.y * Math.cos(rotRad)) * scale + offY;
            }

            const dXY = Math.sqrt((fX - lastX)**2 + (fY - lastY)**2);
            const zChanged = lastZ === null || Math.abs(fZ - lastZ) > 0.0001;
            const isLastMove = (idx === segments.length - 1);

            if (!isFirstMove && seg.type === 'G1' && !seg.isTab && dXY < res && !zChanged && !isLastMove) {
                return; 
            }

            if (seg.type === 'G0') {
                hasOutputXYFInCurrentCut = false;
            }

            let fFromX = 0, fFromY = 0;
            if (seg.isStartOrEndHome) {
                fFromX = 0; fFromY = 0;
            } else {
                fFromX = (seg.from.x * Math.cos(rotRad) - seg.from.y * Math.sin(rotRad)) * scale + offX;
                fFromY = (seg.from.x * Math.sin(rotRad) + seg.from.y * Math.cos(rotRad)) * scale + offY;
            }

            const segmentPhysicalXYChanged = Math.sqrt((fX - fFromX)**2 + (fY - fFromY)**2) > 0.0001;
            const isZOnlyMove = !segmentPhysicalXYChanged && zChanged;

            let newlineParts = [];
            newlineParts.push(seg.type);
            
            if (!isZOnlyMove) {
                newlineParts.push('X' + fX.toFixed(4));
                newlineParts.push('Y' + fY.toFixed(4));
            }
            
            if (zChanged) {
                newlineParts.push('Z' + fZ.toFixed(4));
            }

            if (seg.type === 'G2' || seg.type === 'G3') {
                if (seg.I !== null || seg.J !== null) {
                    const rawI = seg.I || 0;
                    const rawJ = seg.J || 0;
                    let fI = (rawI * Math.cos(rotRad) - rawJ * Math.sin(rotRad)) * scale;
                    let fJ = (rawI * Math.sin(rotRad) + rawJ * Math.cos(rotRad)) * scale;
                    newlineParts.push('I' + fI.toFixed(4));
                    newlineParts.push('J' + fJ.toFixed(4));
                }
                if (seg.R !== null) {
                    let fR = seg.R * scale;
                    newlineParts.push('R' + fR.toFixed(4));
                }
            }

            let segF = seg.f;
            if (seg.type !== 'G0') {
                const isXYMove = !isZOnlyMove && (seg.type === 'G1' || seg.type === 'G2' || seg.type === 'G3');
                
                if (isXYMove) {
                    if (!hasOutputXYFInCurrentCut) {
                        if (feedrateEnable) {
                            segF = targetFeedrate;
                        }
                        hasOutputXYFInCurrentCut = true;
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    } else {
                        if (feedrateEnable) {
                            segF = targetFeedrate;
                        }
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    }
                } else {
                    if (feedrateEnable) {
                        segF = targetZFeedrate;
                    }
                    if (segF) {
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    }
                }
            }

            gcodeLines.push(newlineParts.join(' '));
            
            lastX = fX; lastY = fY; lastZ = fZ;
            isFirstMove = false;
        });

        return gcodeLines;
    }

    // --- 取得當前加工啟用的刀具直徑 ---
    function getActiveToolDiameter() {
        const toolChangeEnable = document.getElementById('toolChangeEnable') && document.getElementById('toolChangeEnable').checked;
        const tabEnable = document.getElementById('tabEnable') && document.getElementById('tabEnable').checked;
        
        if (toolChangeEnable) {

        } else if (tabEnable) {
            return parseFloat(document.getElementById('toolDiaInput').value) || 3.175;
