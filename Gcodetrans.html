<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-code Editor & Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        :root {
            --primary-green: #10b981;
            --accent-green: #059669;
            
            /* 暗色主題 (預設) */
            --bg-color: #111827; 
            --panel-dark: #1f2937;
            --preview-bg: #000000;
            --input-bg: #374151;
            --input-text: #ffffff;
            --input-border: #4b5563;
            --label-color: #d1d5db;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --panel-border: #374151;
            --body-text: #f3f4f6;
            --btn-secondary-bg: #374151;
            --btn-secondary-text: #e5e7eb;
            --btn-secondary-hover: #4b5563;
            --btn-secondary-border: #4b5563;
            
            --alert-bg: rgba(16, 185, 129, 0.15);
            --alert-border: rgba(16, 185, 129, 0.3);
            --alert-text: #34d399;
        }

        html:not(.dark) {
            /* 亮色主題 */
            --bg-color: #f3f4f6; 
            --panel-dark: #ffffff;
            --preview-bg: #f9fafb;
            --input-bg: #ffffff;
            --input-text: #111827;
            --input-border: #cbd5e1;
            --label-color: #374151;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --panel-border: #e2e8f0;
            --body-text: #1e293b;
            --btn-secondary-bg: #f1f5f9;
            --btn-secondary-text: #334155;
            --btn-secondary-hover: #e2e8f0;
            --btn-secondary-border: #cbd5e1;
            
            --alert-bg: #ecfdf5;
            --alert-border: #a7f3d0;
            --alert-text: #047857;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--body-text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* 預覽視窗：核心設計強制維持 1:1 正方形 */
        #preview-container { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background-color: var(--preview-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid var(--panel-border); 
            transition: background-color 0.3s, border-color 0.3s;
            margin: 0 auto;
            touch-action: none; /* 防止行動端雙指縮放導致整頁跳動 */
        }

        /* 雙主題控制面板卡片 */
        .controls-card { 
            background: var(--panel-dark); 
            padding: 1rem; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px -1px var(--card-shadow); 
            border-top: 3px solid var(--primary-green); 
            border-left: 1px solid var(--panel-border);
            border-right: 1px solid var(--panel-border);
            border-bottom: 1px solid var(--panel-border);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* 統一的主題化次級按鈕 */
        .btn-secondary {
            background-color: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            border: 1px solid var(--btn-secondary-border);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: var(--btn-secondary-hover);
        }

        /* 主題化資訊整合卡片 */
        .info-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--panel-border);
            color: var(--body-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        /* 主題化警告提示框 */
        .alert-success {
            background-color: var(--alert-bg);
            border: 1px solid var(--alert-border);
            color: var(--alert-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .btn-green { background-color: var(--primary-green); color: #064e3b; transition: all 0.2s; }
        .btn-green:hover { background-color: var(--accent-green); transform: translateY(-1px); }
        .btn-green:disabled { background-color: #4b5563; color: #9ca3af; cursor: not-allowed; transform: none; }
        
        .label-text { color: var(--label-color); font-weight: 600; font-size: 0.8rem; transition: color 0.3s; }
        canvas { display: block; }
        
        /* 雙主題輸入框 */
        input[type="number"], input[type="range"] {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--input-text);
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
            border-radius: 0.375rem;
            transition: all 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-green);
            ring: 1px solid var(--primary-green);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
        <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen p-4 md:p-8 text-slate-800 dark:text-slate-200 font-sans transition-colors duration-300">
    <div class="max-w-7xl mx-auto bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 transition-colors duration-300">


<!-- 頂部導航 -->
<div class="bg-gradient-to-r from-emerald-600 to-teal-950 p-5 text-white flex justify-between items-center border-b border-emerald-500/30 shadow-lg mb-4">
    <div>
        <h1 id="txt-header-title" class="text-2xl font-black tracking-tight">
            Gcode 即時調整
        </h1>
    </div>
    <div class="flex gap-3 items-center">
        <!-- 返回上一頁按鈕 -->
        <button onclick="if(window.history.length > 1) { window.history.back(); } else { window.location.href='index.html'; }" class="flex items-center justify-center text-slate-300 hover:text-orange-400 transition-colors font-bold bg-white/10 hover:bg-white/20 p-1.5 rounded-lg border border-white/20 cursor-pointer" title="返回上一頁 / Go Back">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <line x1="20" y1="12" x2="4" y2="12"></line>
                <polyline points="10 18 4 12 10 6"></polyline>
            </svg>
        </button>
        <!-- 明暗主題切換 -->
        <button onclick="toggleTheme()" class="p-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center justify-center" aria-label="Toggle Theme">
            <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- 圖示由 JS 動態注入 -->
            </svg>
        </button>
        <!-- 語系切換 -->
        <button id="langBtn" onclick="toggleLanguage()" class="px-3 py-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center gap-2">
            EN
        </button>
        <!-- 書頁按鈕 (指向 params.html，取代 V2.8 顯示) -->
        <a href="params.html" class="flex items-center justify-center text-slate-300 hover:text-emerald-400 transition-colors bg-white/10 hover:bg-white/20 p-1.5 rounded-lg border border-white/20 cursor-pointer" title="工藝參數建議 / Parameters Guide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
        </a>
    </div>
</div>

<div class="container mx-auto px-4 max-w-7xl">
    <!-- 主網格：行動端單欄，桌機端拆分為 3 - 6 - 3 三欄，並對齊頂部 -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
        
        <!-- 【左側控制面板】：1. 檔案上傳 與 2. 參數調整 (佔 3/12 寬度) -->
        <div class="lg:col-span-3 space-y-4 order-2 lg:order-1">
            
            <!-- 1. 檔案上傳 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-upload">1. 檔案上傳</span>
                </h2>
                <div class="flex flex-col gap-2">
                    <button onclick="document.getElementById('fileInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-sm flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span id="txt-btn-upload">選擇 G-code 檔案</span>
                    </button>
                    <input type="file" id="fileInput" accept=".gcode,.nc,.txt" class="hidden" />
                    
                    <!-- 檔案載入成功提示 -->
                    <div id="fileInfo" class="p-2 alert-success rounded text-[10px] font-bold hidden truncate">
                        <span id="txt-file-name">檔名</span>: <span id="fileNameDisplay" class="opacity-90">-</span>
                    </div>

                    <!-- G20 英制轉公制提示區 -->
                    <div id="metricAlert" class="p-2 rounded text-[10px] font-bold hidden flex items-center gap-2" style="background-color: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #f59e0b;">
                        <svg class="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="txt-metric-alert">Gcode已轉換為公制(G21)</span>
                    </div>
                </div>
            </div>

            <!-- 2. 參數調整 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3 flex items-center">
                    <span id="txt-sec-params">2. 參數調整 (不影響 Z/F)</span>
                </h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <label class="label-text block mb-1" id="txt-label-scale">縮放比例 (僅限 XY)</label>
                            <input type="number" id="scaleInput" value="1" step="0.1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-ox">X 偏移</label>
                            <input type="number" id="offsetX" value="0" step="1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-oy">Y 偏移</label>
                            <input type="number" id="offsetY" value="0" step="1" class="w-full">
                        </div>
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-rot">旋轉角度 (Z軸中心)</label>
                        <input type="number" id="rotationInput" value="0" step="1" class="w-full">
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-res">解析度 (最小 XY 位移 mm)</label>
                        <input type="number" id="resInput" value="0.1" min="0.1" step="0.1" class="w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-1">
                        <button id="centerBtn" class="btn-secondary font-bold py-2 rounded transition text-xs">自動置中</button>
                        <button id="applyBtn" class="btn-green font-bold py-2 rounded shadow-sm text-xs">更新預覽</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 【中央 3D 預覽面板】：獨立的正方形渲染區域 (佔 6/12 寬度) -->
        <div class="lg:col-span-6 order-1 lg:order-2">
            <div id="preview-container" class="shadow-2xl ring-1 ring-gray-700 select-none">
                <div class="absolute top-3 right-3 z-10">
                    <div class="bg-black/80 backdrop-blur-md text-emerald-400 px-3 py-1 rounded-full text-[9px] font-black border border-emerald-500/30 shadow-md" id="txt-preview-hint">
                        3D REALTIME VIEW
                    </div>
                </div>
                
                <!-- 【簡化設計】：左上角精簡圖例 -->
                <div class="absolute top-3 left-3 z-10 text-gray-300 text-[10px] space-y-1 bg-black/75 p-2.5 rounded-lg backdrop-blur-sm border border-white/10 shadow-lg max-w-[190px]">
                    <p class="flex items-center">
                        <span class="w-3 h-3 bg-emerald-500 rounded-sm mr-2 flex-shrink-0"></span>
                        <span id="txt-legend-path">加工路徑</span>
                    </p>
                    <p class="flex items-center">
                        <span class="w-3 h-3 bg-orange-500/30 rounded-sm mr-2 flex-shrink-0 border border-orange-500/50"></span>
                        <span id="txt-legend-sweep">刀具經過範圍</span>
                    </p>
                    <p class="flex items-center">
                        <span class="w-3 h-3 bg-none border-2 border-dashed border-gray-400 rounded-sm mr-2 flex-shrink-0"></span>
                        <span id="txt-legend-result">理論加工結果</span>
                    </p>
                    <p class="flex items-center">
                        <span class="w-3 h-3 bg-amber-500 rounded-sm mr-2 flex-shrink-0"></span>
                        <span id="txt-legend-tab">加工橋位</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- 【右側控制面板】：3. 進階選項、4. 參考底圖 與 下載按鈕 (佔 3/12 寬度) -->
        <div class="lg:col-span-3 space-y-4 order-3 lg:order-3">
            
            <!-- 3. 進階選項 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3 flex items-center">
                    <span id="txt-sec-advanced">3. 進階選項 (僅切割路徑)</span>
                </h2>
                
                <div class="space-y-4">
                    <!-- 厚度與分層設定區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="thickEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="thickEnable" class="label-text cursor-pointer" id="txt-label-thick-enable">深度調整</label>
                        </div>
                        <div id="thickControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-orig-thick">原加工總深度 (自動偵測 mm)</label>
                                <input type="number" id="origThickInput" value="0" class="w-full bg-slate-800 border-slate-700 text-slate-400 cursor-not-allowed" readonly disabled>
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-thick">目標加工總深度 (mm)</label>
                                <input type="number" id="targetThickInput" value="18" min="0.1" step="0.1" class="w-full">
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-layers">切削層數 (Layers)</label>
                                <input type="number" id="targetLayersInput" value="12" min="1" step="1" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 走速 F 調整區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="feedrateEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="feedrateEnable" class="label-text cursor-pointer" id="txt-label-feedrate-enable">走速調整(F)</label>
                        </div>
                        <div id="feedrateControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-feedrate">XY 走速(mm/min)</label>
                                <input type="number" id="targetFeedrateInput" value="1200" min="1" step="50" class="w-full">
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-zfeedrate">Z 軸下刀速(mm/min)</label>
                                <input type="number" id="targetZFeedrateInput" value="400" min="1" step="50" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 抬刀高度調整區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="retractEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="retractEnable" class="label-text cursor-pointer" id="txt-label-retract-enable">抬刀高度調整 (Z > 0)</label>
                        </div>
                        <div id="retractControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-retract">新抬刀高度 (0.1~5 mm)</label>
                                <input type="number" id="retractHeightInput" value="3.0" min="0.1" max="5.0" step="0.1" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 刀具直徑補償 (變換刀具) 調整區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="toolChangeEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="toolChangeEnable" class="label-text cursor-pointer" id="txt-label-toolchange-enable">變換刀具(不建議)</label>
                        </div>
                        <div id="toolChangeControls" class="space-y-2.5 pl-6 hidden">
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="label-text block mb-1" id="txt-label-orig-tooldia">原刀具直徑 (mm)</label>
                                    <input type="number" id="origToolDiaInput" value="6.35" min="0.1" step="0.1" class="w-full">
                                </div>
                                <div>
                                    <label class="label-text block mb-1" id="txt-label-new-tooldia">新刀具直徑 (mm)</label>
                                    <input type="number" id="newToolDiaInput" value="3.175" min="0.1" step="0.1" class="w-full">
                                </div>
                            </div>
                            <!-- 顯示加工結果 (預設為不勾選) -->
                            <div class="flex items-center gap-2 pt-1.5">
                                <input type="checkbox" id="showWorkpiece" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                                <label for="showWorkpiece" class="text-[11px] text-gray-300 font-semibold cursor-pointer select-none" id="txt-label-showwp">顯示加工結果</label>
                            </div>
                        </div>
                    </div>

                    <!-- 橋位 TAB 調整區塊 -->
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="tabEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="tabEnable" class="label-text cursor-pointer" id="txt-label-tab-enable">自動橋位</label>
                        </div>
                        <div id="tabControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-tooldia">刀具直徑 (mm)</label>
                                <input type="number" id="toolDiaInput" value="3.175" min="0.1" step="0.1" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. 參考底圖 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-refimg">4. 參考底圖 (選填)</span>
                </h2>
                <div class="space-y-3">
                    <button onclick="document.getElementById('imageInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-xs flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span id="txt-btn-upload-img">選擇參考圖片</span>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" />
                    
                    <div id="imgControls" class="space-y-2 hidden">
                        <div>
                            <label class="label-text block mb-1" id="txt-label-imgwidth">圖片實際寬度 (mm)</label>
                            <input type="number" id="imgWidthInput" value="100" min="1" step="10" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="label-text" id="txt-label-imgopacity">不透明度</label>
