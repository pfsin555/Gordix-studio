<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-code Editor & Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-green: #10b981;
            --accent-green: #059669;
            
            /* 暗色主題 (預設) */
            --bg-color: #111827; 
            --panel-dark: #1f2937;
            --preview-bg: #000000;
            --input-bg: #374151;
            --input-text: #ffffff;
            --input-border: #4b5563;
            --label-color: #d1d5db;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --panel-border: #374151;
            --body-text: #f3f4f6;
            --btn-secondary-bg: #374151;
            --btn-secondary-text: #e5e7eb;
            --btn-secondary-hover: #4b5563;
            --btn-secondary-border: #4b5563;
            
            --alert-bg: rgba(16, 185, 129, 0.15);
            --alert-border: rgba(16, 185, 129, 0.3);
            --alert-text: #34d399;
        }

        body.light-theme {
            /* 亮色主題 */
            --bg-color: #f3f4f6; 
            --panel-dark: #ffffff;
            --preview-bg: #f9fafb;
            --input-bg: #ffffff;
            --input-text: #111827;
            --input-border: #cbd5e1;
            --label-color: #374151;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --panel-border: #e2e8f0;
            --body-text: #1e293b;
            --btn-secondary-bg: #f1f5f9;
            --btn-secondary-text: #334155;
            --btn-secondary-hover: #e2e8f0;
            --btn-secondary-border: #cbd5e1;
            
            --alert-bg: #ecfdf5;
            --alert-border: #a7f3d0;
            --alert-text: #047857;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--body-text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        #preview-container { 
            width: 100%; 
            height: 450px; 
            background-color: var(--preview-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid var(--panel-border); 
            transition: background-color 0.3s, border-color 0.3s;
        }
        @media (min-width: 1024px) {
            #preview-container { height: calc(100vh - 120px); min-height: 500px; }
        }

        /* 雙主題控制面板卡片 */
        .controls-card { 
            background: var(--panel-dark); 
            padding: 1rem; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px -1px var(--card-shadow); 
            border-top: 3px solid var(--primary-green); 
            border-left: 1px solid var(--panel-border);
            border-right: 1px solid var(--panel-border);
            border-bottom: 1px solid var(--panel-border);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* 統一的主題化次級按鈕 */
        .btn-secondary {
            background-color: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            border: 1px solid var(--btn-secondary-border);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: var(--btn-secondary-hover);
        }

        /* 主題化資訊整合卡片 */
        .info-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--panel-border);
            color: var(--body-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        /* 主題化警告提示框 */
        .alert-success {
            background-color: var(--alert-bg);
            border: 1px solid var(--alert-border);
            color: var(--alert-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .btn-green { background-color: var(--primary-green); color: #064e3b; transition: all 0.2s; }
        .btn-green:hover { background-color: var(--accent-green); transform: translateY(-1px); }
        .btn-green:disabled { background-color: #4b5563; color: #9ca3af; cursor: not-allowed; transform: none; }
        
        .label-text { color: var(--label-color); font-weight: 600; font-size: 0.8rem; transition: color 0.3s; }
        canvas { display: block; }
        
        /* 雙主題輸入框 */
        input[type="number"], input[type="range"] {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--input-text);
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
            border-radius: 0.375rem;
            transition: all 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-green);
            ring: 1px solid var(--primary-green);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>

        <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="pb-4">

<!-- 頂部導航 -->
<div class="bg-gradient-to-r from-emerald-600 to-teal-950 p-5 text-white flex justify-between items-center border-b border-emerald-500/30 shadow-lg mb-4">
    <div>
        <h1 id="txt-header-title" class="text-2xl font-black tracking-tight">
            Gcode 即時調整
        </h1>
    </div>
    <div class="flex gap-3 items-center">
        <!-- 明暗主題切換 -->
        <button onclick="toggleTheme()" class="p-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center justify-center" aria-label="Toggle Theme">
            <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- 圖示由 JS 動態注入 -->
            </svg>
        </button>
        <!-- 語系切換 -->
        <button id="langBtn" onclick="toggleLanguage()" class="px-3 py-1.5 rounded-lg text-[11px] font-bold bg-white/10 hover:bg-white/20 text-white border border-white/20 transition-all flex items-center gap-2">
            EN
        </button>
        <span class="text-[10px] bg-white/10 px-3 py-1 rounded-full border border-white/20 font-mono">V2.5</span>
    </div>
</div>

<div class="container mx-auto px-4 max-w-7xl">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- 左側控制面板 -->
        <div class="lg:col-span-3 space-y-4 order-2 lg:order-1">
            
            <!-- 1. 檔案上傳 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-upload">1. 檔案上傳</span>
                </h2>
                <div class="flex flex-col gap-2">
                    <button onclick="document.getElementById('fileInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-sm flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span id="txt-btn-upload">選擇 G-code 檔案</span>
                    </button>
                    <input type="file" id="fileInput" accept=".gcode,.nc,.txt" class="hidden" />
                    
                    <!-- 檔案載入成功提示 -->
                    <div id="fileInfo" class="p-2 alert-success rounded text-[10px] font-bold hidden truncate">
                        <span id="txt-file-name">檔名</span>: <span id="fileNameDisplay" class="opacity-90">-</span>
                    </div>

                    <!-- G20 英制轉公制提示區 -->
                    <div id="metricAlert" class="p-2 rounded text-[10px] font-bold hidden flex items-center gap-2" style="background-color: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #f59e0b;">
                        <svg class="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="txt-metric-alert">Gcode已轉換為公制(G21)</span>
                    </div>
                </div>
            </div>

            <!-- 2. 參數調整 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3 flex items-center">
                    <span id="txt-sec-params">2. 參數調整 (不影響 Z/F)</span>
                </h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <label class="label-text block mb-1" id="txt-label-scale">縮放比例 (僅限 XY)</label>
                            <input type="number" id="scaleInput" value="1" step="0.1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-ox">X 偏移</label>
                            <input type="number" id="offsetX" value="0" step="1" class="w-full">
                        </div>
                        <div>
                            <label class="label-text block mb-1" id="txt-label-oy">Y 偏移</label>
                            <input type="number" id="offsetY" value="0" step="1" class="w-full">
                        </div>
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-rot">旋轉角度 (Z軸中心)</label>
                        <input type="number" id="rotationInput" value="0" step="1" class="w-full">
                    </div>
                    <div>
                        <label class="label-text block mb-1" id="txt-label-res">解析度 (最小 XY 位移 mm)</label>
                        <input type="number" id="resInput" value="0.1" min="0.1" step="0.1" class="w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1">
                        <button id="centerBtn" class="btn-secondary font-bold py-2 rounded transition text-xs">自動置中</button>
                        <button id="applyBtn" class="btn-green font-bold py-2 rounded shadow-sm text-xs">更新預覽</button>
                    </div>
                </div>
            </div>

            <!-- 3. 進階選項 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3 flex items-center">
                    <span id="txt-sec-advanced">3. 進階選項</span>
                </h2>
                
                <div class="space-y-4">
                    <!-- 厚度與分層設定區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="thickEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="thickEnable" class="label-text cursor-pointer" id="txt-label-thick-enable">啟用厚度與分層調整</label>
                        </div>
                        <div id="thickControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-orig-thick">原始加工總深度 (自動偵測 mm)</label>
                                <input type="number" id="origThickInput" value="0" class="w-full bg-slate-800 border-slate-700 text-slate-400 cursor-not-allowed" readonly disabled>
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-thick">目標加工總深度 (mm)</label>
                                <input type="number" id="targetThickInput" value="18" min="0.1" step="0.1" class="w-full">
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-layers">切削層數 (Layers)</label>
                                <input type="number" id="targetLayersInput" value="12" min="1" step="1" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 走速 F 調整區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="feedrateEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="feedrateEnable" class="label-text cursor-pointer" id="txt-label-feedrate-enable">啟用走速 F 調整</label>
                        </div>
                        <div id="feedrateControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-feedrate">目標 XY 走速 F (mm/min)</label>
                                <input type="number" id="targetFeedrateInput" value="1200" min="1" step="50" class="w-full">
                            </div>
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-zfeedrate">目標 Z 軸下刀速 F (mm/min)</label>
                                <input type="number" id="targetZFeedrateInput" value="400" min="1" step="50" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 抬刀高度調整區塊 -->
                    <div class="border-b border-gray-700/50 pb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="retractEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="retractEnable" class="label-text cursor-pointer" id="txt-label-retract-enable">啟用安全抬刀高度調整 (Z > 0)</label>
                        </div>
                        <div id="retractControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-target-retract">目標抬刀高度 (0.1~5 mm)</label>
                                <input type="number" id="retractHeightInput" value="3.0" min="0.1" max="5.0" step="0.1" class="w-full">
                            </div>
                        </div>
                    </div>

                    <!-- 橋位 TAB 調整區塊 -->
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="tabEnable" class="w-4 h-4 rounded text-emerald-500 bg-gray-700 border-gray-600 focus:ring-emerald-500 accent-emerald-500">
                            <label for="tabEnable" class="label-text cursor-pointer" id="txt-label-tab-enable">啟用自動橋位 (最後一圈抬刀)</label>
                        </div>
                        <div id="tabControls" class="space-y-2.5 hidden pl-6">
                            <div>
                                <label class="label-text block mb-1" id="txt-label-tooldia">刀具直徑 (mm)</label>
                                <input type="number" id="toolDiaInput" value="3.175" min="0.1" step="0.1" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. 參考底圖 -->
            <div class="controls-card">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2 flex items-center">
                    <span id="txt-sec-refimg">4. 參考底圖 (選填)</span>
                </h2>
                <div class="space-y-3">
                    <button onclick="document.getElementById('imageInput').click()" class="btn-secondary w-full font-bold py-2 px-4 rounded transition text-xs flex items-center justify-center shadow-inner">
                        <svg class="w-4 h-4 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span id="txt-btn-upload-img">選擇參考圖片</span>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" />
                    
                    <div id="imgControls" class="space-y-2 hidden">
                        <div>
                            <label class="label-text block mb-1" id="txt-label-imgwidth">圖片實際寬度 (mm)</label>
                            <input type="number" id="imgWidthInput" value="100" min="1" step="10" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="label-text" id="txt-label-imgopacity">不透明度</label>
                                <span id="opacityVal" class="text-xs text-emerald-400 font-mono">0.5</span>
                            </div>
                            <input type="range" id="imgOpacityInput" min="0.1" max="1.0" step="0.05" value="0.5" class="w-full accent-emerald-500">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 加工預估 & 下載 -->
            <div class="info-card rounded-lg p-4 shadow-xl space-y-3 border-t-4 border-emerald-500">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider" id="txt-info-time">預估時間</p>
                        <p class="text-sm font-mono font-bold text-emerald-400" id="timeEst">0 min 0 sec</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider" id="txt-info-dist">路徑長度</p>
                        <p class="text-sm font-mono font-bold" id="distContainer"><span id="distEst">0</span> <span class="text-[10px] text-gray-500">mm</span></p>
                    </div>
                </div>
                <button id="downloadBtn" class="w-full bg-emerald-500 text-gray-900 py-3 rounded-lg font-black text-xs uppercase hover:bg-emerald-400 transition shadow-lg disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed" disabled>
                    下載修改後的 G-code
                </button>
            </div>
        </div>

        <!-- 3D 預覽區域 -->
        <div class="lg:col-span-9 order-1 lg:order-2">
            <div id="preview-container" class="shadow-2xl ring-1 ring-gray-700">
                <div class="absolute top-3 right-3 z-10">
                    <div class="bg-black/80 backdrop-blur-md text-emerald-400 px-3 py-1 rounded-full text-[9px] font-black border border-emerald-500/30" id="txt-preview-hint">
                        3D REALTIME VIEW
                    </div>
                </div>
                <div class="absolute bottom-3 left-3 z-10 text-gray-400 text-[9px] space-y-0.5 bg-black/60 p-2 rounded-lg backdrop-blur-sm border border-white/5">
                    <p id="txt-mouse-l" class="flex items-center"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>左鍵: 旋轉</p>
                    <p id="txt-mouse-r" class="flex items-center"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-1.5"></span>右鍵: 平移</p>
                    <p id="txt-mouse-w" class="flex items-center"><span class="w-1.5 h-1.5 bg-white rounded-full mr-1.5"></span>滾輪: 縮放</p>
                    <p class="flex items-center text-amber-500"><span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-1.5 animate-pulse"></span>黃色線: 橋位抬刀 (TAB)</p>
                </div>
            </div>
        </div>
    </div>
</div>

    function initThree() {
        const container = document.getElementById('preview-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(200, 500, 300);
        scene.add(light);

        grid = new THREE.GridHelper(2000, 40, 0x10b981, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        camera.position.set(200, -200, 200);
        camera.up.set(0, 0, 1);
        camera.lookAt(0, 0, 0);

        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };

        const handleMove = (x, y, buttons) => {
            if (!isDragging) return;
            const deltaX = x - previousMouse.x;
            const deltaY = y - previousMouse.y;
            if (buttons === 1) {
                const offset = new THREE.Vector3().subVectors(camera.position, new THREE.Vector3(0,0,0));
                const radius = offset.length();
                let phi = Math.atan2(offset.y, offset.x) - deltaX * 0.005;
                let theta = Math.acos(offset.z / radius) - deltaY * 0.005;
                theta = Math.max(0.01, Math.min(Math.PI - 0.01, theta));
                camera.position.x = radius * Math.sin(theta) * Math.cos(phi);
                camera.position.y = radius * Math.sin(theta) * Math.sin(phi);
                camera.position.z = radius * Math.cos(theta);
            } else if (buttons === 2) {
                camera.position.x -= deltaX * 0.1;
                camera.position.y += deltaY * 0.1;
            }
            camera.lookAt(0,0,0);
            previousMouse = { x, y };
        };

        container.addEventListener('mousedown', e => { isDragging = true; previousMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY, e.buttons));
        container.addEventListener('wheel', e => {
            if (e.deltaY > 0) camera.position.multiplyScalar(1.1);
            else camera.position.divideScalar(1.1);
            camera.lookAt(0,0,0);
        });
        container.oncontextmenu = e => e.preventDefault();

        animate();
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

    // --- 英制(G20) 轉換為 公制(G21) 處理函數 ---
    function convertInchToMetric(text) {
        const lines = text.split('\n');
        let isInchMode = false;
        
        const converted = lines.map(line => {
            let cmd = line.trim();
            if (!cmd) return line;

            let cleanCmd = cmd;
            let comment = "";
            const semiIdx = cmd.indexOf(';');
            if (semiIdx !== -1) {
                cleanCmd = cmd.substring(0, semiIdx).trim();
                comment = cmd.substring(semiIdx);
            }

            let parenComments = [];
            cleanCmd = cleanCmd.replace(/\([^)]*\)/g, (match) => {
                parenComments.push(match);
                return `__COMMENT_PLACEHOLDER_${parenComments.length - 1}__`;
            });

            if (/\bG0*20\b/i.test(cleanCmd)) {
                isInchMode = true;
                cleanCmd = cleanCmd.replace(/\bG0*20\b/gi, 'G21');
            } else if (/\bG0*21\b/i.test(cleanCmd)) {
                isInchMode = false;
            }

            if (isInchMode) {
                cleanCmd = cleanCmd.replace(/([XYZIJKRF])\s*([-+]?[0-9]*\.?[0-9]+)/gi, (match, letter, valStr) => {
                    const val = parseFloat(valStr);
                    const convertedVal = val * 25.4;
                    return letter.toUpperCase() + convertedVal.toFixed(4);
                });
            }

            parenComments.forEach((pc, idx) => {
                cleanCmd = cleanCmd.replace(`__COMMENT_PLACEHOLDER_${idx}__`, pc);
            });

            return cleanCmd + comment;
        });

        return converted.join('\n');
    }

    function hasG20Active(text) {
        const lines = text.split('\n');
        for (let line of lines) {
            let clean = line.split(';')[0].replace(/\([^)]*\)/g, '').trim();
            if (/\bG0*20\b/i.test(clean)) {
                return true;
            }
        }
        return false;
    }

    function findMachiningBounds(text) {
        const lines = text.split('\n');
        let firstMachiningIdx = -1;
        let lastMachiningIdx = -1;
        let currentMotionMode = null;
        
        lines.forEach((line, i) => {
            const cmd = line.trim().toUpperCase();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) return;
            
            let cleanCmd = cmd.split(';')[0].trim();
            
            const words = {};
            const matches = cleanCmd.matchAll(/([A-Z])\s*([-+]?[0-9]*\.?[0-9]+)/gi);
            for (const match of matches) {
                words[match[1]] = parseFloat(match[2]);
            }
            
            if (words['G'] !== undefined) {
                const gVal = Math.round(words['G']);
                if (gVal === 0) currentMotionMode = 'G0';
                else if (gVal === 1) currentMotionMode = 'G1';
                else if (gVal === 2) currentMotionMode = 'G2';
                else if (gVal === 3) currentMotionMode = 'G3';
            }
            
            const hasX = words['X'] !== undefined;
            const hasY = words['Y'] !== undefined;
            
            if ((hasX || hasY) && currentMotionMode && currentMotionMode !== 'G0') {
                if (firstMachiningIdx === -1) firstMachiningIdx = i;
                lastMachiningIdx = i;
            }
        });
        
        return { firstMachiningIdx, lastMachiningIdx };
    }

    // 三維圓弧分割生成點
    function generateArcPoints(p1, p2, I, J, R, isCW) {
        const points = [];
        let cx, cy, r;

        if (R !== null) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d === 0 || Math.abs(R) < d / 2) {
                return [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
            }
            r = Math.abs(R);
            const h = Math.sqrt(r * r - (d / 2) * (d / 2));
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nx = -dy / d;
            const ny = dx / d;

            let factor = (isCW ? 1 : -1) * (R < 0 ? -1 : 1);
            cx = mx + factor * h * nx;
            cy = my + factor * h * ny;
        } else {
            cx = p1.x + (I || 0);
            cy = p1.y + (J || 0);
            r = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2);
        }

        let startAngle = Math.atan2(p1.y - cy, p1.x - cx);
        let endAngle = Math.atan2(p2.y - cy, p2.x - cx);

        let diff = endAngle - startAngle;
        if (isCW) {
            if (diff >= 0) diff -= 2 * Math.PI;
        } else {
            if (diff <= 0) diff += 2 * Math.PI;
        }

        const numSegments = Math.max(8, Math.min(64, Math.ceil(Math.abs(diff) / (Math.PI / 16))));
        for (let s = 0; s <= numSegments; s++) {
            const t = s / numSegments;
            const angle = startAngle + diff * t;
            const z = p1.z + (p2.z - p1.z) * t; 
            points.push(new THREE.Vector3(cx + r * Math.cos(angle), cy + r * Math.sin(angle), z));
        }

        return points;
    }

    // --- 取得當前設定的安全抬刀高度 ---
    function getRetractHeight() {
        const retractEnable = document.getElementById('retractEnable') && document.getElementById('retractEnable').checked;
        if (retractEnable) {
            let val = parseFloat(document.getElementById('retractHeightInput').value);
            if (isNaN(val)) return 3.0;
            // 防呆限幅限制 0.1mm 至 5.0mm
            return Math.max(0.1, Math.min(5.0, val));
        }
        return 3.0; // 預設安全抬刀高度
    }

    // 模態記憶與起終點保護 Gcode 解析器
    function parseGcode(text) {
        const bounds = findMachiningBounds(text);
        const firstMachiningIdx = bounds.firstMachiningIdx;
        const lastMachiningIdx = bounds.lastMachiningIdx;

        const lines = text.split('\n');
        let currentPos = { x: 0, y: 0, z: 0, f: 1000 };
        let activeMotion = null; 
        const pathData = [];

        lines.forEach((line, index) => {
            const cmd = line.trim().toUpperCase();
            if (!cmd || cmd.startsWith('(') || cmd.startsWith(';')) return;

            let cleanCmd = cmd;
            const semiIdx = cmd.indexOf(';');
            if (semiIdx !== -1) {
                cleanCmd = cmd.substring(0, semiIdx).trim();
            }

            const words = {};
            const matches = cleanCmd.matchAll(/([A-Z])\s*([-+]?[0-9]*\.?[0-9]+)/gi);
            for (const match of matches) {
                words[match[1]] = parseFloat(match[2]);
            }

            if (words['G'] !== undefined) {
                const gVal = Math.round(words['G']);
                if (gVal === 0) activeMotion = 'G0';
                else if (gVal === 1) activeMotion = 'G1';
                else if (gVal === 2) activeMotion = 'G2';
                else if (gVal === 3) activeMotion = 'G3';
            }

            const hasCoords = (words['X'] !== undefined || words['Y'] !== undefined || words['Z'] !== undefined || words['I'] !== undefined || words['J'] !== undefined || words['R'] !== undefined);

            if (hasCoords && activeMotion) {
                let newX = words['X'] !== undefined ? words['X'] : currentPos.x;
                let newY = words['Y'] !== undefined ? words['Y'] : currentPos.y;
                let newZ = words['Z'] !== undefined ? words['Z'] : currentPos.z;
                
                // 統一調整安全抬刀高度 (Z為正值時套用自訂高度)
                const rHeight = getRetractHeight();
                if (newZ > 0.0001) {
                    newZ = rHeight;
                }

                if (words['F'] !== undefined) currentPos.f = words['F'];

                const isStartOrEndHome = (firstMachiningIdx !== -1 && (index < firstMachiningIdx || index > lastMachiningIdx)) && 
                                         (Math.abs(newX) < 1e-4 && Math.abs(newY) < 1e-4);

                pathData.push({
                    from: { ...currentPos },
                    to: { x: newX, y: newY, z: newZ },
                    f: currentPos.f,
                    type: activeMotion,
                    I: words['I'] !== undefined ? words['I'] : null,
                    J: words['J'] !== undefined ? words['J'] : null,
                    R: words['R'] !== undefined ? words['R'] : null,
                    isStartOrEndHome: isStartOrEndHome,
                    lineIdx: index
                });

                currentPos.x = newX;
                currentPos.y = newY;
                currentPos.z = newZ;
            } else if (words['F'] !== undefined) {
                currentPos.f = words['F'];
            }
        });
        return pathData;
    }

    // --- 偵測原始加工最大深度 (Z軸最小值絕對值) ---
    function detectOriginalDepth(path) {
        let minZ = 0;
        path.forEach(seg => {
            if (seg.type !== 'G0' && !seg.isStartOrEndHome) {
                if (seg.to.z < minZ) minZ = seg.to.z;
                if (seg.from.z < minZ) minZ = seg.from.z;
            }
        });
        return Math.abs(minZ);
    }

    // --- 偵測第一個切削動作的走速 F ---
    function detectFirstFeedrate(path) {
        for (let seg of path) {
            if (seg.type !== 'G0' && !seg.isStartOrEndHome) {
                const dx = seg.to.x - seg.from.x;
                const dy = seg.to.y - seg.from.y;
                const dXY = Math.sqrt(dx * dx + dy * dy);
                if (dXY > 1e-4 && seg.f > 0) {
                    return seg.f;
                }
            }
        }
        return 1200; // 預設走速
    }

    // --- 偵測第一個垂直下刀切削動作的走速 F (Z 軸獨立走速) ---
    function detectFirstZFeedrate(path) {
        for (let seg of path) {
            if (seg.type === 'G1' && !seg.isStartOrEndHome) {
                const dx = seg.to.x - seg.from.x;
                const dy = seg.to.y - seg.from.y;
                const dXY = Math.sqrt(dx * dx + dy * dy);
                const dZ = Math.abs(seg.to.z - seg.from.z);
                if (dXY < 1e-4 && dZ > 1e-4 && seg.f > 0) {
                    return seg.f;
                }
            }
        }
        return 400; // 預設 Z 軸下刀速
    }

    // --- 自動偵測原始 G-code 的單次下刀 Stepdown 深度 ---
    function detectOriginalStepdown(path) {
        const zs = [];
        path.forEach(seg => {
            if (seg.to.z < -0.001) {
                zs.push(parseFloat(seg.to.z.toFixed(4)));
            }
        });
        const uniqueZs = [...new Set(zs)].sort((a, b) => b - a); // 由淺到深
        if (uniqueZs.length >= 2) {
            return Math.abs(uniqueZs[1] - uniqueZs[0]);
        } else if (uniqueZs.length === 1) {
            return Math.abs(uniqueZs[0]);
        }
        return 1.5; // 預設下刀
    }

    // --- 實作自訂層數與總厚度調整 (分層重置與重建演算法) ---
    function applyThicknessAdjustment(pathData) {
        const thickEnable = document.getElementById('thickEnable') && document.getElementById('thickEnable').checked;
        if (!thickEnable) return pathData;

        const detectedDepth = parseFloat(document.getElementById('origThickInput').value) || 0;
        const targetDepth = parseFloat(document.getElementById('targetThickInput').value) || 0;
        const layers = parseInt(document.getElementById('targetLayersInput').value) || 12;

        // 防呆保護：若數值不合規，跳過調整
        if (detectedDepth <= 0.0001 || targetDepth <= 0.0001 || layers < 1) return pathData;

        // 層數均分計算等比例 Stepdown
        const stepdown = targetDepth / layers;

        // 1. 將路徑分割為 rapid (快速定位、抬刀) 與 contour (切削工件) 區塊
        const blocks = [];
        let currentBlock = { type: 'rapid', segments: [] };
        blocks.push(currentBlock);

        pathData.forEach(seg => {
            const isCut = (seg.from.z < -0.001 || seg.to.z < -0.001) && seg.type !== 'G0';
            if (isCut) {
                if (currentBlock.type === 'rapid') {
                    currentBlock = { type: 'contour', segments: [] };
                    blocks.push(currentBlock);
                }
                currentBlock.segments.push(seg);
            } else {
                if (currentBlock.type === 'contour') {
                    currentBlock = { type: 'rapid', segments: [] };
                    blocks.push(currentBlock);
                }
                currentBlock.segments.push(seg);
            }
        });

        const rebuiltSegments = [];

        blocks.forEach(block => {
            if (block.type === 'contour' && block.segments.length > 0) {
                // A. 找出此 contour 中的所有目標負 Z 座標
                const zs = [];
                block.segments.forEach(seg => {
                    if (seg.to.z < -0.001) {
                        zs.push(parseFloat(seg.to.z.toFixed(4)));
                    }
                });
                const uniqueZs = [...new Set(zs)].sort((a, b) => b - a); // 從高到低排序，如 [-7, -14, -21]

                if (uniqueZs.length > 0) {
                    const firstZ = uniqueZs[0]; // 第一個下刀深度

                    // B. 提取出第一圈加工的 2D 軌跡 (Profile)
                    const profile = [];
                    for (let seg of block.segments) {
                        if (seg.to.z < firstZ - 0.01 || seg.to.z > -0.001) {
                            break;
                        }
                        profile.push(seg);
                    }

                    if (profile.length > 0) {
                        // C. 計算全新分層 Z 軸座標列表 (走 M 圈)
                        const newZs = [];
                        let current = stepdown;
                        while (current < targetDepth - 1e-4) {
                            newZs.push(-current);
                            current += stepdown;
                        }
                        newZs.push(-targetDepth); // 最底下一圈

                        // D. 重建所有分層 passes
                        const contourRebuilt = [];
                        let prevZ = block.segments[0].from.z; // 第一個 plunge 的起始高度

                        newZs.forEach((targetZ) => {
                            profile.forEach((origSeg, segIdx) => {
                                const newSeg = { ...origSeg };
                                if (segIdx === 0) {
                                    // 垂直下刀/斜進刀段
                                    newSeg.from = { ...origSeg.from, z: prevZ };
                                    newSeg.to = { ...origSeg.to, z: targetZ };
                                } else {
                                    // 平面切削段
                                    newSeg.from = { ...origSeg.from, z: targetZ };
                                    newSeg.to = { ...origSeg.to, z: targetZ };
                                }
                                contourRebuilt.push(newSeg);
                            });
                            prevZ = targetZ;
                        });

                        // E. 接回原始 contour 的最後抬刀 retract 移動段
                        const lastOrigSeg = block.segments[block.segments.length - 1];
                        if (lastOrigSeg && lastOrigSeg.to.z > -0.001) {
                            const finalLift = { ...lastOrigSeg };
                            finalLift.from = { ...lastOrigSeg.from, z: prevZ };
                            finalLift.to = { ...lastOrigSeg.to };
                            contourRebuilt.push(finalLift);
                        }

                        rebuiltSegments.push(...contourRebuilt);
                        return; // 已重建，不推入原始 contour
                    }
                }
            }

            // 若不符合重建條件或為 rapid 區塊，推入原始段落
            rebuiltSegments.push(...block.segments);
        });

        return rebuiltSegments;
    }

    // --- 實作切削走速 F 調整 ---
    function applyFeedrateAdjustment(path) {
        const feedrateEnable = document.getElementById('feedrateEnable') && document.getElementById('feedrateEnable').checked;
        if (!feedrateEnable) return path;

        const targetFeedrate = parseFloat(document.getElementById('targetFeedrateInput').value) || 1200;
        const targetZFeedrate = parseFloat(document.getElementById('targetZFeedrateInput').value) || 400;

        path.forEach(seg => {
            if (seg.isStartOrEndHome || seg.type === 'G0') {
                return;
            }
            const dx = seg.to.x - seg.from.x;
            const dy = seg.to.y - seg.from.y;
            const dXY = Math.sqrt(dx * dx + dy * dy);
            const dZ = Math.abs(seg.to.z - seg.from.z);

            const isXYMove = dXY > 1e-4 && (seg.type === 'G1' || seg.type === 'G2' || seg.type === 'G3');
            const isPureZMove = dXY < 1e-4 && dZ > 1e-4 && seg.type === 'G1';

            if (isXYMove) {
                seg.f = targetFeedrate;
            } else if (isPureZMove) {
                seg.f = targetZFeedrate;
            }
        });

        return path;
    }

    // --- 計算任意 2D 點到圓弧段（G2/G3）的最短歐幾里得距離 ---
    function getDistanceToArc(pt, arcSeg) {
        const p1 = arcSeg.from;
        const p2 = arcSeg.to;
        
        const distSq = (ax, ay, bx, by) => (ax - bx)**2 + (ay - by)**2;
        const distP1 = Math.sqrt(distSq(pt.x, pt.y, p1.x, p1.y));
        const distP2 = Math.sqrt(distSq(pt.x, pt.y, p2.x, p2.y));
        const d_endpoints = Math.min(distP1, distP2);
        
        let cx, cy, r;
        const isCW = arcSeg.type === 'G2';
        
        if (arcSeg.R !== null && arcSeg.R !== undefined) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d === 0) return d_endpoints;
            r = Math.abs(arcSeg.R);
            if (r < d / 2) return d_endpoints; 
            const h = Math.sqrt(r * r - (d / 2) * (d / 2));
            const mx = (p1.x + p2.x) / 2;
            const my = (p1.y + p2.y) / 2;
            const nx = -dy / d;
            const ny = dx / d;

            let factor = (isCW ? 1 : -1) * (arcSeg.R < 0 ? -1 : 1);
            cx = mx + factor * h * nx;
            cy = my + factor * h * ny;
        } else {
            cx = p1.x + (arcSeg.I || 0);
            cy = p1.y + (arcSeg.J || 0);
            r = Math.sqrt((p1.x - cx)**2 + (p1.y - cy)**2);
        }
        
        if (r === 0) return d_endpoints;
        
        const pAngle = Math.atan2(pt.y - cy, pt.x - cx);
        const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
        const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
        
        const TWO_PI = 2 * Math.PI;
        const norm = (a) => ((a % TWO_PI) + TWO_PI) % TWO_PI;
        
        let s = norm(startAngle);
        let e = norm(endAngle);
        let t = norm(pAngle);
        
        let inside = false;
        if (Math.sqrt(distSq(p1.x, p1.y, p2.x, p2.y)) < 1e-4) {
            inside = true;
        } else if (!isCW) { 
            if (s <= e) inside = (t >= s && t <= e);
            else inside = (t >= s || t <= e);
        } else { 
            if (e <= s) inside = (t >= e && t <= s);
            else inside = (t >= e || t <= s);
        }
        
        if (inside) {
            const distToCenter = Math.sqrt(distSq(pt.x, pt.y, cx, cy));
            const d_arc = Math.abs(distToCenter - r);
            return Math.min(d_endpoints, d_arc);
        }
        
        return d_endpoints;
    }

    // --- 橋位 (TAB) 計算核心分割算法 ---
    function splitSegmentWithTabs(seg, tabs, tabHeight, R, arcSegs) {
        const tValues = [0, 1];
        const p1 = seg.from;
        const p2 = seg.to;
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const lenSq = dx * dx + dy * dy;
        const R_sq = R * R;
        const activeTabIntervals = [];

        if (lenSq > 1e-6) {
            tabs.forEach(tab => {
                const fx = p1.x - tab.x;
                const fy = p1.y - tab.y;

                const a = lenSq;
                const b = 2 * (fx * dx + fy * dy);
                const c = (fx * fx + fy * fy) - R_sq;

                const disc = b * b - 4 * a * c;
                if (disc > 0) {
                    const sqrtDisc = Math.sqrt(disc);
                    const t1 = (-b - sqrtDisc) / (2 * a);
                    const t2 = (-b + sqrtDisc) / (2 * a);

                    if (t1 > 0 && t1 < 1 && t2 > 0 && t2 < 1) {
                        tValues.push(t1);
                        tValues.push(t2);
                        activeTabIntervals.push({ start: t1, end: t2 });
                    }
                }
            });
        }

        tValues.sort((a, b) => a - b);
        const filteredT = [];
        tValues.forEach(t => {
            if (filteredT.length === 0 || t - filteredT[filteredT.length - 1] > 1e-4) {
                filteredT.push(t);
            }
        });

        const subSegs = [];
        for (let i = 0; i < filteredT.length - 1; i++) {
            const tStart = filteredT[i];
            const tEnd = filteredT[i + 1];
            const tMid = (tStart + tEnd) / 2;

            const fromPt = {
                x: p1.x + tStart * dx,
                y: p1.y + tStart * dy,
                z: p1.z + tStart * (p2.z - p1.z)
            };
            const toPt = {
                x: p1.x + tEnd * dx,
                y: p1.y + tEnd * dy,
                z: p1.z + tEnd * (p2.z - p1.z)
            };

            let inTab = false;
            for (const interval of activeTabIntervals) {
                if (tMid >= interval.start - 1e-4 && tMid <= interval.end + 1e-4) {
                    inTab = true;
                    break;
                }
            }

            if (inTab) {
                // 1. 獨立垂直抬刀段 (保持XY不動，單獨向上抬升 Z 軸)
                subSegs.push({
                    from: { x: fromPt.x, y: fromPt.y, z: fromPt.z },
                    to: { x: fromPt.x, y: fromPt.y, z: fromPt.z + tabHeight },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });

                // 2. 抬升高度後的空中水平移動跨越段
                subSegs.push({
                    from: { x: fromPt.x, y: fromPt.y, z: fromPt.z + tabHeight },
                    to: { x: toPt.x, y: toPt.y, z: toPt.z + tabHeight },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });

                // 3. 獨立垂直下刀段 (保持XY不動，單獨向下扎刀切削)
                subSegs.push({
                    from: { x: toPt.x, y: toPt.y, z: toPt.z + tabHeight },
                    to: { x: toPt.x, y: toPt.y, z: toPt.z },
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: true,
                    lineIdx: seg.lineIdx
                });
            } else {
                subSegs.push({
                    from: fromPt,
                    to: toPt,
                    f: seg.f,
                    type: 'G1',
                    isStartOrEndHome: false,
                    isTab: false,
                    lineIdx: seg.lineIdx
                });
            }
        }

        return subSegs;
    }

    function applyTabsToPaths(pathData) {
        const tabEnable = document.getElementById('tabEnable') && document.getElementById('tabEnable').checked;
        if (!tabEnable) return pathData;

        const arcSegs = pathData.filter(seg => seg.type === 'G2' || seg.type === 'G3');
        const toolDia = parseFloat(document.getElementById('toolDiaInput')?.value) || 3.175;
        const tabWidth = toolDia + 6;
        const R = tabWidth / 2;

        const result = [];
        let currentRun = [];

        const flushRun = () => {
            if (currentRun.length === 0) return;

            const uniqueZ = [...new Set(currentRun.map(s => parseFloat(s.to.z.toFixed(4))))].sort((a, b) => b - a);
            const Z_deepest = uniqueZ[uniqueZ.length - 1];

            let stepdown = 1.5; 
            if (uniqueZ.length >= 2) {
                stepdown = Math.abs(uniqueZ[uniqueZ.length - 1] - uniqueZ[uniqueZ.length - 2]);
            } else if (uniqueZ.length === 1) {
                stepdown = Math.max(1.0, Math.min(3.0, Math.abs(Z_deepest) * 0.5)); 
            }
            stepdown = Math.max(1.0, Math.min(3.0, stepdown)); 

            const finalPassSegs = currentRun.filter(s => Math.abs(s.to.z - Z_deepest) < 0.01);

            if (finalPassSegs.length > 0) {
                const candidateSegs = [];
                finalPassSegs.forEach(seg => {
                    if (seg.type === 'G1') {
                        const dx = seg.to.x - seg.from.x;
                        const dy = seg.to.y - seg.from.y;
                        const len = Math.sqrt(dx * dx + dy * dy);
                        if (len > tabWidth + 1.0) {
                            candidateSegs.push({
                                seg: seg,
                                len: len,
                                midpoint: {
                                    x: (seg.from.x + seg.to.x) / 2,
                                    y: (seg.from.y + seg.to.y) / 2,
                                    z: (seg.from.z + seg.to.z) / 2
                                }
                            });
                        }
                    }
                });

                candidateSegs.sort((a, b) => b.len - a.len);

                const tabs = [];
                const minDistanceBetweenTabs = 20.0;

                for (const cand of candidateSegs) {
                    const ptMid = { ...cand.midpoint };
                    const L = cand.len;
                    const u1 = 0.5 - R / L;
                    const u2 = 0.5 + R / L;

                    const pt1 = {
                        x: cand.seg.from.x + u1 * (cand.seg.to.x - cand.seg.from.x),
                        y: cand.seg.from.y + u1 * (cand.seg.to.y - cand.seg.from.y)
                    };
                    const pt2 = {
                        x: cand.seg.from.x + u2 * (cand.seg.to.x - cand.seg.from.x),
                        y: cand.seg.from.y + u2 * (cand.seg.to.y - cand.seg.from.y)
                    };

                    let nearArc = false;
                    if (arcSegs && arcSegs.length > 0) {
                        for (const arc of arcSegs) {
                            if (getDistanceToArc(pt1, arc) < 0.5 || getDistanceToArc(pt2, arc) < 0.5) {
                                nearArc = true;
                                break;
                            }
                        }
                    }

                    let foundSafeOffset = !nearArc;
                    if (!foundSafeOffset) {
                        const minT = R / L;
                        const maxT = 1 - R / L;
                        const span = maxT - minT;
                        
                        for (let step = 0; step <= 15; step++) {
                            const tCenter = minT + (step / 15) * span;
                            const testU1 = tCenter - R / L;
                            const testU2 = tCenter + R / L;

                            const testPt1 = {
                                x: cand.seg.from.x + testU1 * (cand.seg.to.x - cand.seg.from.x),
                                y: cand.seg.from.y + testU1 * (cand.seg.to.y - cand.seg.from.y)
                            };
                            const testPt2 = {
                                x: cand.seg.from.x + testU2 * (cand.seg.to.x - cand.seg.from.x),
                                y: cand.seg.from.y + testU2 * (cand.seg.to.y - cand.seg.from.y)
                            };

                            let testNearArc = false;
                            if (arcSegs && arcSegs.length > 0) {
                                for (const arc of arcSegs) {
                                    if (getDistanceToArc(testPt1, arc) < 0.5 || getDistanceToArc(testPt2, arc) < 0.5) {
                                        testNearArc = true;
                                        break;
                                    }
                                }
                            }

                            if (!testNearArc) {
                                ptMid.x = cand.seg.from.x + tCenter * (cand.seg.to.x - cand.seg.from.x);
                                ptMid.y = cand.seg.from.y + tCenter * (cand.seg.to.y - cand.seg.from.y);
                                foundSafeOffset = true;
                                break;
                            }
                        }
                    }

                    if (!foundSafeOffset) continue;

                    let tooClose = false;
                    for (const existing of tabs) {
                        const dist = Math.sqrt((ptMid.x - existing.x)**2 + (ptMid.y - existing.y)**2);
                        if (dist < minDistanceBetweenTabs) {
                            tooClose = true;
                            break;
                        }
                    }

                    if (!tooClose) {
                        tabs.push(ptMid);
                    }

                    if (tabs.length >= 4) break;
                }

                currentRun.forEach(seg => {
                    const isFinalPass = Math.abs(seg.to.z - Z_deepest) < 0.01;
                    if (isFinalPass && tabs.length > 0 && seg.type !== 'G2' && seg.type !== 'G3') {
                        const splitParts = splitSegmentWithTabs(seg, tabs, stepdown, R, arcSegs);
                        result.push(...splitParts);
                    } else {
                        result.push(seg);
                    }
                });
            } else {
                result.push(...currentRun);
            }

            currentRun = [];
        };

        pathData.forEach(seg => {
            if (seg.isStartOrEndHome || seg.type === 'G0') {
                flushRun();
                result.push(seg);
            } else {
                currentRun.push(seg);
            }
        });
        flushRun();

        const cleanResult = [];
        for (let i = 0; i < result.length; i++) {
            const cur = result[i];
            if (cur.isTab && Math.abs(cur.from.x - cur.to.x) < 1e-4 && Math.abs(cur.from.y - cur.to.y) < 1e-4 && cur.from.z > cur.to.z) {
                if (i + 1 < result.length) {
                    const next = result[i + 1];
                    if (next.isTab && Math.abs(next.from.x - next.to.x) < 1e-4 && Math.abs(next.from.y - next.to.y) < 1e-4 && next.to.z > next.from.z) {
                        if (Math.abs(cur.to.x - next.from.x) < 1e-4 && Math.abs(cur.to.y - next.from.y) < 1e-4) {
                            i++; 
                            continue; 
                        }
                    }
                }
            }
            cleanResult.push(cur);
        }

        return cleanResult;
    }

    // --- 將處理後的 3D 線段編譯成 G-code 指令字串 ---
    function compileSegmentsToGcode(segments) {
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        const feedrateEnable = document.getElementById('feedrateEnable') && document.getElementById('feedrateEnable').checked;
        const targetFeedrate = parseFloat(document.getElementById('targetFeedrateInput').value) || 1200;
        const targetZFeedrate = parseFloat(document.getElementById('targetZFeedrateInput').value) || 400;

        const gcodeLines = [];
        let lastX = 0, lastY = 0, lastZ = null; 
        let isFirstMove = true;
        let activeFeedrate = null; 
        let hasOutputXYFInCurrentCut = false; 

        segments.forEach((seg, idx) => {
            let fZ = seg.to.z;
            const rHeight = getRetractHeight();
            
            // 統一 Z 為正值時套用自訂抬刀高度
            if (fZ > 0.0001) {
                fZ = rHeight;
            }

            let fX = 0, fY = 0;
            if (seg.isStartOrEndHome) {
                fX = 0; fY = 0;
            } else {
                fX = (seg.to.x * Math.cos(rotRad) - seg.to.y * Math.sin(rotRad)) * scale + offX;
                fY = (seg.to.x * Math.sin(rotRad) + seg.to.y * Math.cos(rotRad)) * scale + offY;
            }

            const dXY = Math.sqrt((fX - lastX)**2 + (fY - lastY)**2);
            const zChanged = lastZ === null || Math.abs(fZ - lastZ) > 0.0001;
            const isLastMove = (idx === segments.length - 1);

            if (!isFirstMove && seg.type === 'G1' && !seg.isTab && dXY < res && !zChanged && !isLastMove) {
                return; 
            }

            if (seg.type === 'G0') {
                hasOutputXYFInCurrentCut = false;
            }

            // --- 修正 Z 軸純移動偵測邏輯 ---
            let fFromX = 0, fFromY = 0;
            if (seg.isStartOrEndHome) {
                fFromX = 0; fFromY = 0;
            } else {
                fFromX = (seg.from.x * Math.cos(rotRad) - seg.from.y * Math.sin(rotRad)) * scale + offX;
                fFromY = (seg.from.x * Math.sin(rotRad) + seg.from.y * Math.cos(rotRad)) * scale + offY;
            }

            const segmentPhysicalXYChanged = Math.sqrt((fX - fFromX)**2 + (fY - fFromY)**2) > 0.0001;
            const isZOnlyMove = !segmentPhysicalXYChanged && zChanged;

            let newlineParts = [];
            newlineParts.push(seg.type);
            
            if (!isZOnlyMove) {
                newlineParts.push('X' + fX.toFixed(4));
                newlineParts.push('Y' + fY.toFixed(4));
            }
            
            if (zChanged) {
                newlineParts.push('Z' + fZ.toFixed(4));
            }

            if (seg.type === 'G2' || seg.type === 'G3') {
                if (seg.I !== null || seg.J !== null) {
                    const rawI = seg.I || 0;
                    const rawJ = seg.J || 0;
                    let fI = (rawI * Math.cos(rotRad) - rawJ * Math.sin(rotRad)) * scale;
                    let fJ = (rawI * Math.sin(rotRad) + rawJ * Math.cos(rotRad)) * scale;
                    newlineParts.push('I' + fI.toFixed(4));
                    newlineParts.push('J' + fJ.toFixed(4));
                }
                if (seg.R !== null) {
                    let fR = seg.R * scale;
                    newlineParts.push('R' + fR.toFixed(4));
                }
            }

            // 走速智慧分流邏輯 (XY軸與Z軸分流處理)
            let segF = seg.f;
            if (seg.type !== 'G0') {
                const isXYMove = !isZOnlyMove && (seg.type === 'G1' || seg.type === 'G2' || seg.type === 'G3');
                
                if (isXYMove) {
                    if (!hasOutputXYFInCurrentCut) {
                        if (feedrateEnable) {
                            segF = targetFeedrate;
                        }
                        hasOutputXYFInCurrentCut = true;
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    } else {
                        if (feedrateEnable) {
                            segF = targetFeedrate;
                        }
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    }
                } else {
                    // 單純垂直 Z 軸位移，施加目標 Z 軸走速
                    if (feedrateEnable) {
                        segF = targetZFeedrate;
                    }
                    if (segF) {
                        if (activeFeedrate === null || Math.abs(segF - activeFeedrate) > 0.01) {
                            newlineParts.push('F' + segF.toFixed(2));
                            activeFeedrate = segF;
                        }
                    }
                }
            }

            gcodeLines.push(newlineParts.join(' '));
            
            lastX = fX; lastY = fY; lastZ = fZ;
            isFirstMove = false;
        });

        return gcodeLines;
    }

    function processAndPreview() {
        if (!originalGcode) return;
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        let pathData = parseGcode(originalGcode);
        
        // 1. 厚度縮放與分層重建
        pathData = applyThicknessAdjustment(pathData);

        // 2. 走速 F 調整
        pathData = applyFeedrateAdjustment(pathData);

        // 3. 自動配置與偏移 TAB 橋位 (最深層 pass)
        pathData = applyTabsToPaths(pathData);

        if (gcodeGroup) scene.remove(gcodeGroup);
        gcodeGroup = new THREE.Group();

        let totalDist = 0, totalTime = 0, lastP = { x: 0, y: 0, z: 0 }, isF = true;

        pathData.forEach((seg, idx) => {
            const trans = (p, isHome) => {
                if (isHome) {
                    return { x: 0, y: 0, z: p.z };
                }
                return {
                    x: (p.x * Math.cos(rotRad) - p.y * Math.sin(rotRad)) * scale + offX,
                    y: (p.x * Math.sin(rotRad) + p.y * Math.cos(rotRad)) * scale + offY,
                    z: p.z
                };
            };

            const p2 = trans(seg.to, seg.isStartOrEndHome);
            const dXY = Math.sqrt((p2.x - lastP.x)**2 + (p2.y - lastP.y)**2);
            const zM = Math.abs(seg.to.z - lastP.z) > 0.0001;
            const isLast = (idx === pathData.length - 1);

            if (!isF && seg.type === 'G1' && !seg.isTab && dXY < res && !zM && !isLast) return;

            const isFirstSegmentHome = idx === 0 && (Math.abs(seg.from.x) < 1e-4 && Math.abs(seg.from.y) < 1e-4);
            const p1 = isF ? trans(seg.from, isFirstSegmentHome) : { ...lastP };
            
            let segD = 0;
            let points = [];

            if (seg.type === 'G2' || seg.type === 'G3') {
                let transI = null;
                let transJ = null;
                if (seg.I !== null || seg.J !== null) {
                    const rawI = seg.I || 0;
                    const rawJ = seg.J || 0;
                    transI = (rawI * Math.cos(rotRad) - rawJ * Math.sin(rotRad)) * scale;
                    transJ = (rawI * Math.sin(rotRad) + rawJ * Math.cos(rotRad)) * scale;
                }
                const transR = seg.R !== null ? seg.R * scale : null;

                points = generateArcPoints(p1, p2, transI, transJ, transR, seg.type === 'G2');
                for (let i = 1; i < points.length; i++) {
                    segD += points[i].distanceTo(points[i-1]);
                }
            } else {
                points = [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
                segD = Math.sqrt((p2.x - p1.x)**2 + (p2.y - p1.y)**2 + (p2.z - p1.z)**2);
            }

            totalDist += segD;
            if (seg.f > 0) totalTime += segD / (seg.f / 60);

            let color = (seg.type === 'G0') ? 0x3b82f6 : (seg.isTab ? 0xf59e0b : 0x10b981);

            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: color, linewidth: seg.isTab ? 3 : 1 });
            gcodeGroup.add(new THREE.Line(geo, lineMat));

            lastP = { ...p2 }; isF = false;
        });

        displayStats(totalTime, totalDist);
        scene.add(gcodeGroup);
        document.getElementById('downloadBtn').disabled = false;
    }

    // --- 產生調整後並優化的 G-code 檔案 (確保標頭包含 G21 G90，且區塊按正確順序編譯) ---
    function generateGcode() {
        const lines = originalGcode.split('\n');
        let pathData = parseGcode(originalGcode);
        
        // 1. 偵測原始 contour 切削動作在 G-code 原檔中的 LineIdx 區間
        const contourRanges = [];
        let currentRange = null;

        pathData.forEach(seg => {
            const isCut = (seg.from.z < -0.001 || seg.to.z < -0.001) && seg.type !== 'G0';
            if (isCut) {
                if (!currentRange) {
                    currentRange = { start: seg.lineIdx, end: seg.lineIdx };
                    contourRanges.push(currentRange);
                } else {
                    currentRange.end = Math.max(currentRange.end, seg.lineIdx);
                    currentRange.start = Math.min(currentRange.start, seg.lineIdx);
                }
            } else {
                currentRange = null;
            }
        });

        // 2. 進行厚度、分層、走速與 TAB 調整
        pathData = applyThicknessAdjustment(pathData);
        pathData = applyFeedrateAdjustment(pathData);
        pathData = applyTabsToPaths(pathData);

        // 3. 將處理後的路徑，依照原始 lineIdx 區間分類
        const processedContours = contourRanges.map(range => ({
            range: range,
            segments: []
        }));
        const nonContourSegments = [];

        pathData.forEach(seg => {
            let mapped = false;
            if (seg.lineIdx !== undefined) {
                for (let pc of processedContours) {
                    if (seg.lineIdx >= pc.range.start && seg.lineIdx <= pc.range.end) {
                        pc.segments.push(seg);
                        mapped = true;
                        break;
                    }
                }
            }
            if (!mapped) {
                nonContourSegments.push(seg);
            }
        });

        // 4. 輸出最終重組的 G-code 檔案
        const output = [];
        let insertedHeader = false;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let cmd = line.trim();

            if (cmd && !cmd.startsWith('(') && !cmd.startsWith(';')) {
                if (!insertedHeader) {
                    output.push("G21", "G90");
                    insertedHeader = true;
                }
            }

            // 判斷當前行數是否屬於任一個 contour 區間
            let activeContour = null;
            for (let pc of processedContours) {
                if (i >= pc.range.start && i <= pc.range.end) {
                    activeContour = pc;
                    break;
                }
            }

            if (activeContour) {
                if (i === activeContour.range.start) {
                    const compiledLines = compileSegmentsToGcode(activeContour.segments);
                    output.push(...compiledLines);
                }
                continue;
            }

            const isMovementCmd = /G0|G1|G2|G3|X|Y|Z/i.test(cmd);
            if (isMovementCmd) {
                const matches = nonContourSegments.filter(s => s.lineIdx === i);
                if (matches.length > 0) {
                    const compiled = compileSegmentsToGcode(matches);
                    output.push(...compiled);
                } else {
                    output.push(line);
                }
            } else {
                // 清理可能衝突的初始設定代碼
                let cleanLine = line;
                if (!cmd.startsWith('(') && !cmd.startsWith(';')) {
                    let commentSuffix = "";
                    const semiIdx = cmd.indexOf(';');
                    if (semiIdx !== -1) {
                        commentSuffix = cmd.substring(semiIdx);
                    }
                    let cleanCmd = cmd.split(';')[0].trim();
                    let strippedCmd = cleanCmd.replace(/\bG0*20\b/gi, '')
                                              .replace(/\bG0*21\b/gi, '')
                                              .replace(/\bG0*90\b/gi, '')
                                              .replace(/\bG0*91\b/gi, '')
                                              .replace(/\s+/g, ' ')
                                              .trim();
                    if (strippedCmd) {
                        cleanLine = strippedCmd + (commentSuffix ? ' ' + commentSuffix : '');
                    } else if (commentSuffix) {
                        cleanLine = commentSuffix;
                    } else {
                        continue;
                    }
                }
                output.push(cleanLine);
            }
        }

        if (!insertedHeader) {
            output.push("G21", "G90");
        }

        // --- 核心優化：G-code 最終連續相同行過濾檢查 ---
        const cleanOutput = [];
        for (let i = 0; i < output.length; i++) {
            const currentLine = output[i].trim();
            
            // 跳過空行
            if (currentLine === "") {
                if (cleanOutput.length > 0 && cleanOutput[cleanOutput.length - 1].trim() === "") {
                    continue; // 避免連續空行
                }
                cleanOutput.push(output[i]);
                continue;
            }
            
            // 標準化比較（轉大寫並去除多餘空格）
            const normCurrent = currentLine.replace(/\s+/g, ' ').toUpperCase();
            const normLast = cleanOutput.length > 0 ? cleanOutput[cleanOutput.length - 1].trim().replace(/\s+/g, ' ').toUpperCase() : null;
            
            // 若與上一行完全相同則過濾
            if (normCurrent === normLast) {
                continue; 
            }
            
            cleanOutput.push(output[i]);
        }

        return cleanOutput.join('\n');
    }

    // --- 參考背景圖加載與處理 ---
    function handleImageLoad(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                refAspect = img.height / img.width;
                
                const loader = new THREE.TextureLoader();
                loader.load(e.target.result, function(texture) {
                    if (refMesh) scene.remove(refMesh);

                    const geo = new THREE.PlaneGeometry(1, 1);
                    const mat = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        opacity: parseFloat(document.getElementById('imgOpacityInput').value),
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    refMesh = new THREE.Mesh(geo, mat);
                    refMesh.position.set(0, 0, -0.2);

                    updateImageDimensions();
                    scene.add(refMesh);

                    document.getElementById('imgControls').classList.remove('hidden');
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateImageDimensions() {
        if (!refMesh) return;
        const width = parseFloat(document.getElementById('imgWidthInput').value) || 100;
        refMesh.scale.set(width, width * refAspect, 1);
    }

    // --- 初始化與檔案讀取事件 ---
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        originalFileName = file.name.split('.').slice(0, -1).join('.');
        document.getElementById('fileNameDisplay').innerText = file.name;
        document.getElementById('fileInfo').classList.remove('hidden');
        
        const r = new FileReader(); 
        r.onload = ev => { 
            let rawText = ev.target.result;
            
            if (hasG20Active(rawText)) {
                rawText = convertInchToMetric(rawText);
                document.getElementById('metricAlert').classList.remove('hidden');
            } else {
                document.getElementById('metricAlert').classList.add('hidden');
            }

            originalGcode = rawText; 

            // 自動偵測原始 G-code 加工總深度與單次下刀 Stepdown 深度，並同步填入層數與對應欄位
            const initialPathData = parseGcode(originalGcode);
            const detectedDepth = detectOriginalDepth(initialPathData);
            const origThickInput = document.getElementById('origThickInput');
            const targetThickInput = document.getElementById('targetThickInput');
            const targetLayersInput = document.getElementById('targetLayersInput');

            if (detectedDepth > 0) {
                origThickInput.value = detectedDepth.toFixed(4);
                targetThickInput.value = detectedDepth.toFixed(4); // 預設目標深度等於原始深度
                
                // 自動偵測單次下刀深度並將其轉化為層數寫入
                const detectedStepdown = detectOriginalStepdown(initialPathData);
                const calculatedLayers = Math.max(1, Math.round(detectedDepth / detectedStepdown));
                targetLayersInput.value = calculatedLayers;
            } else {
                origThickInput.value = "0";
                targetThickInput.value = "0";
                targetLayersInput.value = "12";
            }

            // 自動偵測並填入原始 F XY 走速
            const detectedF = detectFirstFeedrate(initialPathData);
            document.getElementById('targetFeedrateInput').value = detectedF.toFixed(0);

            // 自動偵測並填入原始 Z 軸下刀速
            const detectedZF = detectFirstZFeedrate(initialPathData);
            document.getElementById('targetZFeedrateInput').value = detectedZF.toFixed(0);

            processAndPreview(); 
        }; 
        r.readAsText(file);
    });

    document.getElementById('imageInput').addEventListener('change', handleImageLoad);
    document.getElementById('imgWidthInput').addEventListener('input', updateImageDimensions);
    
    document.getElementById('imgOpacityInput').addEventListener('input', e => {
        const val = parseFloat(e.target.value);
        document.getElementById('opacityVal').innerText = val.toFixed(2);
        if (refMesh) {
            refMesh.material.opacity = val;
        }
    });

    // 監聽進階選項：厚度啟用與層數/深度變更
    document.getElementById('thickEnable').addEventListener('change', e => {
        const thickControls = document.getElementById('thickControls');
        if (e.target.checked) {
            thickControls.classList.remove('hidden');
        } else {
            thickControls.classList.add('hidden');
        }
        processAndPreview(); 
    });

    document.getElementById('targetThickInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    document.getElementById('targetLayersInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    // 監聽進階選項：走速啟用與數值變更
    document.getElementById('feedrateEnable').addEventListener('change', e => {
        const feedrateControls = document.getElementById('feedrateControls');
        if (e.target.checked) {
            feedrateControls.classList.remove('hidden');
        } else {
            feedrateControls.classList.add('hidden');
        }
        processAndPreview(); 
    });

    document.getElementById('targetFeedrateInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    document.getElementById('targetZFeedrateInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    // 監聽進階選項：安全抬刀高度啟用與數值變更
    document.getElementById('retractEnable').addEventListener('change', e => {
        const retractControls = document.getElementById('retractControls');
        if (e.target.checked) {
            retractControls.classList.remove('hidden');
        } else {
            retractControls.classList.add('hidden');
        }
        processAndPreview(); 
    });

    document.getElementById('retractHeightInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    // 監聽進階選項：TAB 啟用與數值變更
    document.getElementById('tabEnable').addEventListener('change', e => {
        const tabControls = document.getElementById('tabControls');
        if (e.target.checked) {
            tabControls.classList.remove('hidden');
        } else {
            tabControls.classList.add('hidden');
        }
        processAndPreview(); 
    });

    document.getElementById('toolDiaInput').addEventListener('input', () => {
        processAndPreview(); 
    });

    document.getElementById('applyBtn').addEventListener('click', processAndPreview);
    
    document.getElementById('centerBtn').addEventListener('click', () => {
        if (!originalGcode) return;
        const p = parseGcode(originalGcode), s = parseFloat(document.getElementById('scaleInput').value) || 1;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        
        p.forEach(seg => {
            if (seg.type !== 'G0') {
                minX = Math.min(minX, seg.to.x, seg.from.x); maxX = Math.max(maxX, seg.to.x, seg.from.x);
                minY = Math.min(minY, seg.to.y, seg.from.y); maxY = Math.max(maxY, seg.to.y, seg.from.y);
            }
        });
        
        if (minX === Infinity) {
            p.forEach(seg => {
                minX = Math.min(minX, seg.to.x, seg.from.x); maxX = Math.max(maxX, seg.to.x, seg.from.x);
                minY = Math.min(minY, seg.to.y, seg.from.y); maxY = Math.max(maxY, seg.to.y, seg.from.y);
            });
        }

        if (minX !== Infinity) {
            document.getElementById('offsetX').value = (-( (minX+maxX)/2 * s)).toFixed(2);
            document.getElementById('offsetY').value = (-( (minY+maxY)/2 * s)).toFixed(2);
            processAndPreview();
        }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const b = new Blob([generateGcode()], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `${originalFileName}_re.gcode`; a.click();
    });

    window.addEventListener('resize', () => {
        const c = document.getElementById('preview-container');
        camera.aspect = c.clientWidth / c.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(c.clientWidth, c.clientHeight);
    });

    window.onload = () => {
        initThree();
        
        const savedTheme = localStorage.getItem('gcode-editor-theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        
        updateThemeIcon(savedTheme);
        updateThreeGrid();
        updateLanguage(); 
    };
