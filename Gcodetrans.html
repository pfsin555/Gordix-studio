        }
    }

    // --- 高精度 3D 工具切削投影帶生成器 ---
    function generateSweptRibbonGeometry(points, width) {
        const vertices = [];
        const indices = [];
        const halfWidth = width / 2;

        if (points.length < 2) return null;

        let totalXYDist = 0;
        for (let i = 1; i < points.length; i++) {
            totalXYDist += Math.sqrt((points[i].x - points[i-1].x)**2 + (points[i].y - points[i-1].y)**2);
        }
        if (totalXYDist < 1e-4) {
            return null; 
        }

        const normals = [];
        for (let i = 0; i < points.length; i++) {
            let dir = new THREE.Vector3();
            if (i === 0) {
                dir.subVectors(points[1], points[0]);
            } else if (i === points.length - 1) {
                dir.subVectors(points[i], points[i-1]);
            } else {
                const d1 = new THREE.Vector3().subVectors(points[i], points[i-1]).normalize();
                const d2 = new THREE.Vector3().subVectors(points[i+1], points[i]).normalize();
                dir.addVectors(d1, d2);
            }
            dir.z = 0; 
            dir.normalize();
            
            if (dir.lengthSq() < 1e-6) {
                dir.set(1, 0, 0);
            }
            
            const norm = new THREE.Vector3(-dir.y, dir.x, 0).normalize();
            normals.push(norm);
        }

        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            const norm = normals[i];
            
            const leftPt = new THREE.Vector3().addScaledVector(norm, halfWidth).add(p);
            const rightPt = new THREE.Vector3().addScaledVector(norm, -halfWidth).add(p);
            
            vertices.push(leftPt.x, leftPt.y, leftPt.z);
            vertices.push(rightPt.x, rightPt.y, rightPt.z);
        }

        for (let i = 0; i < points.length - 1; i++) {
            const currLeft = i * 2;
            const currRight = i * 2 + 1;
            const nextLeft = (i + 1) * 2;
            const nextRight = (i + 1) * 2 + 1;

            indices.push(currLeft, currRight, nextLeft);
            indices.push(currRight, nextRight, nextLeft);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        return geometry;
    }

    // --- 計算並顯示 3D 渲染與虛線預覽 ---
    function processAndPreview() {
        if (!originalGcode) return;
        const scale = parseFloat(document.getElementById('scaleInput').value) || 1;
        const offX = parseFloat(document.getElementById('offsetX').value) || 0;
        const offY = parseFloat(document.getElementById('offsetY').value) || 0;
        const rotRad = (parseFloat(document.getElementById('rotationInput').value) || 0) * Math.PI / 180;
        const res = parseFloat(document.getElementById('resInput').value) || 0.1;

        let pathData = parseGcode(originalGcode);
        
        const compResults = applyTwoStepCutterCompensation(pathData);
        const workpiecePath = compResults.workpiecePath;
        pathData = compResults.newToolPath; 

        pathData = applyThicknessAdjustment(pathData);
        pathData = applyFeedrateAdjustment(pathData);
        pathData = applyTabsToPaths(pathData);

        if (gcodeGroup) scene.remove(gcodeGroup);
        gcodeGroup = new THREE.Group();

        let totalDist = 0, totalTime = 0, lastP = { x: 0, y: 0, z: 0 }, isF = true;

        const trans = (p, isHome) => {
            if (isHome) {
                return { x: 0, y: 0, z: p.z };
            }
            return {
                x: (p.x * Math.cos(rotRad) - p.y * Math.sin(rotRad)) * scale + offX,
                y: (p.x * Math.sin(rotRad) + p.y * Math.cos(rotRad)) * scale + offY,
                z: p.z
            };
        };

        const showWorkpiece = document.getElementById('showWorkpiece') && document.getElementById('showWorkpiece').checked;
        if (workpiecePath && showWorkpiece) {
            // 分析並找出最深的 Z 切削深度 (Z 最負值)
            let deepestZ = 0;
            workpiecePath.forEach(seg => {
                if (seg.type !== 'G0' && !seg.isStartOrEndHome) {
                    deepestZ = Math.min(deepestZ, seg.to.z, seg.from.z);
                }
            });

            let lastWpP = null;
            workpiecePath.forEach((seg, idx) => {
                if (seg.type === 'G0' || seg.isStartOrEndHome) {
                    lastWpP = null;
                    return;
                }

                // 核心過濾：不論分層，僅將理論加工結果繪製在最深的一層
                const isAtDeepest = (Math.abs(seg.to.z - deepestZ) < 0.01 && Math.abs(seg.from.z - deepestZ) < 0.01);
                if (!isAtDeepest) {
                    lastWpP = null;
                    return;
                }

                const p2 = trans(seg.to, seg.isStartOrEndHome);
                const p1 = lastWpP ? lastWpP : trans(seg.from, false);

                let points = [];
                if (seg.type === 'G2' || seg.type === 'G3') {
                    let transI = null, transJ = null;
                    if (seg.I !== null || seg.J !== null) {
                        const rawI = seg.I || 0, rawJ = seg.J || 0;
                        transI = (rawI * Math.cos(rotRad) - rawJ * Math.sin(rotRad)) * scale;
                        transJ = (rawI * Math.sin(rotRad) + rawJ * Math.cos(rotRad)) * scale;
                    }
                    const transR = seg.R !== null ? seg.R * scale : null;
                    points = generateArcPoints(p1, p2, transI, transJ, transR, seg.type === 'G2');
                } else {
                    points = [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
                }

                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineDashedMaterial({
                    color: 0x9ca3af, // 淺灰色 (Tailwind gray-400)
                    dashSize: 3,
                    gapSize: 3
                });
                const meshLine = new THREE.Line(geo, lineMat);
                meshLine.computeLineDistances(); 
                gcodeGroup.add(meshLine);

                lastWpP = { ...p2 };
            });
        }

        pathData.forEach((seg, idx) => {
            const p2 = trans(seg.to, seg.isStartOrEndHome);
            const dXY = Math.sqrt((p2.x - lastP.x)**2 + (p2.y - lastP.y)**2);
            const zM = Math.abs(seg.to.z - lastP.z) > 0.0001;
            const isLast = (idx === pathData.length - 1);

            if (!isF && seg.type === 'G1' && !seg.isTab && dXY < res && !zM && !isLast) return;

            const isFirstSegmentHome = idx === 0 && (Math.abs(seg.from.x) < 1e-4 && Math.abs(seg.from.y) < 1e-4);
            const p1 = isF ? trans(seg.from, isFirstSegmentHome) : { ...lastP };
            
            let segD = 0;
            let points = [];

            if (seg.type === 'G2' || seg.type === 'G3') {
                let transI = null, transJ = null;
                if (seg.I !== null || seg.J !== null) {
                    const rawI = seg.I || 0, rawJ = seg.J || 0;
                    transI = (rawI * Math.cos(rotRad) - rawJ * Math.sin(rotRad)) * scale;
                    transJ = (rawI * Math.sin(rotRad) + rawJ * Math.cos(rotRad)) * scale;
                }
                const transR = seg.R !== null ? seg.R * scale : null;

                points = generateArcPoints(p1, p2, transI, transJ, transR, seg.type === 'G2');
                for (let i = 1; i < points.length; i++) {
                    segD += points[i].distanceTo(points[i-1]);
                }
            } else {
                points = [new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)];
                segD = Math.sqrt((p2.x - p1.x)**2 + (p2.y - p1.y)**2 + (p2.z - p1.z)**2);
            }

            totalDist += segD;
            if (seg.f > 0) totalTime += segD / (seg.f / 60);

            let color = (seg.type === 'G0') ? 0x3b82f6 : (seg.isTab ? 0xf59e0b : 0x10b981);

            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: color, linewidth: seg.isTab ? 3 : 1 });
            gcodeGroup.add(new THREE.Line(geo, lineMat));

            if (showWorkpiece && seg.type !== 'G0' && !seg.isStartOrEndHome) {
                const activeToolDia = getActiveToolDiameter();
                const ribbonWidth = activeToolDia * scale;
                const ribbonGeo = generateSweptRibbonGeometry(points, ribbonWidth);
                if (ribbonGeo) {
                    const ribbonMat = new THREE.MeshBasicMaterial({
                        color: 0xff5500,     // 調整為透明橘紅色 (Orange-Red)
                        transparent: true,
                        opacity: 0.25,        
                        side: THREE.DoubleSide,
                        depthWrite: false    
                    });
                    const ribbonMesh = new THREE.Mesh(ribbonGeo, ribbonMat);
                    gcodeGroup.add(ribbonMesh);
                }
            }

            lastP = { ...p2 }; isF = false;
        });

        displayStats(totalTime, totalDist);
        scene.add(gcodeGroup);
        document.getElementById('downloadBtn').disabled = false;
    }

    // --- 產生調整後並優化的 G-code 檔案 ---
    function generateGcode() {
        const lines = originalGcode.split('\n');
        let pathData = parseGcode(originalGcode);
        
        const contourRanges = [];
        let currentRange = null;

        pathData.forEach(seg => {
            const isCut = (seg.from.z < -0.001 || seg.to.z < -0.001) && seg.type !== 'G0';
            if (isCut) {
                if (!currentRange) {
                    currentRange = { start: seg.lineIdx, end: seg.lineIdx };
                    contourRanges.push(currentRange);
                } else {
                    currentRange.end = Math.max(currentRange.end, seg.lineIdx);
                    currentRange.start = Math.min(currentRange.start, seg.lineIdx);
                }
            } else {
                currentRange = null;
            }
        });

        const compResults = applyTwoStepCutterCompensation(pathData);
        pathData = compResults.newToolPath;

        pathData = applyThicknessAdjustment(pathData);
        pathData = applyFeedrateAdjustment(pathData);
        pathData = applyTabsToPaths(pathData);

        const processedContours = contourRanges.map(range => ({
            range: range,
            segments: []
        }));
        const nonContourSegments = [];

        pathData.forEach(seg => {
            let mapped = false;
            if (seg.lineIdx !== undefined) {
                for (let pc of processedContours) {
                    if (seg.lineIdx >= pc.range.start && seg.lineIdx <= pc.range.end) {
                        pc.segments.push(seg);
                        mapped = true;
                        break;
                    }
                }
            }
            if (!mapped) {
                nonContourSegments.push(seg);
            }
        });

        const output = [];
        let insertedHeader = false;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let cmd = line.trim();

            if (cmd && !cmd.startsWith('(') && !cmd.startsWith(';')) {
                if (!insertedHeader) {
                    output.push("G21", "G90");
                    insertedHeader = true;
                }
            }

            let activeContour = null;
            for (let pc of processedContours) {
                if (i >= pc.range.start && i <= pc.range.end) {
                    activeContour = pc;
                    break;
                }
            }

            if (activeContour) {
                if (i === activeContour.range.start) {
                    const compiledLines = compileSegmentsToGcode(activeContour.segments);
                    output.push(...compiledLines);
                }
                continue;
            }

            const isMovementCmd = /G0|G1|G2|G3|X|Y|Z/i.test(cmd);
            if (isMovementCmd) {
                const matches = nonContourSegments.filter(s => s.lineIdx === i);
                if (matches.length > 0) {
                    const compiled = compileSegmentsToGcode(matches);
                    output.push(...compiled);
                } else {
                    output.push(line);
                }
            } else {
                let cleanLine = line;
                if (!cmd.startsWith('(') && !cmd.startsWith(';')) {
                    let commentSuffix = "";
                    const semiIdx = cmd.indexOf(';');
                    if (semiIdx !== -1) {
                        commentSuffix = cmd.substring(semiIdx);
                    }
                    let cleanCmd = cmd.split(';')[0].trim();
                    let strippedCmd = cleanCmd.replace(/\bG0*20\b/gi, '')
                                              .replace(/\bG0*21\b/gi, '')
                                              .replace(/\bG0*90\b/gi, '')
                                              .replace(/\bG0*91\b/gi, '')
                                              .replace(/\s+/g, ' ')
                                              .trim();
                    if (strippedCmd) {
                        cleanLine = strippedCmd + (commentSuffix ? ' ' + commentSuffix : '');
                    } else if (commentSuffix) {
                        cleanLine = commentSuffix;
                    } else {
                        continue;
                    }
                }
                output.push(cleanLine);
            }
        }

        if (!insertedHeader) {
            output.push("G21", "G90");
        }

        const cleanOutput = [];
        for (let i = 0; i < output.length; i++) {
            const currentLine = output[i].trim();
            
            if (currentLine === "") {
                if (cleanOutput.length > 0 && cleanOutput[cleanOutput.length - 1].trim() === "") {
                    continue; 
                }
                cleanOutput.push(output[i]);
                continue;
            }
            
            const normCurrent = currentLine.replace(/\s+/g, ' ').toUpperCase();
            const normLast = cleanOutput.length > 0 ? cleanOutput[cleanOutput.length - 1].trim().replace(/\s+/g, ' ').toUpperCase() : null;
            
            if (normCurrent === normLast) {
                continue; 
            }
            
            cleanOutput.push(output[i]);
        }

        return cleanOutput.join('\n');
    }

    // --- 參考背景圖加載與處理 ---
    function handleImageLoad(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                refAspect = img.height / img.width;
                
                const loader = new THREE.TextureLoader();
                loader.load(e.target.result, function(texture) {
                    if (refMesh) scene.remove(refMesh);

                    const geo = new THREE.PlaneGeometry(1, 1);
                    const mat = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        opacity: parseFloat(document.getElementById('imgOpacityInput').value),
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    refMesh = new THREE.Mesh(geo, mat);
                    refMesh.position.set(0, 0, -0.2);

                    updateImageDimensions();
                    scene.add(refMesh);

                    document.getElementById('imgControls').classList.remove('hidden');
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateImageDimensions() {
        if (!refMesh) return;
        const width = parseFloat(document.getElementById('imgWidthInput').value) || 100;
        refMesh.scale.set(width, width * refAspect, 1);
    }

        if (!originalGcode) return;
        const p = parseGcode(originalGcode), s = parseFloat(document.getElementById('scaleInput').value) || 1;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        
        p.forEach(seg => {
            if (seg.type !== 'G0') {
                minX = Math.min(minX, seg.to.x, seg.from.x); maxX = Math.max(maxX, seg.to.x, seg.from.x);
                minY = Math.min(minY, seg.to.y, seg.from.y); maxY = Math.max(maxY, seg.to.y, seg.from.y);
            }
        });
        
        if (minX === Infinity) {
            p.forEach(seg => {
                minX = Math.min(minX, seg.to.x, seg.from.x); maxX = Math.max(maxX, seg.to.x, seg.from.x);
                minY = Math.min(minY, seg.to.y, seg.from.y); maxY = Math.max(maxY, seg.to.y, seg.from.y);
            });
        }

        if (minX !== Infinity) {
            document.getElementById('offsetX').value = (-( (minX+maxX)/2 * s)).toFixed(2);
            document.getElementById('offsetY').value = (-( (minY+maxY)/2 * s)).toFixed(2);
            
            // 重置相機旋轉焦點回到對稱的原點中心
            if (cameraTarget) cameraTarget.set(0, 0, 0);
            if (camera) camera.position.set(200, -200, 200);
            if (camera && cameraTarget) camera.lookAt(cameraTarget);

            processAndPreview();
        }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const b = new Blob([generateGcode()], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `${originalFileName}_re.gcode`; a.click();
    });

    window.addEventListener('resize', () => {
        const c = document.getElementById('preview-container');
        camera.aspect = c.clientWidth / c.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(c.clientWidth, c.clientHeight);
    });

    window.onload = () => {
        initThree();
        
        const savedTheme = localStorage.getItem('gordix-theme') || 'dark';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        
        updateThemeIcon(savedTheme);
        updateThreeGrid();
        
        currentLang = localStorage.getItem('gordix-lang') || 'zh';
        updateLanguage(); 
    };
</script>

                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker registered successfully with scope: ', reg.scope))
                    .catch((err) => console.error('Service Worker registration failed: ', err));
