        // ==========================================
        // 5. 刀軌路徑計算與 V-Carving 核心演算法
        // ==========================================
        function calculateAllVCarvePaths(groupScale) {
            const selectedArr = Array.from(selectedIndices);
            if (selectedArr.length === 0) return;

            const targetLayer = document.getElementById('vcarve-layer-select')?.value || 'even';
            
            const topo = computePartNestingTopology();
            const depths = topo.depths;
            const parents = topo.parents;

            const firstIdx = selectedArr[0];
            const cfg = parts[firstIdx].jobConfig;
            
            const nestedShapes = [];

            selectedArr.forEach(idx => {
                const depth = depths[idx];
                const isCarve = (targetLayer === 'even' && depth % 2 === 0) || (targetLayer === 'odd' && depth % 2 !== 0);
                
                if (isCarve) {
                    const outer = parts[idx].rawPath.map(pt => ({ x: pt.x * groupScale, y: pt.y * groupScale }));
                    const holes = [];
                    
                    parts.forEach((childPart, childIdx) => {
                        if (childPart.visible && parents[childIdx] === idx) {
                            const childDepth = depths[childIdx];
                            const isChildCarve = (targetLayer === 'even' && childDepth % 2 === 0) || (targetLayer === 'odd' && childDepth % 2 !== 0);
                            if (!isChildCarve) {
                                const holePath = childPart.rawPath.map(pt => ({ x: pt.x * groupScale, y: pt.y * groupScale }));
                                holes.push(holePath);
                            }
                        }
                    });
                    
                    nestedShapes.push({ outer, holes });
                }
            });

            if (nestedShapes.length === 0) {
                selectedArr.forEach(idx => {
                    parts[idx].toolpath = [];
                    parts[idx].appliedMethod = 'vcarve';
                });
                return;
            }

            const consolidatedPaths = [];
            const D_max = cfg.depth; 
            const theta = cfg.vbitAngle || 90;
            const tanHalf = Math.tan((theta / 2) * Math.PI / 180);
            const r_max = D_max * tanHalf; 
            const scale = 10000;

            nestedShapes.forEach(shape => {
                const spineStrokes = computeNestedVCarve(shape, cfg);
                consolidatedPaths.push(...spineStrokes);

                let hasWideRegions = false;
                spineStrokes.forEach(stroke => {
                    stroke.forEach(pt => {
                        if (pt.r > r_max) hasWideRegions = true;
                    });
                });

                if (hasWideRegions) {
                    const stepover = (1 - cfg.overlap) * (2 * r_max);
                    let currentOffset = r_max;

                    const shapePaths = new ClipperLib.Paths();
                    const outerClipper = shape.outer.map(pt => ({ X: Math.round(pt.x * scale), Y: Math.round(pt.y * scale) }));
                    shapePaths.push(outerClipper);
                    shape.holes.forEach(hole => {
                        const holeClipper = hole.map(pt => ({ X: Math.round(pt.x * scale), Y: Math.round(pt.y * scale) }));
                        shapePaths.push(holeClipper);
                    });

                    for (let step = 0; step < 50; step++) {
                        const co = new ClipperLib.ClipperOffset();
                        co.AddPaths(shapePaths, ClipperLib.JoinType.jtRound, ClipperLib.EndType.etClosedPolygon);
                        
                        const offsetResult = new ClipperLib.Paths();
                        co.Execute(offsetResult, -currentOffset * scale);

                        if (offsetResult.length === 0) break;

                        offsetResult.forEach(path => {
                            const p = path.map(pt => ({
                                x: pt.X / scale,
                                y: pt.Y / scale,
                                z: -D_max 
                            }));
                            if (p.length > 0) {
                                p.push(p[0]); 
                                consolidatedPaths.push(cleanPath(p, cfg.resolution));
                            }
                        });

                        currentOffset += stepover;
                    }
                }
            });

            consolidatedPaths.sort((pathA, pathB) => {
                const maxZA = Math.max(...pathA.map(pt => pt.z !== undefined ? pt.z : 0));
                const maxZB = Math.max(...pathB.map(pt => pt.z !== undefined ? pt.z : 0));
                return maxZB - maxZA; 
            });

            selectedArr.forEach(idx => {
                if (idx === firstIdx) {
                    parts[idx].toolpath = consolidatedPaths;
                    parts[idx].appliedMethod = 'vcarve';
                } else {
                    parts[idx].toolpath = [];
                    parts[idx].appliedMethod = 'vcarve';
                }
            });
        }

        /**
         * 嵌套式 2D 距離變換 Medial Axis 骨架中心路徑
         */
        function computeNestedVCarve(shape, cfg) {
            const outer = [...shape.outer];
            if (outer.length > 2 && outer[0].x === outer[outer.length-1].x && outer[0].y === outer[outer.length-1].y) {
                outer.pop();
            }
            if (getPolygonArea(outer) < 0) outer.reverse();

            const holes = shape.holes.map(h => {
                const temp = [...h];
                if (temp.length > 2 && temp[0].x === temp[temp.length-1].x && temp[0].y === temp[temp.length-1].y) {
                    temp.pop();
                }
                if (getPolygonArea(temp) > 0) temp.reverse();
                return temp;
            });

            const isStraight = isPureStraightLinePath(outer, 0.05);

            const tol = Math.max(0.04, cfg.resolution * 0.7);
            const simpOuter = simplifyPath(outer, tol);
            const simpHoles = holes.map(h => simplifyPath(h, tol));

            const sampleSpacing = Math.max(0.5, cfg.resolution * 5);
            const resampledOuter = resamplePath(simpOuter, sampleSpacing);
            const resampledHoles = simpHoles.map(h => resamplePath(h, sampleSpacing));

            const loops = [resampledOuter, ...resampledHoles];

            const vbitAngle = cfg.vbitAngle || 90;
            const halfAngleRad = (vbitAngle / 2) * Math.PI / 180;
            const tanHalf = Math.tan(halfAngleRad);
            const maxDepth = cfg.depth || 3.0;

            const allSegments = [];
            loops.forEach((loop, loopIdx) => {
                const m = loop.length;
                for (let i = 0; i < m; i++) {
                    const p1 = loop[i];
                    const p2 = loop[(i + 1) % m];
                    allSegments.push({
                        p1, p2,
                        loopIdx,
                        segIdx: i,
                        minX: Math.min(p1.x, p2.x),
                        maxX: Math.max(p1.x, p2.x),
                        minY: Math.min(p1.y, p2.y),
                        maxY: Math.max(p1.y, p2.y)
                    });
                }
            });

            function getDistanceToRegionBoundary(pt, excludeLoopIdx, excludeSegIndices) {
                let minDist = Infinity;
                for (let i = 0; i < allSegments.length; i++) {
                    const s = allSegments[i];
                    if (s.loopIdx === excludeLoopIdx && excludeSegIndices.includes(s.segIdx)) {
                        continue;
                    }
                    let dx = 0;
                    if (pt.x < s.minX) dx = s.minX - pt.x;
                    else if (pt.x > s.maxX) dx = pt.x - s.maxX;
                    let dy = 0;
                    if (pt.y < s.minY) dy = s.minY - pt.y;
                    else if (pt.y > s.maxY) dy = pt.y - s.maxY;

                    if (dx*dx + dy*dy >= minDist*minDist) continue;

                    const d = pointToSegmentDistance(pt, s.p1, s.p2);
                    if (d < minDist) minDist = d;
                }
                return minDist;
            }

            const skeletonPoints = [];
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            simpOuter.forEach(pt => {
                if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
                if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
            });
            const diag = Math.sqrt((maxX - minX)**2 + (maxY - minY)**2);

            let finishedStrokes = [];
            let bypassedSkeleton = false;

            // ==========================================
            // 完美十字斜切填充
            // ==========================================
            if (isStraight && holes.length === 0) {
                if (simpOuter.length === 4) {
                    const C = getLineIntersection(simpOuter[0], simpOuter[2], simpOuter[1], simpOuter[3]);
                    if (C !== null) {
                        let dMin = Infinity;
                        for (let i = 0; i < 4; i++) {
                            const d = pointToSegmentDistance(C, simpOuter[i], simpOuter[(i+1)%4]);
                            if (d < dMin) dMin = d;
                        }
                        const Z_C = -dMin / tanHalf;
                        const targetZC = Math.max(-maxDepth, Z_C);

                        const stroke1 = [
                            { x: simpOuter[0].x, y: simpOuter[0].y, z: 0 },
                            { x: C.x, y: C.y, z: targetZC },
                            { x: simpOuter[2].x, y: simpOuter[2].y, z: 0 }
                        ];
                        const stroke2 = [
                            { x: simpOuter[1].x, y: simpOuter[1].y, z: 0 },
                            { x: C.x, y: C.y, z: targetZC },
                            { x: simpOuter[3].x, y: simpOuter[3].y, z: 0 }
                        ];

                        finishedStrokes.push(cleanPath(stroke1, cfg.resolution));
                        finishedStrokes.push(cleanPath(stroke2, cfg.resolution));
                        bypassedSkeleton = true;
                    }
                } else if (simpOuter.length === 3) {
                    const A = simpOuter[0], B = simpOuter[1], Ct = simpOuter[2];
                    const a = Math.sqrt((B.x - Ct.x)**2 + (B.y - Ct.y)**2);
                    const b = Math.sqrt((A.x - Ct.x)**2 + (A.y - Ct.y)**2);
                    const c = Math.sqrt((A.x - B.x)**2 + (A.y - B.y)**2);
                    
                    if (a + b + c > 1e-5) {
                        const x_I = (a * A.x + b * B.x + c * Ct.x) / (a + b + c);
                        const y_I = (a * A.y + b * B.y + c * Ct.y) / (a + b + c);
                        const C = { x: x_I, y: y_I };

                        const s = (a + b + c) / 2;
                        const area = Math.sqrt(Math.max(0, s * (s - a) * (s - b) * (s - c)));
                        const r = area / s;

                        const Z_C = -r / tanHalf;
                        const targetZC = Math.max(-maxDepth, Z_C);

                        for (let i = 0; i < 3; i++) {
                            finishedStrokes.push(cleanPath([
                                { x: simpOuter[i].x, y: simpOuter[i].y, z: 0 },
                                { x: C.x, y: C.y, z: targetZC }
                            ], cfg.resolution));
                        }
                        bypassedSkeleton = true;
                    }
                }
            }

            // ==========================================
            // 標準中軸骨架演算法
            // ==========================================
            if (!bypassedSkeleton) {
                loops.forEach((loop, loopIdx) => {
                    const m = loop.length;
                    const isHole = (loopIdx > 0);

                    for (let i = 0; i < m; i++) {
                        const prev = loop[(i - 1 + m) % m];
                        const curr = loop[i];
                        const next = loop[(i + 1) % m];

                        const v1 = { x: curr.x - prev.x, y: curr.y - prev.y };
                        const v2 = { x: next.x - curr.x, y: next.y - curr.y };

                        const len1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
                        const len2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
                        if (len1 < 1e-6 || len2 < 1e-6) continue;

                        const t1 = { x: v1.x / len1, y: v1.y / len1 };
                        const t2 = { x: v2.x / len2, y: v2.y / len2 };

                        const cross = t1.x * t2.y - t1.y * t2.x;
                        const isConcave = isHole ? (cross > 1e-5) : (cross < -1e-5);
                        if (isConcave) continue;

                        const n1 = { x: -t1.y, y: t1.x };
                        const n2 = { x: -t2.y, y: t2.x };

                        let u = { x: n1.x + n2.x, y: n1.y + n2.y };
                        let lenU = Math.sqrt(u.x*u.x + u.y*u.y);
                        if (lenU < 1e-5) {
                            u = { ...n1 };
                        } else {
                            u.x /= lenU; u.y /= lenU;
                        }

                        const startSegs = [(i - 1 + m) % m, i];

                        let low = 0, high = diag;
                        for (let step = 0; step < 16; step++) {
                            const mid = (low + high) / 2;
                            const Pt = { x: curr.x + mid * u.x, y: curr.y + mid * u.y };
                            const dStart = Math.min(pointToSegmentDistance(Pt, prev, curr), pointToSegmentDistance(Pt, curr, next));
                            const dOther = getDistanceToRegionBoundary(Pt, loopIdx, startSegs);

                            if (dStart < dOther) {
                                low = mid;
                            } else {
                                high = mid;
                            }
                        }

                        const tStar = (low + high) / 2;
                        const PtStar = { x: curr.x + tStar * u.x, y: curr.y + tStar * u.y };
                        const radius = Math.min(pointToSegmentDistance(PtStar, prev, curr), pointToSegmentDistance(PtStar, curr, next));

                        const isInsideSolid = isPointInPolygon(PtStar, simpOuter) && !simpHoles.some(h => isPointInPolygon(PtStar, h));

                        if (radius > 0.05 && isInsideSolid) {
                            let z = -radius / tanHalf;
                            skeletonPoints.push({
                                x: PtStar.x, y: PtStar.y,
                                z: Math.max(-maxDepth, z),
                                r: radius
                            });
                        }
                    }
                });

                // 建立標準中心脊線刀軌
                const spineStrokes = [];
                if (skeletonPoints.length > 0) {
                    const unvisited = [...skeletonPoints];
                    const chainThreshold = 1.5; 

                    while (unvisited.length > 0) {
                        let stroke = [unvisited.shift()];
                        let growing = true;

                        while (growing) {
                            growing = false;
                            const lastPt = stroke[stroke.length - 1];
                            let bestIdx = -1;
                            let minDist = Infinity;

                            for (let i = 0; i < unvisited.length; i++) {
                                const d = Math.sqrt((unvisited[i].x - lastPt.x)**2 + (unvisited[i].y - lastPt.y)**2);
                                if (d < minDist) {
                                    minDist = d;
                                    bestIdx = i;
                                }
                            }

                            if (bestIdx !== -1 && minDist < chainThreshold) {
                                stroke.push(unvisited.splice(bestIdx, 1)[0]);
                                growing = true;
                            }
                        }

                        if (stroke.length >= 2) {
                            spineStrokes.push(stroke);
                        }
                    }
                }

                finishedStrokes = spineStrokes.map(stroke => {
                    let pts = stroke.map(p => ({ x: p.x, y: p.y, z: p.z, r: p.r }));

                    const alpha = 0.4;
                    for (let iter = 0; iter < 3; iter++) {
                        const temp = JSON.parse(JSON.stringify(pts));
                        for (let j = 1; j < pts.length - 1; j++) {
                            pts[j].x = temp[j].x * (1 - alpha) + (temp[j-1].x + temp[j+1].x) * 0.5 * alpha;
                            pts[j].y = temp[j].y * (1 - alpha) + (temp[j-1].y + temp[j+1].y) * 0.5 * alpha;
                            pts[j].z = temp[j].z * (1 - alpha) + (temp[j-1].z + temp[j+1].z) * 0.5 * alpha;
                        }
                    }

                    if (pts.length > 4) {
                        const taperLength = Math.min(5, Math.floor(pts.length / 2));
                        for (let k = 0; k < taperLength; k++) {
                            const factor = k / taperLength;
                            pts[k].z = pts[k].z * factor;
                            pts[pts.length - 1 - k].z = pts[pts.length - 1 - k].z * factor;
                        }
                    } else {
                        for (let k = 0; k < pts.length; k++) {
                            const distToEnd = Math.min(k, pts.length - 1 - k);
                            const factor = distToEnd / (pts.length / 2);
                            pts[k].z = pts[k].z * factor;
                        }
                    }

                    return pts;
                }).map(path => cleanPath(path, cfg.resolution)).filter(path => path.length >= 2);

                if (isStraight && simpOuter.length > 4) {
                    const N_verts = simpOuter.length;
                    for (let i = 0; i < N_verts; i++) {
                        const prev = simpOuter[(i - 1 + N_verts) % N_verts];
                        const curr = simpOuter[i];
                        const next = simpOuter[(i + 1) % N_verts];

                        const v1 = { x: curr.x - prev.x, y: curr.y - prev.y };
                        const v2 = { x: next.x - curr.x, y: next.y - curr.y };
                        const len1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
                        const len2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
                        if (len1 < 1e-6 || len2 < 1e-6) continue;

                        const cross = (v1.x / len1) * (v2.y / len2) - (v1.y / len1) * (v2.x / len2);
                        if (cross < -1e-5) { 
                            let nearestPtOnSpine = null;
                            let minDistSq = Infinity;
                            finishedStrokes.forEach(stroke => {
                                stroke.forEach(pt => {
                                    const dSq = (pt.x - curr.x)**2 + (pt.y - curr.y)**2;
                                    if (dSq < minDistSq) {
                                        minDistSq = dSq;
                                        nearestPtOnSpine = pt;
                                    }
                                });
                            });

                            if (nearestPtOnSpine && minDistSq > 0.25) {
                                const miterLine = [
                                    { x: curr.x, y: curr.y, z: 0 },
                                    { x: nearestPtOnSpine.x, y: nearestPtOnSpine.y, z: nearestPtOnSpine.z }
                                ];
                                finishedStrokes.push(cleanPath(miterLine, cfg.resolution));
                            }
                        }
                    }
                }
            }

            // ==========================================
            // 自適應局部寬度過濾，決定是否生成平行副軸切削線段
            // ==========================================
            const perpendicularStrokes = [];
            if (isStraight && outer.length > 2) {
                const pca = getPrincipalAxis(outer);
                const cosA = pca.cosA;
                const sinA = pca.sinA;
                const center = pca.center;

                let tMin = Infinity, tMax = -Infinity;
                outer.forEach(pt => {
                    const dx = pt.x - center.x;
                    const dy = pt.y - center.y;
                    const t = dx * cosA + dy * sinA;
                    if (t < tMin) tMin = t;
                    if (t > tMax) tMax = t;
                });

                const wCarveMax = 2 * maxDepth * tanHalf;
                const stepSize = Math.max(0.8, cfg.d * (1 - (cfg.overlap || 0.5)));
                
                const boundarySegments = [];
                for (let i = 0; i < outer.length; i++) {
                    boundarySegments.push({ A: outer[i], B: outer[(i + 1) % outer.length] });
                }
                holes.forEach(hole => {
                    for (let i = 0; i < hole.length; i++) {
                        boundarySegments.push({ A: hole[i], B: hole[(i + 1) % hole.length] });
                    }
                });

                for (let t = tMin + stepSize * 0.5; t < tMax; t += stepSize) {
                    const oX = center.x + t * cosA;
                    const oY = center.y + t * sinA;

                    const intersections = [];
                    boundarySegments.forEach(seg => {
                        const Ax = seg.A.x, Ay = seg.A.y;
                        const Bx = seg.B.x, By = seg.B.y;
                        const Dx = Bx - Ax;
                        const Dy = By - Ay;

                        const det = -Dx * cosA - Dy * sinA;
                        if (Math.abs(det) > 1e-6) {
                            const detLambda = -(oX - Ax) * cosA - (oY - Ay) * sinA;
                            const lambda = detLambda / det;
                            if (lambda >= 0 && lambda <= 1) {
                                const detP = Dx * (oY - Ay) - Dy * (oX - Ax);
                                const p = detP / det;
                                intersections.push(p);
                            }
                        }
                    });

                    intersections.sort((a, b) => a - b);

                    for (let j = 0; j < intersections.length - 1; j += 2) {
                        const pStart = intersections[j];
                        const pEnd = intersections[j+1];
                        const segLength = pEnd - pStart;
                        if (segLength < 0.1) continue;

                        if (segLength > Math.min(cfg.d, wCarveMax * 0.95)) {
                            const perpPath = [];
                            const sampleSpacing = Math.max(0.2, cfg.resolution * 3);
                            const steps = Math.ceil(segLength / sampleSpacing);

                            for (let s = 0; s <= steps; s++) {
                                const pSample = pStart + (segLength * (s / steps));
                                const ptX = oX - pSample * sinA;
                                const ptY = oY + pSample * cosA;
                                const pt = { x: ptX, y: ptY };

                                const dist = getDistanceToShapeBoundary(pt, boundarySegments);
                                const z = -dist / tanHalf;

                                perpPath.push({
                                    x: ptX,
                                    y: ptY,
                                    z: Math.max(-maxDepth, z)
                                });
                            }

                            if (perpPath.length >= 2) {
                                perpendicularStrokes.push(cleanPath(perpPath, cfg.resolution));
                            }
                        }
                    }
                }
            }

            const allStrokes = [...finishedStrokes, ...perpendicularStrokes];
            return optimizePathOrder(allStrokes, 0, 0);
        }

        // ==========================================
        // 6. THREE.JS 預覽區域初始化與動畫循環
        // ==========================================
        function animate() { 
            requestAnimationFrame(animate); 
            if (controls) controls.update(); 
            if (renderer && scene && camera) renderer.render(scene, camera); 
        }

        function initThreeJS() {
            container = document.getElementById('three-container');
            if (!container) return;
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 10000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0x020617);
            container.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            camera.position.set(0, 0, 200);
            
            const grid = new THREE.GridHelper(500, 50, 0x334155, 0x1e293b);
            grid.name = "gridHelper";
            grid.rotateX(Math.PI / 2);
            scene.add(grid);

            window.addEventListener('resize', () => {
                if (!container || !camera || !renderer) return;
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            animate();
        }

        // ==========================================
        // 7. 統一主題與語系管理系統
        // ==========================================
        let currentTheme = localStorage.getItem('gordix-theme') || 'dark';

        function applyTheme(theme) {
            const elHtml = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (theme === 'dark') {
                elHtml.classList.add('dark');
                if (themeIcon) {
                    themeIcon.setAttribute('fill', 'currentColor');
                    themeIcon.setAttribute('stroke', 'none');
                    themeIcon.innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.02 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/>`;
                }
                localStorage.setItem('gordix-theme', 'dark');
                currentTheme = 'dark';
            } else {
                elHtml.classList.remove('dark');
                if (themeIcon) {
                    themeIcon.setAttribute('fill', 'none');
                    themeIcon.setAttribute('stroke', 'currentColor');
                    themeIcon.setAttribute('stroke-width', '2');
                    themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
                }
                localStorage.setItem('gordix-theme', 'light');
                currentTheme = 'light';
            }
            
            updateThreeJSTheme(theme === 'dark');
        }

        function updateThreeJSTheme(isDark) {
            if (!renderer || !scene) return;
            const clearColor = isDark ? 0x020617 : 0xf1f5f9;
            renderer.setClearColor(clearColor);

            const existingGrid = scene.getObjectByName("gridHelper");
            if (existingGrid) scene.remove(existingGrid);

            const gridColor = isDark ? 0x334155 : 0x94a3b8;
            const gridSubColor = isDark ? 0x1e293b : 0xe2e8f0;
            const grid = new THREE.GridHelper(500, 50, gridColor, gridSubColor);
            grid.name = "gridHelper";
            grid.rotateX(Math.PI / 2);
            scene.add(grid);

            update3D(); 
        }

        // ==========================================
        // 8. 視窗載入與事件初始化
        // ==========================================
        window.onload = () => {
            initThreeJS();
            applyTheme(currentTheme);

            fileInput = document.getElementById('file-input');
            fileNameDisplay = document.getElementById('file-name-display');

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                fileExtension = file.name.split('.').pop().toLowerCase();
                fileNameDisplay.innerText = file.name;
                
                const r = new FileReader();
                r.onload = (event) => {
                    rawFileData = event.target.result;
                    const isImg = ["jpg","jpeg","png","bmp","webp"].includes(fileExtension);
                    if (isImg) {
                        document.getElementById('threshold-container').classList.remove('hidden');
                    } else {
                        document.getElementById('threshold-container').classList.add('hidden');
                    }
                    
                    document.getElementById('process-img-btn').click();
                };

                const isImg = ["jpg","jpeg","png","bmp","webp"].includes(fileExtension);
                if (isImg) {
                    r.readAsDataURL(file);
                } else {
                    r.readAsText(file);
                }
            };

            document.getElementById('process-img-btn').onclick = async () => {
                if(!rawFileData) return;
                
                const targetW = parseFloat(document.getElementById('target-width').value) || 100;
                const smoothTol = parseFloat(document.getElementById('smooth-range').value);
                
                let vectorPaths = []; 

                if (["jpg","jpeg","png","bmp","webp"].includes(fileExtension)) {
                    vectorPaths = await parseBitmap(rawFileData, targetW, smoothTol);
                } else if (fileExtension === 'svg') {
                    const rawPaths = parseSVG(rawFileData, smoothTol);
                    vectorPaths = scaleVectorPaths(rawPaths, targetW);
                } else if (fileExtension === 'dxf') {
                    const rawPaths = parseDXF(rawFileData, smoothTol);
                    vectorPaths = scaleVectorPaths(rawPaths, targetW);
                }

                if (vectorPaths.length > 0) {
                    processVectorIntoParts(vectorPaths);
                }
            };

            document.getElementById('select-all').onclick = () => {
                const vis = parts.map((p, i) => p.visible ? i : -1).filter(idx => idx !== -1);
                if (vis.length === 0) return;
                if (vis.every(idx => selectedIndices.has(idx))) vis.forEach(idx => selectedIndices.delete(idx));
                else vis.forEach(idx => selectedIndices.add(idx));
                renderPartList(); updateJobUI(); update3D();
            };

            document.getElementById('resize-w').oninput = (e) => {
                if(selectedIndices.size === 0) return;
                const val = parseFloat(e.target.value); if(!val) return;
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                selectedIndices.forEach(idx => { parts[idx].rawPath.forEach(pt => { minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x); minY = Math.min(minY, pt.y); maxY = Math.max(maxY, pt.y); }); });
                document.getElementById('resize-h').value = (val * (maxY - minY) / (maxX - minX)).toFixed(2);
            };

            document.getElementById('job-f').oninput = (e) => {
                const val = parseFloat(e.target.value);
                if (!val || val <= 0) return;
                selectedIndices.forEach(idx => {
                    if (parts[idx]) {
                        parts[idx].jobConfig.f = val;
                    }
                });
                updateStats();
            };

            document.getElementById('vcarve-layer-select').onchange = () => {
                renderPartList();
                update3D();
            };

            // 監聽刀徑及角度變更，以即時限制與警示深度
            document.getElementById('mill-d').addEventListener('input', updateDepthLimit);
            document.getElementById('vbit-angle').addEventListener('input', updateDepthLimit);
            document.getElementById('mill-depth').addEventListener('input', () => {
                const d = parseFloat(document.getElementById('mill-d').value) || 6.0;
                const angle = parseFloat(document.getElementById('vbit-angle').value) || 90;
                const tanHalf = Math.tan((angle / 2) * Math.PI / 180);
                const maxDepth = d / (2 * tanHalf);
                const depthInput = document.getElementById('mill-depth');
                if (parseFloat(depthInput.value) > maxDepth) {
                    depthInput.value = parseFloat(maxDepth.toFixed(2));
                }
            });

            document.getElementById('apply-job-btn').onclick = () => {
                updateDepthLimit(); 
                const newRes = Math.max(0.1, parseFloat(document.getElementById('resolution').value) || 0.1);
                const newF = parseFloat(document.getElementById('job-f').value);
                const newType = 'vcarve';
                const newD = parseFloat(document.getElementById('mill-d').value);
                const newDepth = parseFloat(document.getElementById('mill-depth').value);
                const newOverlap = 0.5; 
                const newVBitAngle = parseFloat(document.getElementById('vbit-angle').value) || 90;

                let minX = Infinity, maxX = -Infinity;
                selectedIndices.forEach(idx => { parts[idx].rawPath.forEach(pt => { minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x); }); });
                const groupScale = parseFloat(document.getElementById('resize-w').value) / (maxX - minX);

                selectedIndices.forEach(idx => {
                    parts[idx].toolpath = null;
                    parts[idx].jobConfig = { 
                        type: newType, f: newF, d: newD, depth: newDepth, 
                        overlap: newOverlap, resolution: newRes, vbitAngle: newVBitAngle 
                    };
                    parts[idx].currentDim = { w: parts[idx].originalDim.w * groupScale, h: parts[idx].originalDim.h * groupScale };
                    parts[idx].appliedMethod = newType; 
                });

                calculateAllVCarvePaths(groupScale);

                renderPartList(); update3D(); updateStats();
            };

            /**
             * 高性能 G-code 導出模組
             */
            document.getElementById('export-gcode').onclick = () => {
                if(parts.length === 0) return;

                let allPathsToCut = [];
                parts.forEach(p => {
                    if (p.visible && p.toolpath && p.toolpath.length > 0) {
                        p.toolpath.forEach(path => {
                            if (path.length >= 2) {
                                allPathsToCut.push({
                                    path: path,
                                    cfg: p.jobConfig,
                                    partId: p.id
                                });
                            }
                        });
                    }
                });

                if (allPathsToCut.length === 0) return;

                let optimizedPaths = [];
                let currentX = 0, currentY = 0;
                let unvisited = [...allPathsToCut];

                while (unvisited.length > 0) {
                    let bestIdx = -1;
                    let bestDistSq = Infinity;
                    let reversePath = false;

                    for (let i = 0; i < unvisited.length; i++) {
                        const item = unvisited[i];
                        const path = item.path;
                        
                        const startPt = path[0];
                        const dStartSq = Math.pow(startPt.x - currentX, 2) + Math.pow(startPt.y - currentY, 2);
                        if (dStartSq < bestDistSq) {
                            bestDistSq = dStartSq;
                            bestIdx = i;
                            reversePath = false;
                        }

                        const endPt = path[path.length - 1];
                        const dEndSq = Math.pow(endPt.x - currentX, 2) + Math.pow(endPt.y - currentY, 2);
                        if (dEndSq < bestDistSq) {
                            bestDistSq = dEndSq;
                            bestIdx = i;
                            reversePath = true;
                        }
                    }

                    if (bestIdx === -1) break;

                    let bestItem = unvisited.splice(bestIdx, 1)[0];
                    let finalPath = bestItem.path;
                    if (reversePath) {
                        finalPath = [...finalPath].reverse();
                    }
                    optimizedPaths.push({
                        path: finalPath,
                        cfg: bestItem.cfg,
                        partId: bestItem.partId
                    });

                    const lastPt = finalPath[finalPath.length - 1];
                    currentX = lastPt.x;
                    currentY = lastPt.y;
                }

                let gc = [
                    `; CNC V5.5 - Global TSP V-Carving Pro`, 
                    `G21`, 
                    `G90`, 
                    `G0 X0 Y0 F2000`
                ];
                
                let currentZ = null; 
                currentX = 0;
                currentY = 0;
                const SAFE_Z_VAL = parseFloat(SAFE_Z) || 1.0;

                optimizedPaths.forEach((item, idx) => {
                    const path = item.path;
                    const cfg = item.cfg;
                    const start = path[0];
                    const startZ = (start.z !== undefined) ? start.z : 0;

                    const distSq = Math.pow(start.x - currentX, 2) + Math.pow(start.y - currentY, 2);
                    const contiguous = distSq < 0.01; 

                    if (contiguous) {
                        if (currentZ === null || Math.abs(currentZ - startZ) > 1e-4) {
                            gc.push(`G1 Z${startZ.toFixed(3)} F300`);
                            currentZ = startZ;
                        }
                        if (Math.abs(currentX - start.x) > 1e-4 || Math.abs(currentY - start.y) > 1e-4) {
                            gc.push(`G1 X${start.x.toFixed(3)} Y${start.y.toFixed(3)} F${cfg.f}`);
                            currentX = start.x;
                            currentY = start.y;
                        }
                    } else {
                        if (currentZ === null || currentZ < SAFE_Z_VAL) {
                            gc.push(`G0 Z${SAFE_Z_VAL.toFixed(3)}`);
                            currentZ = SAFE_Z_VAL;
                        }
                        if (Math.abs(currentX - start.x) > 1e-4 || Math.abs(currentY - start.y) > 1e-4) {
                            gc.push(`G0 X${start.x.toFixed(3)} Y${start.y.toFixed(3)}`);
                            currentX = start.x;
                            currentY = start.y;
                        }
                        gc.push(`G1 Z${startZ.toFixed(3)} F300`);
                        currentZ = startZ;
                    }

                    let isFirstMoveOfPass = true;
                    for (let j = 1; j < path.length; j++) {
                        const pt = path[j];
                        const ptZ = (pt.z !== undefined) ? ` Z${pt.z.toFixed(3)}` : "";
                        const fStr = isFirstMoveOfPass ? ` F${cfg.f}` : "";
                        gc.push(`G1 X${pt.x.toFixed(3)} Y${pt.y.toFixed(3)}${ptZ}${fStr}`);
                        isFirstMoveOfPass = false;
                    }

                    const lastPt = path[path.length - 1];
                    currentX = lastPt.x;
                    currentY = lastPt.y;
                    currentZ = (lastPt.z !== undefined) ? lastPt.z : 0;
                });

                if (currentZ === null || currentZ < SAFE_Z_VAL) {
                    gc.push(`G0 Z${SAFE_Z_VAL.toFixed(3)}`);
                }
                gc.push("G0 X0 Y0");

                const blob = new Blob([gc.join('\n')], { type: 'text/plain' });
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(blob); 
                a.download = `${originalFileName}.gcode`; 
                a.click();
            };

            // 語言切換事件
            document.getElementById('lang-toggle').onclick = () => { 
                currentLang = currentLang === 'zh' ? 'en' : 'zh'; 
                localStorage.setItem('gordix-lang', currentLang);
                updateLanguage(); 
            };

            // 主題切換
            window.toggleTheme = function() {
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
            };

            updateLanguage();
            updateDepthLimit();
        };
    </script>
    <!-- PWA Service Worker 註冊 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker registered successfully with scope: ', reg.scope))
                    .catch((err) => console.error('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
